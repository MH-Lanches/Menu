<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Administrador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
    <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-gray-800 mb-2">🔐 Área Restrita</h1>
        <p class="text-gray-500">Digite sua senha para acessar o painel</p>
    </div>

    <div class="space-y-4">
        <input type="password" id="senha" placeholder="Digite a senha" class="w-full p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-red-500 outline-none text-lg">
        <button onclick="logar()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-xl text-lg transition">ENTRAR</button>
        <a href="index.html" class="block text-center text-gray-500 mt-4">Voltar para loja</a>
    </div>
</div>

<script>
// SENHA PADRÃO: admin123
function logar(){
    const senha = document.getElementById('senha').value;
    if(senha === 'admin123'){
        localStorage.setItem('logado', 'sim');
        window.location = 'admin.html';
    } else {
        alert('Senha incorreta!');
    }
}
</script>
</body>
</html>
