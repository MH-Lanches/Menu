<body class="bg-gray-900 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <i class="fas fa-user-shield text-6xl text-red-500 mb-4"></i>
            <h1 class="text-3xl font-bold text-gray-800">Área Restrita</h1>
            <p class="text-gray-500">Acesso ao Painel de Controle</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-gray-600 mb-2">Usuário</label>
                <input type="text" id="user" value="admin" class="w-full p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
            </div>
            <div>
                <label class="block text-gray-600 mb-2">Senha</label>
                <input type="password" id="pass" value="123456" class="w-full p-4 border border-gray-300 rounded-xl focus:ring-2 focus:ring-red-500 outline-none">
            </div>

            <button onclick="logar()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-xl text-lg transition">
                ENTRAR <i class="fas fa-arrow-right ml-2"></i>
            </button>
            <p id="erro" class="text-center text-red-500 mt-2 hidden">Usuário ou senha incorretos!</p>
        </div>
    </div>

<script>
function logar(){
    let u = document.getElementById('user').value;
    let p = document.getElementById('pass').value;
    
    if(u == 'admin' && p == '123456'){
        localStorage.setItem('logado', 'sim');
        window.location.href = 'admin.html'; // <<<<--- AGORA VAI CERTO
    } else {
        document.getElementById('erro').classList.remove('hidden');
    }
}
</script>
</body>
</html>

<script>
// DADOS INICIAIS PARA NÃO FICAR TELA BRANCA
// O Admin altera isso depois
const dadosIniciais = {
    "config": {
        "nome": "MEU DELIVERY",
        "whatsapp": "5581999999999",
        "cor": "#FF4A5F",
        "horario": [
            {"dia": 0, "aberto": true, "ini": "18:00", "fim": "23:59"},
            {"dia": 1, "aberto": true, "ini": "18:00", "fim": "23:59"},

            {"dia": 4, "aberto": true, "ini": "18:00", "fim": "23:59"},
            {"dia": 5, "aberto": true, "ini": "18:00", "fim": "23:59"},
            {"dia": 6, "aberto": true, "ini": "18:00", "fim": "23:59"}
        ]
    },
    "produtos": [
        {"id": 1, "nome": "Hambúrguer Artesanal", "desc": "Pão brioche, carne 150g, queijo, bacon e molho especial", "preco": 25.90, "cat": "Lanches", "img": "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500", "adicionais": []},
        {"id": 2, "nome": "Coca-Cola 2L", "desc": "Refrigerante de cola original", "preco": 10.00, "cat": "Bebidas", "img": "https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=500", "adicionais": []}
    ]
};

let config = {};
let produtos = [];
let carrinho = [];
let produtoAtual;
let lojaFechada = false;

function iniciar() {
    // TENTA CARREGAR DO BANCO DE DADOS, SE NÃO TIVER, USA O PADRÃO
    const local = localStorage.getItem('dados_site');
    if(local){
        let dados = JSON.parse(local);
        config = dados.config;
        produtos = dados.produtos;
    } else {
        // Se for primeira vez, carrega o exemplo
        config = dadosIniciais.config;
        produtos = dadosIniciais.produtos;
    }
    montarLoja();
}

function montarLoja(){
    verificarStatusLoja();
    renderizarCategorias();
    renderizarProdutos();
}

function verificarStatusLoja() {
    const agora = new Date();
    const horaAtual = agora.getHours().toString().padStart(2,'0') + ":" + agora.getMinutes().toString().padStart(2,'0');
    const diaSemana = agora.getDay();
    const horarioHoje = config.horario.find(h => h.dia === diaSemana);

    if(!horarioHoje || !horarioHoje.aberto || horaAtual < horarioHoje.ini || horaAtual > horarioHoje.fim) {
        lojaFechada = true;
        document.getElementById('avisoAgendamento').classList.remove('hidden');
    } else {
        lojaFechada = false;
        document.getElementById('avisoAgendamento').classList.add('hidden');
    }
}

function renderizarCategorias() {
    const cats = [...new Set(produtos.map(p => p.cat))];
    let html = `<button onclick="filtrar('')" class="bg-prim text-white px-6 py-3 rounded-full font-bold whitespace-nowrap">Todos</button>`;
    cats.forEach(cat => {
        html += `<button onclick="filtrar('${cat}')" class="bg-white border border-gray-200 px-6 py-3 rounded-full font-bold whitespace-nowrap hover:bg-gray-100">${cat}</button>`;
    });
    document.getElementById('menuCategorias').innerHTML = html;
}

function filtrar(cat){ renderizarProdutos(cat); }

function renderizarProdutos(filtro=null) {
    const container = document.getElementById('listaProdutos');
    container.innerHTML = '';
    produtos.filter(p => !p.pausado && (!filtro || p.cat === filtro)).forEach((p, i) => {
        container.innerHTML += `
        <div class="bg-white rounded-3xl shadow overflow-hidden card cursor-pointer" onclick="abrirModal(${i})">
            <img src="${p.img}" class="w-full h-56 object-cover">
            <div class="p-5">
                <h3 class="font-bold text-xl text-dark">${p.nome}</h3>
                <p class="text-gray-500 text-sm mt-1 h-10 overflow-hidden">${p.desc}</p>
                <div class="mt-4 flex justify-between items-center">
                    <span class="font-bold text-2xl text-prim">R$ ${p.preco.toFixed(2)}</span>
                    <i class="fas fa-plus-circle text-prim text-xl"></i>
                </div>
            </div>
        </div>`;
    });
}

function abrirModal(i) {
    produtoAtual = produtos[i];
    document.getElementById('modalNome').innerText = produtoAtual.nome;
    document.getElementById('modalImg').src = produtoAtual.img;
    document.getElementById('modalDesc').innerText = produtoAtual.desc;
    document.getElementById('modalPreco').innerText = produtoAtual.preco.toFixed(2);
    document.getElementById('modalOpcoes').innerHTML = '';
    
    if(produtoAtual.adicionais?.length > 0) {
        document.getElementById('modalOpcoes').innerHTML += `<p class="font-bold text-lg mb-3">Adicionais</p>`;
        produtoAtual.adicionais.forEach(ad => {
            document.getElementById('modalOpcoes').innerHTML += `
            <label class="flex items-center justify-between p-4 border rounded-2xl mb-2 cursor-pointer">
                <span>${ad.nome}</span>
                <div class="flex items-center gap-3">
                    <span class="text-prim font-bold">+ R$ ${ad.preco.toFixed(2)}</span>
                    <input type="checkbox" class="adc w-5 h-5" value="${ad.preco}">
                </div>
            </label>`;
        });
    }
    document.getElementById('modalProduto').classList.remove('hidden');
    document.getElementById
    }
}
</script>
