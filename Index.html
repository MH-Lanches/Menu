<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="titulo-loja">Delivery Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style id="estilo-dinamico"></style>
</head>
<body class="bg-gray-50">

<!-- HEADER -->
<header id="header" class="text-white p-4 shadow-md sticky top-0 z-50">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-bold" id="nome-loja">Carregando...</h1>
        <div class="flex gap-4 items-center">
            <button onclick="abrirFavoritos()" class="relative">
                <i class="fas fa-heart text-xl"></i>
                <span id="contador-fav" class="absolute -top-2 -right-2 bg-white text-red-500 rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold">0</span>
            </button>
            <button onclick="abrirCarrinho()" class="relative">
                <i class="fas fa-shopping-cart text-xl"></i>
                <span id="contador-cart" class="absolute -top-2 -right-2 bg-white text-red-500 rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold">0</span>
            </button>
        </div>
    </div>
</header>

<!-- AREA DE ANUNCIOS / BANNERS -->
<section id="area-anuncios" class="max-w-6xl mx-auto mt-4 px-4">
    <!-- Carregado via JS -->
</section>

<!-- MENU DE CATEGORIAS -->
<nav class="max-w-6xl mx-auto mt-6 px-4 overflow-x-auto whitespace-nowrap pb-2">
    <button onclick="filtrar('todos')" class="categoria-btn px-4 py-2 rounded-full mr-2 font-bold">Todos</button>
</nav>

<!-- LISTA PRODUTOS -->
<main class="max-w-6xl mx-auto p-4" id="lista-produtos">
    <!-- Produtos aqui -->
</main>

<!-- MODAL FAVORITOS -->
<div id="modal-favoritos" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl max-w-md w-full max-h-[80vh] overflow-y-auto">
        <div class="p-4">
            <span onclick="fecharFavoritos()" class="float-right text-2xl cursor-pointer">&times;</span>
            <h2 class="text-xl font-bold mb-4">❤️ Meus Favoritos</h2>
            <div id="lista-fav"></div>
        </div>
    </div>
</div>

<!-- MODAL DO PRODUTO -->
<div id="modal-produto" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl max-w-md w-full max-h-[90vh] overflow-y-auto">
        <div class="p-4">
            <span onclick="fecharModal()" class="float-right text-2xl cursor-pointer">&times;</span>
            <h2 id="modal-nome" class="text-xl font-bold"></h2>
            <img id="modal-img" class="w-full h-48 object-cover rounded my-2">
            <p id="modal-desc" class="text-gray-500"></p>

            <!-- AREA DE OPÇÕES (Meia a Meia / Adicionais) -->
            <div id="area-opcoes" class="mt-4"></div>

            <div class="mt-6 flex gap-2">
                <button onclick="adicionarCarrinho()" class="flex-1 bg-secundaria hover:opacity-90 text-white py-3 rounded font-bold">
                    <i class="fas fa-plus"></i> Adicionar ao Pedido
                </button>
            </div>
        </div>
    </div>
</div>

<!-- CARRINHO LATERAL -->
<div id="carrinho" class="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-50">
    <div class="p-4 h-full flex flex-col">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold">🛒 Meu Pedido</h3>
            <span onclick="fecharCarrinho()" class="text-2xl cursor-pointer">&times;</span>
        </div>
        <div id="itens-carrinho" class="flex-1 overflow-y-auto"></div>
        <div class="border-t pt-4 mt-4">
            <p class="text-xl font-bold">Total: <span id="total-carrinho">R$ 0,00</span></p>
            <button onclick="finalizarPedido()" class="w-full bg-secundaria hover:opacity-90 text-white py-3 rounded mt-2 font-bold">
                Finalizar no WhatsApp
            </button>
        </div>
    </div>
</div>

<script>
let config = {};
let produtos = [];
let carrinho = [];
let favoritos = [];
let produtoAtual = {};

// Carrega Configurações e Cores
fetch('config.json')
.then(res => res.json())
.then(dados => {
    config = dados;
    document.title = config.nome_loja;
    document.getElementById('nome-loja').innerText = config.nome_loja;
    
    // Aplica Cores Dinamicamente
    const style = document.getElementById('estilo-dinamico');
    style.innerHTML = `
        .bg-primary { background: ${config.cores.primaria} !important; }
        .bg-secundaria { background: ${config.cores.secundaria} !important; }
        .text-primary { color: ${config.cores.primaria} !important; }
        header { background: ${config.cores.primaria} !important; }
        .categoria-btn { background: ${config.cores.primaria}; color: white; }
        body { background-color: ${config.cores.fundo}; }
    `;

    renderizarAnuncios();
});

// Carrega Produtos
fetch('products.json')
.then(res => res.json())
.then(dados => {
    produtos = dados;
    renderizarProdutos();
    renderizarCategorias();
});

// ===== FUNÇÕES GERAIS =====
function renderizarAnuncios() {
    const area = document.getElementById('area-anuncios');
    if(config.anuncios && config.anuncios.length > 0) {
        config.anuncios.forEach(ad => {
            const div = document.createElement('div');
            div.className = 'relative h-40 rounded-xl overflow-hidden mb-4 shadow';
            div.innerHTML = `
                <img src="${ad.imagem}" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-black bg-opacity-40 p-4 flex flex-col justify-end text-white">
                    <h3 class="font-bold text-xl">${ad.titulo}</h3>
                    <p>${ad.subtitulo}</p>
                </div>
            `;
            area.appendChild(div);
        });
    }
}

function renderizarCategorias() {
    const cats = [...new Set(produtos.map(p => p.categoria))];
    const nav = document.querySelector('nav');
    cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'categoria-btn px-4 py-2 rounded-full mr-2 font-bold';
        btn.innerText = cat;
        btn.onclick = () => filtrar(cat);
        nav.appendChild(btn);
    });
}

function filtrar(cat) {
    renderizarProdutos(cat == 'todos' ? null : cat);
}

function renderizarProdutos(filtro = null) {
    const container = document.getElementById('lista-produtos');
    container.innerHTML = '';
    
    produtos.filter(p => !filtro || p.categoria == filtro).forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'bg-white rounded-xl shadow overflow-hidden relative';
        div.innerHTML = `
            <button onclick="toggleFavorito(${idx})" class="absolute top-2 right-2 z-10 bg-white p-2 rounded-full shadow">
                <i class="fas fa-heart ${favoritos.includes(idx) ? 'text-red-500' : 'text-gray-400'}"></i>
            </button>
            <img src="${item.imagem}" class="w-full h-48 object-cover">
            <div class="p-4">
                <h3 class="font-bold text-lg">${item.nome}</h3>
                <p class="text-gray-500 text-sm h-10 overflow-hidden">${item.descricao}</p>
                <p class="text-green-600 font-bold text-xl mt-2">R$ ${item.preco.toFixed(2)}</p>
                <button onclick="abrirModal(${idx})" class="mt-2 w-full bg-primary text-white py-2 rounded font-bold">
                    Ver Detalhes
                </button>
            </div>
        `;
        container.appendChild(div);
    });
}

// ===== MODAL PRODUTO E OPÇÕES =====
function abrirModal(idx) {
    produtoAtual = produtos[idx];
    document.getElementById('modal-nome').innerText = produtoAtual.nome;
    document.getElementById('modal-img').src = produtoAtual.imagem;
    document.getElementById('modal-desc').innerText = produtoAtual.descricao;
    document.getElementById('area-opcoes').innerHTML = '';

    // 🍕 TIPO PIZZA - MEIA A MEIA
    if(produtoAtual.tipo == 'pizza' && produtoAtual.sabores) {
        document.getElementById('area-opcoes').innerHTML = `
            <div class="mb-4">
                <label class="font-bold">Primeira Metade</label>
                <select id="sabor1" onchange="calcularMeia()" class="w-full border p-2 rounded">
                    ${produtoAtual.sabores.map(s => `<option value="${s.nome}|${s.preco}">${s.nome} ${s.preco>0? `(+R$ ${s.preco})`:''}</option>`).join('')}
                </select>
            </div>
            <div class="mb-4">
                <label class="font-bold">Segunda Metade</label>
                <select id="sabor2" onchange="calcularMeia()" class="w-full border p-2 rounded">
                    ${produtoAtual.sabores.map(s => `<option value="${s.nome}|${s.preco}">${s.nome} ${s.preco>0? `(+R$ ${s.preco})`:''}</option>`).join('')}
                </select>
            </div>
            <div class="bg-blue-50 p-2 rounded text-center font-bold">
                Preço Total: <span id="preco-meia">R$ ${produtoAtual.preco.toFixed(2)}</span>
            </div>
        `;
        calcularMeia();
    }

    // 🎟️ TIPO ADICIONAIS / SABORES
    if(produtoAtual.adicionais && produtoAtual.adicionais.length > 0) {
        let html = `<div class="mt-4 p-3 bg-gray-50 rounded">
            <p class="font-bold">${produtoAtual.desc_adic || 'Adicionais'} (Escolha até ${produtoAtual.max_adic})</p>`;
        produtoAtual.adicionais.forEach((ad, i) => {
            html += `
                <label class="flex items-center gap-2 p-2 border rounded mt-1 cursor-pointer bg-white">
                    <input type="checkbox" class="adic-check" value="${ad.nome}|${ad.preco}" onchange="verificarLimite(this, ${produtoAtual.max_adic})">
                    ${ad.nome} + R$ ${ad.preco.toFixed(2)}
                </label>
            `;
        });
        html += "</div>";
        document.getElementById('area-opcoes').innerHTML += html;
    }

    document.getElementById('modal-produto').classList.remove('hidden');
    document.getElementById('modal-produto').classList.add('flex');
}

function calcularMeia() {
    try {
        const s1 = document.getElementById('sabor1').value.split('|');
        const s2 = document.getElementById('sabor2').value.split('|');
        const p1 = parseFloat(s1[1]) || 0;
        const p2 = parseFloat(s2[1]) || 0;
        const total = (produtoAtual.preco + p1 + p2);
        document.getElementById('preco-meia').innerText = 'R$ ' + total.toFixed(2);
    } catch(e) {}
}

function verificarLimite(el, max) {
    const checks = document.querySelectorAll('.adic-check:checked');
    if(checks.length > max) {
        alert(`⚠️ Você só pode escolher até ${max} opções!`);
        el.checked = false;
    }
}

function fecharModal() {
    document.getElementById('modal-produto').classList.add('hidden');
    document.getElementById('modal-produto').classList.remove('flex');
}

// ===== CARRINHO =====
function adicionarCarrinho() {
    let item = JSON.parse(JSON.stringify(produtoAtual)); // Clona objeto
    item.observacoes = [];
    let precoFinal = item.preco;

    // Trata nome da pizza
    if(item.tipo == 'pizza') {
        const s1 = document.getElementById('sabor1').value.split('|')[0];
        const s2 = document.getElementById('sabor2').value.split('|')[0];
        item.nome = `${item.nome} - ${s1} / ${s2}`;
        precoFinal = parseFloat(document.getElementById('preco-meia').innerText.replace('R$ ', ''));
    }
    
    item.preco = precoFinal;

    // Pega adicionais marcados
    document.querySelectorAll('.adic-check:checked').forEach(c => {
        const [nome, preco] = c.value.split('|');
        item.observacoes.push(`+ ${nome}`);
        item.preco += parseFloat(preco);
    });

    carrinho.push(item);
    atualizarCarrinho();
    fecharModal();
    abrirCarrinho();
}

function atualizarCarrinho() {
    document.getElementById('contador-cart').innerText = carrinho.length;
    const container = document.getElementById('itens-carrinho');
    container.innerHTML = '';
    let total = 0;

    if(carrinho.length == 0) {
        container.innerHTML = "<p class='text-gray-400 text-center'>Seu carrinho está vazio.</p>";
    }

    carrinho.forEach((item, i) => {
        total += item.preco;
        const div = document.createElement('div');
        div.className = 'border-b pb-2 mb-2';
        div.innerHTML = `
            <div class="flex justify-between">
                <p class="font-bold text-sm">${item.nome}</p>
                <span class="text-green-600 text-sm">R$ ${item.preco.toFixed(2)}</span>
            </div>
            ${item.observacoes.map(o => `<p class="text-xs text-gray-500">${o}</p>`).join('')}
        `;
        container.appendChild(div);
    });

    document.getElementById('total-carrinho').innerText = 'R$ ' + total.toFixed(2);
}

function abrirCarrinho() { document.getElementById('carrinho').classList.remove('translate-x-full'); }
function fecharCarrinho() { document.getElementById('carrinho').classList.add('translate-x-full'); }

function finalizarPedido() {
    if(carrinho.length == 0) {
        alert("Seu carrinho está vazio!");
        return;
    }
    let texto = "Olá! Gostaria de fazer o pedido:\n\n";
    carrinho.forEach((item, i) => {
        texto += `${i+1} - ${item.nome}\n`;
        texto +=
