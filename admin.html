<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Gestor | Ecossistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex h-screen font-sans text-slate-800">

    <aside class="w-64 bg-slate-900 text-white p-6 flex flex-col shadow-2xl">
        <h2 class="text-2xl font-black text-blue-500 mb-8">GESTOR PRO</h2>
        <nav class="flex-1 space-y-2">
            <button onclick="showTab('produtos')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800"><i class="fa-solid fa-burger w-6"></i> Cardápio</button>
            <button onclick="showTab('config')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800"><i class="fa-solid fa-palette w-6"></i> Loja & Visual</button>
            <button onclick="showTab('sync')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 text-orange-400"><i class="fa-brands fa-github w-6"></i> Servidor</button>
        </nav>
        <button onclick="salvarNoGitHub()" class="mt-auto bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold flex items-center justify-center gap-2"><i class="fa-solid fa-cloud-arrow-up"></i> PUBLICAR SITE</button>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <section id="tab-produtos" class="tab-content active space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-3xl font-black">Gestão de Cardápio</h2>
                <button onclick="abrirModal()" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-bold">+ Novo Produto</button>
            </div>

            <div class="bg-white p-6 rounded-2xl border">
                <h3 class="text-xs font-bold text-slate-400 uppercase mb-4">Ordem das Categorias (Vitrine)</h3>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="in-cat" placeholder="Nova categoria..." class="flex-1 bg-slate-50 border p-3 rounded-xl outline-none">
                    <button onclick="addCat()" class="bg-blue-600 text-white px-6 rounded-xl font-bold">Criar</button>
                </div>
                <div id="lista-cats" class="flex flex-wrap gap-2"></div>
            </div>

            <div class="flex gap-4">
                <input type="text" id="busca" oninput="renderApp()" placeholder="Buscar item..." class="flex-1 border p-3 rounded-xl outline-none">
                <select id="filtro-status" onchange="renderApp()" class="border p-3 rounded-xl font-bold">
                    <option value="all">Todos</option>
                    <option value="active">Ativos</option>
                    <option value="paused">Pausados</option>
                </select>
            </div>

            <div id="grid-items" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="tab-config" class="tab-content hidden space-y-6">
            <h2 class="text-3xl font-black">Visual e Operação</h2>
            <div class="bg-white p-8 rounded-2xl border grid grid-cols-2 gap-8">
                <div class="space-y-4">
                    <div><label class="font-bold text-sm">Nome da Loja</label><input type="text" id="cfg-nome" class="w-full border p-3 rounded-xl"></div>
                    <div><label class="font-bold text-sm">WhatsApp</label><input type="text" id="cfg-wpp" class="w-full border p-3 rounded-xl"></div>
                    <div><label class="font-bold text-sm">Taxa Fixa (R$)</label><input type="number" id="cfg-taxa" class="w-full border p-3 rounded-xl"></div>
                    <div><label class="font-bold text-sm">Cor Principal (Hex)</label><input type="color" id="cfg-cor" class="w-full h-12 rounded-xl cursor-pointer"></div>
                    <div><label class="font-bold text-sm">Texto de Rodapé</label><input type="text" id="cfg-rodape" class="w-full border p-3 rounded-xl"></div>
                </div>
                <div>
                    <h3 class="font-bold text-sm mb-4">Horários da Semana</h3>
                    <div id="horarios-box" class="space-y-2"></div>
                </div>
                <button onclick="salvarConfig()" class="col-span-2 bg-slate-900 text-white py-4 rounded-xl font-bold">SALVAR AJUSTES LOCAIS</button>
            </div>
        </section>

        <section id="tab-sync" class="tab-content hidden space-y-6">
            <h2 class="text-3xl font-black">Servidor GitHub</h2>
            <div class="bg-white p-8 rounded-2xl border max-w-md">
                <input type="password" id="gh-token" placeholder="Personal Access Token" class="w-full border p-3 rounded-xl mb-4">
                <input type="text" id="gh-repo" placeholder="usuario/repositorio" class="w-full border p-3 rounded-xl mb-4">
                <button onclick="salvarCredenciais()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Conectar</button>
            </div>
        </section>
    </main>

    <div id="modal-item" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-2xl rounded-2xl max-h-[90vh] overflow-y-auto p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black">Produto</h3>
                <button onclick="fecharModal()"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            <input type="hidden" id="p-id">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="col-span-2"><input type="text" id="p-nome" placeholder="Nome do Produto" class="w-full border p-3 rounded-xl"></div>
                <div><input type="number" id="p-preco" placeholder="Preço" class="w-full border p-3 rounded-xl"></div>
                <div><select id="p-cat" class="w-full border p-3 rounded-xl"></select></div>
                <div class="col-span-2"><input type="text" id="p-img" placeholder="URL da Foto" class="w-full border p-3 rounded-xl"></div>
                <div class="col-span-2"><textarea id="p-desc" placeholder="Descrição" class="w-full border p-3 rounded-xl"></textarea></div>
            </div>

            <div class="bg-slate-50 p-6 rounded-xl border mb-6">
                <div class="flex justify-between items-center mb-4">
                    <h4 class="font-bold text-sm">Adicionais Dinâmicos</h4>
                    <button onclick="addLinhaExtra()" class="text-blue-600 font-bold text-sm">+ Adicionar</button>
                </div>
                <div id="lista-extras" class="space-y-2"></div>
            </div>

            <div class="flex justify-end gap-4">
                <button onclick="fecharModal()" class="px-6 py-3 font-bold text-slate-500">Cancelar</button>
                <button onclick="salvarProduto()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold">Salvar Item</button>
            </div>
        </div>
    </div>

    <script>
        let DATA = { config: { categorias: [], horarios: {} }, items: [] };
        const dias = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];

        window.onload = async () => {
            document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
            document.getElementById('gh-repo').value = localStorage.getItem('gh_repo') || '';
            try {
                const res = await fetch('produtos.json', { cache: 'no-store' });
                DATA = await res.json();
                renderApp();
            } catch(e) {}
        };

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
        }

        function renderApp() {
            // Categorias
            document.getElementById('lista-cats').innerHTML = DATA.config.categorias.map((c, i) => `
                <div class="bg-slate-800 text-white px-4 py-2 rounded-lg flex items-center gap-3 text-sm">
                    ${c}
                    <div class="flex gap-2 ml-2 pl-2 border-l border-slate-600">
                        <button onclick="moverCat(${i}, -1)"><i class="fa-solid fa-arrow-left"></i></button>
                        <button onclick="moverCat(${i}, 1)"><i class="fa-solid fa-arrow-right"></i></button>
                        <button onclick="removeCat(${i})" class="text-red-400"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('p-cat').innerHTML = DATA.config.categorias.map(c => `<option>${c}</option>`).join('');

            // Filtros de Produtos
            const q = document.getElementById('busca').value.toLowerCase();
            const st = document.getElementById('filtro-status').value;
            const filtrados = DATA.items.filter(p => {
                const mt = p.nome.toLowerCase().includes(q);
                const ms = st === 'all' ? true : (st === 'active' ? p.ativo : !p.ativo);
                return mt && ms;
            });

            document.getElementById('grid-items').innerHTML = filtrados.map(p => `
                <div class="bg-white p-5 rounded-2xl border flex flex-col relative ${!p.ativo ? 'opacity-60 grayscale' : ''}">
                    <div class="flex gap-4">
                        <img src="${p.imagem}" class="w-20 h-20 rounded-xl object-cover">
                        <div>
                            <h4 class="font-black">${p.nome}</h4>
                            <p class="text-blue-600 font-bold">R$ ${p.preco.toFixed(2)}</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-center mt-4 pt-4 border-t">
                        <button onclick="toggleActive(${p.id})" class="text-sm font-bold ${p.ativo ? 'text-green-600' : 'text-orange-600'}">
                            ${p.ativo ? '<i class="fa-solid fa-toggle-on text-xl"></i> Ativo' : '<i class="fa-solid fa-toggle-off text-xl"></i> Pausado'}
                        </button>
                        <div class="flex gap-2">
                            <button onclick="editarProduto(${p.id})" class="bg-slate-100 p-2 rounded-lg"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="apagarProduto(${p.id})" class="bg-red-50 text-red-500 p-2 rounded-lg"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');

            // Configs
            document.getElementById('cfg-nome').value = DATA.config.nomeLoja;
            document.getElementById('cfg-wpp').value = DATA.config.whatsapp;
            document.getElementById('cfg-taxa').value = DATA.config.taxaEntrega;
            document.getElementById('cfg-cor').value = DATA.config.corPrincipal || '#2563eb';
            document.getElementById('cfg-rodape').value = DATA.config.rodapeTexto || '';
            
            document.getElementById('horarios-box').innerHTML = dias.map((d, i) => {
                const h = DATA.config.horarios[i];
                return `<div class="flex gap-2 items-center bg-slate-50 p-2 rounded">
                    <span class="w-10 font-bold text-sm">${d}</span>
                    <input type="checkbox" id="h-ab-${i}" ${h.aberto ? 'checked' : ''}>
                    <input type="time" id="h-in-${i}" value="${h.inicio}" class="border rounded p-1">
                    <input type="time" id="h-fi-${i}" value="${h.fim}" class="border rounded p-1">
                </div>`;
            }).join('');
        }

        function addCat() { const v = document.getElementById('in-cat').value; if(v){ DATA.config.categorias.push(v); document.getElementById('in-cat').value=''; renderApp(); } }
        function removeCat(i) { DATA.config.categorias.splice(i,1); renderApp(); }
        function moverCat(i, d) { const n = i+d; if(n>=0 && n<DATA.config.categorias.length) { [DATA.config.categorias[i], DATA.config.categorias[n]] = [DATA.config.categorias[n], DATA.config.categorias[i]]; renderApp(); } }
        function toggleActive(id) { const p = DATA.items.find(x => x.id === id); p.ativo = !p.ativo; renderApp(); }
        function apagarProduto(id) { DATA.items = DATA.items.filter(x => x.id !== id); renderApp(); }

        function addLinhaExtra(n='', p='', lim=1) {
            const div = document.createElement('div'); div.className = "flex gap-2";
            div.innerHTML = `<input type="text" placeholder="Nome" value="${n}" class="ex-n flex-1 border p-2 rounded">
                             <input type="number" placeholder="R$" value="${p}" class="ex-p w-20 border p-2 rounded">
                             <input type="number" placeholder="Max" value="${lim}" title="Limite de escolhas" class="ex-l w-16 border p-2 rounded">
                             <button onclick="this.parentElement.remove()" class="text-red-500"><i class="fa-solid fa-trash"></i></button>`;
            document.getElementById('lista-extras').appendChild(div);
        }

        function abrirModal() {
            document.getElementById('p-id').value = '';
            document.getElementById('p-nome').value = '';
            document.getElementById('p-preco').value = '';
            document.getElementById('p-desc').value = '';
            document.getElementById('p-img').value = '';
            document.getElementById('lista-extras').innerHTML = '';
            document.getElementById('modal-item').classList.remove('hidden');
        }

        function editarProduto(id) {
            const p = DATA.items.find(x => x.id === id);
            document.getElementById('p-id').value = p.id;
            document.getElementById('p-nome').value = p.nome;
            document.getElementById('p-preco').value = p.preco;
            document.getElementById('p-cat').value = p.categoria;
            document.getElementById('p-desc').value = p.descricao;
            document.getElementById('p-img').value = p.imagem;
            document.getElementById('lista-extras').innerHTML = '';
            if(p.extras) p.extras.forEach(e => addLinhaExtra(e.nome, e.preco, e.limite));
            document.getElementById('modal-item').classList.remove('hidden');
        }

        function salvarProduto() {
            const id = document.getElementById('p-id').value;
            const exN = document.querySelectorAll('.ex-n'), exP = document.querySelectorAll('.ex-p'), exL = document.querySelectorAll('.ex-l');
            let extras = [];
            exN.forEach((el, i) => { if(el.value) extras.push({ nome: el.value, preco: parseFloat(exP[i].value)||0, limite: parseInt(exL[i].value)||1 }); });

            const item = {
                id: id ? parseInt(id) : Date.now(),
                nome: document.getElementById('p-nome').value,
                preco: parseFloat(document.getElementById('p-preco').value),
                categoria: document.getElementById('p-cat').value,
                descricao: document.getElementById('p-desc').value,
                imagem: document.getElementById('p-img').value,
                ativo: true,
                extras: extras
            };
            if(id) { const ix = DATA.items.findIndex(x=>x.id==id); DATA.items[ix] = item; } else DATA.items.push(item);
            fecharModal(); renderApp();
        }
        function fecharModal() { document.getElementById('modal-item').classList.add('hidden'); }

        function salvarConfig() {
            DATA.config.nomeLoja = document.getElementById('cfg-nome').value;
            DATA.config.whatsapp = document.getElementById('cfg-wpp').value;
            DATA.config.taxaEntrega = parseFloat(document.getElementById('cfg-taxa').value);
            DATA.config.corPrincipal = document.getElementById('cfg-cor').value;
            DATA.config.rodapeTexto = document.getElementById('cfg-rodape').value;
            dias.forEach((_, i) => {
                DATA.config.horarios[i] = { aberto: document.getElementById(`h-ab-${i}`).checked, inicio: document.getElementById(`h-in-${i}`).value, fim: document.getElementById(`h-fi-${i}`).value };
            });
            alert("Salvo localmente!");
        }

        function salvarCredenciais() {
            localStorage.setItem('gh_token', document.getElementById('gh-token').value);
            localStorage.setItem('gh_repo', document.getElementById('gh-repo').value);
            alert("Conectado!");
        }

        async function salvarNoGitHub() {
            const token = localStorage.getItem('gh_token'), repo = localStorage.getItem('gh_repo');
            if(!token || !repo) return alert("Configure a aba Servidor.");
            try {
                const url = `https://api.github.com/repos/${repo}/contents/produtos.json`;
                const getRes = await fetch(url, { headers: { 'Authorization': `token ${token}` }});
                const getJson = await getRes.json();
                const putRes = await fetch(url, { method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "Update Admin", content: btoa(unescape(encodeURIComponent(JSON.stringify(DATA, null, 2)))), sha: getJson.sha })
                });
                if(putRes.ok) alert("🚀 PRODUTOS.JSON ATUALIZADO NA INTERNET!"); else alert("Erro no token.");
            } catch(e) { alert("Erro de conexão."); }
        }
    </script>
</body>
</html>
