<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin • Delicia Express</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .nav-active { border-bottom: 3px solid rgb(225 29 72); }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
  <div class="max-w-5xl mx-auto">
    <!-- TOP BAR -->
    <div class="bg-black border-b border-zinc-800 px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <div class="text-3xl font-black text-rose-500">DX</div>
        <div>
          <h1 class="text-2xl font-bold text-white">Painel Administrativo</h1>
          <p class="text-xs text-zinc-500">Delicia Express</p>
        </div>
      </div>
      <a href="index.html" 
         class="bg-zinc-900 hover:bg-zinc-800 px-5 py-2.5 rounded-2xl flex items-center gap-2 text-sm">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Voltar para Loja</span>
      </a>
    </div>

    <div class="flex">
      <!-- SIDEBAR -->
      <div class="w-64 bg-zinc-900 h-screen border-r border-zinc-800 p-4">
        <div onclick="showTab(0)" class="tab-button nav-active flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer mb-1 text-white" id="tab-0">
          <i class="fa-solid fa-palette"></i>
          <span class="font-medium">Aparência</span>
        </div>
        <div onclick="showTab(1)" class="tab-button flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer mb-1 hover:bg-zinc-800" id="tab-1">
          <i class="fa-solid fa-clock"></i>
          <span class="font-medium">Horários</span>
        </div>
        <div onclick="showTab(2)" class="tab-button flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer mb-1 hover:bg-zinc-800" id="tab-2">
          <i class="fa-solid fa-tags"></i>
          <span class="font-medium">Categorias</span>
        </div>
        <div onclick="showTab(3)" class="tab-button flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer mb-1 hover:bg-zinc-800" id="tab-3">
          <i class="fa-solid fa-burger"></i>
          <span class="font-medium">Produtos</span>
        </div>
      </div>

      <!-- CONTENT -->
      <div class="flex-1 p-8" id="content-area">
        <!-- TAB 0: APPEARANCE -->
        <div id="tab-content-0">
          <h2 class="text-3xl font-bold mb-8">Personalização da Loja</h2>
          
          <div class="grid grid-cols-2 gap-8">
            <div>
              <label class="block text-sm mb-2 text-zinc-400">Nome da Loja</label>
              <input id="nome-input" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4" value="Delicia Express">
            </div>
            <div>
              <label class="block text-sm mb-2 text-zinc-400">WhatsApp</label>
              <input id="whatsapp-input" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4" value="5511999999999">
            </div>
          </div>

          <div class="mt-8">
            <h3 class="font-semibold mb-4 text-lg">Paleta de Cores</h3>
            <div class="grid grid-cols-4 gap-6">
              <div>
                <label class="block text-xs mb-2">Primária</label>
                <input type="color" id="cor-primaria" value="#e11d48" class="w-full h-12 rounded-xl overflow-hidden">
              </div>
              <div>
                <label class="block text-xs mb-2">Secundária</label>
                <input type="color" id="cor-secundaria" value="#f43f5e" class="w-full h-12 rounded-xl overflow-hidden">
              </div>
              <div>
                <label class="block text-xs mb-2">Fundo</label>
                <input type="color" id="cor-fundo" value="#0f172a" class="w-full h-12 rounded-xl overflow-hidden">
              </div>
              <div>
                <label class="block text-xs mb-2">Texto</label>
                <input type="color" id="cor-texto" value="#f8fafc" class="w-full h-12 rounded-xl overflow-hidden">
              </div>
            </div>
          </div>

          <button onclick="saveConfig()" 
                  class="mt-10 bg-white text-black px-10 py-4 rounded-3xl font-semibold flex items-center gap-2 hover:bg-amber-300">
            <i class="fa-solid fa-floppy-disk"></i>
            SALVAR CONFIGURAÇÕES
          </button>
        </div>

        <!-- TAB 1: HOURS -->
        <div id="tab-content-1" class="hidden">
          <h2 class="text-3xl font-bold mb-6">Horário de Funcionamento</h2>
          <div id="hours-list" class="space-y-4"></div>
        </div>

        <!-- TAB 2: CATEGORIES -->
        <div id="tab-content-2" class="hidden">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-3xl font-bold">Categorias</h2>
            <button onclick="addNewCategory()" 
                    class="bg-emerald-600 px-6 py-3 rounded-3xl text-sm flex items-center gap-2">
              <i class="fa-solid fa-plus"></i> Nova Categoria
            </button>
          </div>
          <div id="categories-list" class="space-y-3"></div>
        </div>

        <!-- TAB 3: PRODUCTS -->
        <div id="tab-content-3" class="hidden">
          <div class="flex justify-between mb-6">
            <h2 class="text-3xl font-bold">Produtos</h2>
            <button onclick="showAddProductModal()" 
                    class="bg-rose-600 px-8 py-3 rounded-3xl text-sm font-medium">+ Novo Produto</button>
          </div>
          <div id="products-admin-list" class="space-y-4"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let config = {};
    let produtosData = {};

    async function loadAllData() {
      const configRes = await fetch('config.json');
      config = await configRes.json();

      const prodRes = await fetch('produtos.json');
      produtosData = await prodRes.json();

      renderAll();
    }

    function renderAll() {
      document.getElementById('nome-input').value = config.nome || '';
      document.getElementById('whatsapp-input').value = config.whatsapp || '';

      document.getElementById('cor-primaria').value = config.corPrimaria || '#e11d48';
      document.getElementById('cor-secundaria').value = config.corSecundaria || '#f43f5e';
      
      renderHours();
      renderCategoriesAdmin();
      renderProductsAdmin();
    }

    function showTab(n) {
      document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('nav-active'));
      document.getElementById(`tab-${n}`).classList.add('nav-active');
      
      document.querySelectorAll('#content-area > div').forEach(div => div.classList.add('hidden'));
      document.getElementById(`tab-content-${n}`).classList.remove('hidden');
    }

    function renderHours() {
      const container = document.getElementById('hours-list');
      const days = ['segunda','terca','quarta','quinta','sexta','sabado','domingo'];
      const dayNames = ['Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado','Domingo'];

      let html = '';
      days.forEach((day, i) => {
        const h = config.horarios[day] || {abertura: '11:00', fechamento: '23:00', fechado: false};
        html += `
          <div class="bg-zinc-900 rounded-3xl p-5 flex items-center gap-6">
            <div class="w-40 font-medium">${dayNames[i]}</div>
            <div class="flex-1 flex items-center gap-4">
              <input type="time" value="${h.abertura}" onchange="updateHour('${day}', 'abertura', this.value)" class="bg-zinc-800 px-4 py-2 rounded-2xl">
              <span class="text-zinc-500">até</span>
              <input type="time" value="${h.fechamento}" onchange="updateHour('${day}', 'fechamento', this.value)" class="bg-zinc-800 px-4 py-2 rounded-2xl">
            </div>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" ${h.fechado ? 'checked' : ''} onchange="toggleDayClosed('${day}', this.checked)">
              <span class="text-xs">Fechado</span>
            </label>
          </div>`;
      });
      container.innerHTML = html;
    }

    function updateHour(day, field, value) {
      if (!config.horarios[day]) config.horarios[day] = {};
      config.horarios[day][field] = value;
    }

    function toggleDayClosed(day, isClosed) {
      if (!config.horarios[day]) config.horarios[day] = {};
      config.horarios[day].fechado = isClosed;
    }

    function renderCategoriesAdmin() {
      const container = document.getElementById('categories-list');
      container.innerHTML = '';

      produtosData.categorias.sort((a,b)=>a.ordem-b.ordem).forEach((cat, index) => {
        const div = document.createElement('div');
        div.className = "bg-zinc-900 rounded-3xl p-5 flex items-center justify-between";
        div.innerHTML = `
          <div class="flex items-center gap-4">
            <span class="text-xl">${cat.nome}</span>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="moveCategory(${index}, -1)" class="w-9 h-9 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">↑</button>
            <button onclick="moveCategory(${index}, 1)" class="w-9 h-9 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">↓</button>
            <button onclick="deleteCategory('${cat.id}')" class="w-9 h-9 bg-red-500/10 text-red-400 hover:bg-red-500/20 rounded-2xl">🗑</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function addNewCategory() {
      const name = prompt("Nome da nova categoria:");
      if (!name) return;
      
      const id = name.toLowerCase().replace(/ /g, '');
      produtosData.categorias.push({
        id: id,
        nome: name,
        ordem: produtosData.categorias.length + 1
      });
      renderCategoriesAdmin();
      saveAllData();
    }

    function moveCategory(index, direction) {
      const cats = produtosData.categorias;
      if (direction === -1 && index > 0) {
        [cats[index], cats[index-1]] = [cats[index-1], cats[index]];
      } else if (direction === 1 && index < cats.length - 1) {
        [cats[index], cats[index+1]] = [cats[index+1], cats[index]];
      }
      renderCategoriesAdmin();
      saveAllData();
    }

    function deleteCategory(id) {
      if (!confirm("Excluir esta categoria?")) return;
      produtosData.categorias = produtosData.categorias.filter(c => c.id !== id);
      renderCategoriesAdmin();
      saveAllData();
    }

    function renderProductsAdmin() {
      const container = document.getElementById('products-admin-list');
      container.innerHTML = '';

      produtosData.produtos.forEach((product, i) => {
        const div = document.createElement('div');
        div.className = `flex items-center gap-5 bg-zinc-900 p-5 rounded-3xl border ${product.ativo ? 'border-emerald-500/30' : 'border-red-500/30'}`;
        div.innerHTML = `
          <img src="${product.imagem}" class="w-20 h-20 object-cover rounded-2xl">
          <div class="flex-1">
            <div class="flex justify-between">
              <div class="font-semibold text-lg">${product.nome}</div>
              <div class="font-mono text-emerald-400">R$ ${product.preco}</div>
            </div>
            <div class="text-xs text-zinc-400">${product.categoria}</div>
          </div>
          <div class="flex gap-3">
            <button onclick="toggleProductStatus(${i})" class="px-5 py-2 text-xs rounded-3xl ${product.ativo ? 'bg-emerald-600' : 'bg-red-600'}">
              ${product.ativo ? 'ATIVO' : 'PAUSADO'}
            </button>
            <button onclick="deleteProduct(${i})" class="px-4 py-2 bg-zinc-800 hover:bg-red-500/20 text-red-400 rounded-3xl">Excluir</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function toggleProductStatus(index) {
      produtosData.produtos[index].ativo = !produtosData.produtos[index].ativo;
      renderProductsAdmin();
      saveAllData();
    }

    function deleteProduct(index) {
      if (confirm("Excluir este produto permanentemente?")) {
        produtosData.produtos.splice(index, 1);
        renderProductsAdmin();
        saveAllData();
      }
    }

    function showAddProductModal() {
      const name = prompt("Nome do produto:");
      if (!name) return;
      
      const price = parseFloat(prompt("Preço (ex: 24.90):"));
      if (!price) return;

      produtosData.produtos.push({
        id: Date.now().toString(),
        nome: name,
        preco: price,
        descricao: "Descrição do produto...",
        categoria: "lanches",
        imagem: "https://picsum.photos/id/201/600/400",
        ativo: true,
        favorito: false
      });

      renderProductsAdmin();
      saveAllData();
    }

    async function saveConfig() {
      config.nome = document.getElementById('nome-input').value;
      config.whatsapp = document.getElementById('whatsapp-input').value;
      config.corPrimaria = document.getElementById('cor-primaria').value;
      config.corSecundaria = document.getElementById('cor-secundaria').value;

      await saveAllData();
      alert("✅ Configurações salvas com sucesso!");
    }

    async function saveAllData() {
      // In real GitHub Pages this would need a backend.
      // For demo we save to localStorage and alert
      localStorage.setItem('delivery_config', JSON.stringify(config));
      localStorage.setItem('delivery_produtos', JSON.stringify(produtosData));
      console.log("💾 Dados salvos no localStorage (demo)");
    }

    // Init
    window.onload = loadAllData;
  </script>
</body>
</html>
