<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl p-8">
        <h1 class="text-4xl font-bold text-center text-red-600 mb-8">📊 Painel de Controle</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <a href="#" class="bg-blue-50 p-6 rounded-2xl text-center hover:scale-105 transition">
                <i class="fas fa-utensils text-5xl text-blue-600 mb-4"></i>
                <h3 class="text-xl font-bold">Gerenciar Produtos</h3>
                <p class="text-gray-500">Adicionar, editar ou remover itens</p>
            </a>

            <a href="#" class="bg-green-50 p-6 rounded-2xl text-center hover:scale-105 transition">
                <i class="fas fa-cog text-5xl text-green-600 mb-4"></i>
                <h3 class="text-xl font-bold">Configurações</h3>
                <p class="text-gray-500">Horário, WhatsApp e Cor do site</p>
            </a>
        </div>

        <div class="text-center mt-10">
            <button onclick="sair()" class="bg-gray-800 text-white px-6 py-3 rounded-xl hover:bg-gray-900">
                <i class="fas fa-sign-out-alt mr-2"></i> Sair
            </button>
        </div>
    </div>

<script>
// 🔐 VERIFICAÇÃO DE SEGURANÇA
window.onload = function(){
    // Verifica se está logado
    if(localStorage.getItem('logado') != 'sim'){
        // Se não estiver, manda para o login
        window.location.href = 'login.html';
    }
}

function sair(){
    localStorage.removeItem('logado');
    window.location.href = 'login.html';
}
</script>
</body>
</html>
