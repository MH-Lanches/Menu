<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Gestor | Ecossistema Autônomo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex h-screen font-sans text-slate-800 overflow-hidden">

    <aside class="w-64 bg-slate-900 text-white p-6 flex flex-col shadow-2xl z-20">
        <h2 class="text-2xl font-black text-emerald-400 mb-8">GESTOR PRO</h2>
        <nav class="flex-1 space-y-2">
            <button onclick="showTab('produtos')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 flex items-center gap-3"><i class="fa-solid fa-burger w-5"></i> Cardápio</button>
            <button onclick="showTab('config')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 flex items-center gap-3"><i class="fa-solid fa-sliders w-5"></i> Operação / Ads</button>
            <button onclick="showTab('sync')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 flex items-center gap-3 text-blue-400"><i class="fa-brands fa-github w-5"></i> Servidor</button>
        </nav>
        <button onclick="salvarNoGitHub(event)" class="mt-auto bg-emerald-600 hover:bg-emerald-700 py-4 rounded-xl font-black flex items-center justify-center gap-2 shadow-lg transition-transform active:scale-95"><i class="fa-solid fa-cloud-arrow-up"></i> PUBLICAR SITE</button>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto relative">
        
        <section id="tab-produtos" class="tab-content active space-y-6">
            <div class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div>
                    <h2 class="text-3xl font-black">Gestão de Cardápio</h2>
                </div>
                <button onclick="abrirModal()" class="bg-slate-900 text-white px-6 py-4 rounded-xl font-bold hover:bg-slate-800 transition-colors shadow-md">+ Adicionar Produto</button>
            </div>

            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Categorias (Arraste para ordenar)</h3>
                <div class="flex gap-2 mb-4 max-w-xl">
                    <input type="text" id="in-cat" placeholder="Nova categoria..." class="flex-1 bg-slate-50 border border-slate-200 p-3 rounded-xl outline-none">
                    <button onclick="addCat()" class="bg-blue-600 text-white px-6 rounded-xl font-bold">Criar</button>
                </div>
                <div id="lista-cats" class="flex flex-wrap gap-2"></div>
            </div>

            <div class="flex gap-4">
                <input type="text" id="busca" oninput="renderApp()" placeholder="Buscar..." class="flex-1 border border-slate-200 p-3 rounded-xl outline-none bg-white">
                <select id="filtro-status" onchange="renderApp()" class="border border-slate-200 p-3 rounded-xl font-bold bg-white outline-none">
                    <option value="all">Todos</option>
                    <option value="active">Ativos</option>
                    <option value="paused">Pausados</option>
                </select>
            </div>

            <div id="grid-items" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20"></div>
        </section>

        <section id="tab-config" class="tab-content hidden space-y-6">
            <h2 class="text-3xl font-black">Operação e Anúncios</h2>
            <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-5">
                    <h3 class="font-black text-lg border-b pb-2">Identidade Visual</h3>
                    <div><label class="font-bold text-xs text-slate-500 uppercase">Nome da Loja</label><input type="text" id="cfg-nome" class="w-full bg-slate-50 border p-3 rounded-xl mt-1"></div>
                    <div><label class="font-bold text-xs text-slate-500 uppercase">WhatsApp</label><input type="text" id="cfg-wpp" class="w-full bg-slate-50 border p-3 rounded-xl mt-1"></div>
                    <div><label class="font-bold text-xs text-slate-500 uppercase">Taxa de Entrega (R$)</label><input type="number" step="0.01" id="cfg-taxa" class="w-full bg-slate-50 border p-3 rounded-xl mt-1"></div>
                    <div><label class="font-bold text-xs text-slate-500 uppercase">Cor do Site</label><input type="color" id="cfg-cor" class="w-full h-12 rounded-xl mt-1"></div>
                    
                    <h3 class="font-black text-lg border-b pb-2 pt-6"><i class="fa-solid fa-rectangle-ad mr-2"></i>Banners de Anúncio</h3>
                    <div id="lista-ads" class="space-y-3"></div>
                    <button onclick="addNovoAd()" class="w-full bg-blue-50 text-blue-600 py-3 rounded-xl font-bold border-2 border-dashed border-blue-200">+ Adicionar Banner</button>
                </div>
                <div class="space-y-5">
                    <h3 class="font-black text-lg border-b pb-2">Horários de Funcionamento</h3>
                    <div id="horarios-box" class="space-y-3"></div>
                    <div class="pt-4"><label class="font-bold text-xs text-slate-500 uppercase">Rodapé</label><input type="text" id="cfg-rodape" class="w-full bg-slate-50 border p-3 rounded-xl mt-1"></div>
                </div>
                <button onclick="salvarConfig()" class="col-span-full bg-slate-900 text-white py-4 rounded-xl font-black shadow-lg">SALVAR CONFIGURAÇÕES LOCAIS</button>
            </div>
        </section>

        <section id="tab-sync" class="tab-content hidden space-y-6">
            <h2 class="text-3xl font-black">Conexão Servidor</h2>
            <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm max-w-xl space-y-4">
                <div><label class="text-[10px] font-black text-slate-400 uppercase">GitHub Token</label><input type="password" id="gh-token" class="w-full bg-slate-50 border p-3 rounded-xl mt-1"></div>
                <div><label class="text-[10px] font-black text-slate-400 uppercase">Repositório (usuario/repo)</label><input type="text" id="gh-repo" class="w-full bg-slate-50 border p-3 rounded-xl mt-1"></div>
                <button onclick="salvarCredenciais()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black">CONECTAR</button>
            </div>
        </section>
    </main>

    <div id="modal-item" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-white w-full max-w-3xl rounded-[2rem] shadow-2xl my-8 relative flex flex-col max-h-[90vh]">
            <div class="p-6 border-b flex justify-between items-center sticky top-0 bg-white z-10 rounded-t-[2rem]">
                <h3 class="text-2xl font-black" id="modal-title">Novo Produto</h3>
                <button onclick="fecharModal()" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="p-8 overflow-y-auto flex-1 bg-slate-50">
                <input type="hidden" id="p-id">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm mb-6 grid grid-cols-2 gap-4">
                    <div class="col-span-2"><label class="text-xs font-bold text-slate-500">Nome</label><input type="text" id="p-nome" class="w-full bg-slate-50 border p-3 rounded-xl"></div>
                    <div><label class="text-xs font-bold text-slate-500">Preço Base (R$)</label><input type="number" step="0.01" id="p-preco" class="w-full bg-slate-50 border p-3 rounded-xl"></div>
                    <div><label class="text-xs font-bold text-slate-500">Categoria</label><select id="p-cat" class="w-full bg-slate-50 border p-3 rounded-xl"></select></div>
                    <div class="col-span-2"><label class="text-xs font-bold text-slate-500">Link da Foto</label><input type="text" id="p-img" class="w-full bg-slate-50 border p-3 rounded-xl"></div>
                    <div class="col-span-2"><label class="text-xs font-bold text-slate-500">Descrição</label><textarea id="p-desc" class="w-full bg-slate-50 border p-3 rounded-xl"></textarea></div>
                </div>

                <div class="bg-orange-50 border border-orange-200 p-6 rounded-2xl mb-6">
                    <div class="flex items-center justify-between">
                        <div><h4 class="font-black text-orange-800 text-lg">Habilitar "Meio a Meio"</h4><p class="text-xs text-orange-600">Soma das metades no preço final</p></div>
                        <input type="checkbox" id="p-is-meio" class="w-6 h-6" onchange="toggleMeioAMeio()">
                    </div>
                    <div id="box-sabores" class="hidden mt-4 pt-4 border-t border-orange-200">
                        <button onclick="addSabor()" class="bg-orange-600 text-white px-4 py-2 rounded-lg text-sm font-bold mb-3">+ Adicionar Sabor</button>
                        <div id="lista-sabores" class="space-y-2"></div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm mb-6">
                    <div class="flex justify-between items-end border-b pb-2 mb-4">
                        <div class="flex-1 mr-4"><label class="text-xs font-bold text-slate-500">Título Grupo 1</label><input type="text" id="g1-nome" class="w-full font-bold border-b p-1"></div>
                        <div class="w-20"><label class="text-xs font-bold text-slate-500">Limite</label><input type="number" id="g1-limite" value="1" class="w-full border p-1 rounded"></div>
                    </div>
                    <button onclick="addAdicional(1)" class="bg-slate-100 px-4 py-2 rounded-lg text-sm font-bold mb-2">+ Opção G1</button>
                    <div id="lista-g1" class="space-y-2"></div>
                </div>

                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <div class="flex justify-between items-end border-b pb-2 mb-4">
                        <div class="flex-1 mr-4"><label class="text-xs font-bold text-slate-500">Título Grupo 2</label><input type="text" id="g2-nome" class="w-full font-bold border-b p-1"></div>
                        <div class="w-20"><label class="text-xs font-bold text-slate-500">Limite</label><input type="number" id="g2-limite" value="1" class="w-full border p-1 rounded"></div>
                    </div>
                    <button onclick="addAdicional(2)" class="bg-slate-100 px-4 py-2 rounded-lg text-sm font-bold mb-2">+ Opção G2</button>
                    <div id="lista-g2" class="space-y-2"></div>
                </div>
            </div>
            
            <div class="p-6 border-t bg-white rounded-b-[2rem] flex justify-end gap-4">
                <button onclick="fecharModal()" class="font-bold text-slate-400 px-4">Cancelar</button>
                <button onclick="salvarProduto()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-black shadow-lg">Salvar Produto</button>
            </div>
        </div>
    </div>

    <script>
        let DATA = { config: { categorias: [], horarios: {}, ads: [] }, items: [] };
        const dias = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];

        window.onload = async () => {
            document.getElementById('gh-token').value = localStorage.getItem('gh_token') || '';
            document.getElementById('gh-repo').value = localStorage.getItem('gh_repo') || '';
            try {
                const res = await fetch('produtos.json', { cache: 'no-store' });
                DATA = await res.json();
                renderApp();
            } catch(e) { console.log("Erro ao carregar banco."); }
        };

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
        }

        function renderApp() {
            // Categorias
            document.getElementById('lista-cats').innerHTML = (DATA.config.categorias || []).map((c, i) => `
                <div class="bg-white border px-3 py-1 rounded-lg flex items-center gap-2 text-sm font-bold">
                    ${c}
                    <button onclick="moverCat(${i}, -1)" class="text-slate-300 hover:text-slate-600"><i class="fa-solid fa-chevron-left"></i></button>
                    <button onclick="moverCat(${i}, 1)" class="text-slate-300 hover:text-slate-600"><i class="fa-solid fa-chevron-right"></i></button>
                    <button onclick="removeCat(${i})" class="text-red-400 hover:text-red-600 ml-1"><i class="fa-solid fa-xmark"></i></button>
                </div>
            `).join('');
            document.getElementById('p-cat').innerHTML = (DATA.config.categorias || []).map(c => `<option value="${c}">${c}</option>`).join('');

            // Banners
            const boxAds = document.getElementById('lista-ads');
            boxAds.innerHTML = (DATA.config.ads || []).map((ad, i) => `
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-200 space-y-2">
                    <div class="flex justify-between items-center text-[10px] font-black text-slate-400 uppercase">
                        <span>Banner #${i+1}</span>
                        <button onclick="removerAd(${i})" class="text-red-500"><i class="fa-solid fa-trash"></i></button>
                    </div>
                    <input type="text" placeholder="URL Imagem" value="${ad.imagem}" onchange="updateAd(${i}, 'imagem', this.value)" class="w-full p-2 border rounded-lg text-xs">
                    <input type="text" placeholder="Link (opcional)" value="${ad.link || ''}" onchange="updateAd(${i}, 'link', this.value)" class="w-full p-2 border rounded-lg text-xs">
                    <label class="flex items-center gap-2 text-[10px] font-bold"><input type="checkbox" ${ad.ativo ? 'checked' : ''} onchange="updateAd(${i}, 'ativo', this.checked)"> ATIVO</label>
                </div>
            `).join('');

            // Grid de Produtos
            const q = document.getElementById('busca').value.toLowerCase();
            const st = document.getElementById('filtro-status').value;
            const filtrados = (DATA.items || []).filter(p => {
                const mt = p.nome.toLowerCase().includes(q);
                const ms = st === 'all' ? true : (st === 'active' ? p.ativo : !p.ativo);
                return mt && ms;
            });

            document.getElementById('grid-items').innerHTML = filtrados.map(p => `
                <div class="bg-white p-4 rounded-2xl border shadow-sm flex flex-col transition-all ${!p.ativo ? 'opacity-50 grayscale' : ''}">
                    <div class="flex gap-4">
                        <img src="${p.imagem}" class="w-20 h-20 rounded-xl object-cover">
                        <div class="flex-1">
                            <h4 class="font-black text-slate-800 leading-tight">${p.nome}</h4>
                            <p class="text-blue-600 font-black text-sm mt-1">R$ ${p.preco.toFixed(2)}</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-center mt-4 pt-4 border-t">
                        <button onclick="toggleActive(${p.id})" class="text-xs font-black px-2 py-1 rounded bg-slate-100">${p.ativo ? '🟢 ATIVO' : '🔴 PAUSADO'}</button>
                        <div class="flex gap-2">
                            <button onclick="editarProduto(${p.id})" class="p-2 bg-slate-50 rounded-lg hover:bg-blue-500 hover:text-white transition-colors"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="apagarProduto(${p.id})" class="p-2 bg-red-50 text-red-500 rounded-lg hover:bg-red-500 hover:text-white transition-colors"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');

            // Configs Gerais e Horários
            document.getElementById('cfg-nome').value = DATA.config.nomeLoja || '';
            document.getElementById('cfg-wpp').value = DATA.config.whatsapp || '';
            document.getElementById('cfg-taxa').value = DATA.config.taxaEntrega || 0;
            document.getElementById('cfg-cor').value = DATA.config.corPrincipal || '#ea1d2c';
            document.getElementById('cfg-rodape').value = DATA.config.rodapeTexto || '';
            
            document.getElementById('horarios-box').innerHTML = dias.map((d, i) => {
                const h = DATA.config.horarios[i] || { aberto: true, inicio: "18:00", fim: "23:59" };
                return `<div class="flex gap-2 items-center bg-slate-50 p-2 rounded-xl border">
                    <input type="checkbox" id="h-ab-${i}" ${h.aberto ? 'checked' : ''}>
                    <span class="w-8 font-black text-xs text-slate-600">${d}</span>
                    <input type="time" id="h-in-${i}" value="${h.inicio}" class="text-xs border p-1 rounded">
                    <span class="text-slate-400">às</span>
                    <input type="time" id="h-fi-${i}" value="${h.fim}" class="text-xs border p-1 rounded">
                </div>`;
            }).join('');
        }

        // Funções Auxiliares
        function addCat() { const v = document.getElementById('in-cat').value.trim(); if(v && !DATA.config.categorias.includes(v)){ DATA.config.categorias.push(v); document.getElementById('in-cat').value=''; renderApp(); } }
        function removeCat(i) { DATA.config.categorias.splice(i,1); renderApp(); }
        function moverCat(i, d) { const n = i+d; if(n>=0 && n<DATA.config.categorias.length) { [DATA.config.categorias[i], DATA.config.categorias[n]] = [DATA.config.categorias[n], DATA.config.categorias[i]]; renderApp(); } }
        function toggleActive(id) { const p = DATA.items.find(x => x.id === id); p.ativo = !p.ativo; renderApp(); }
        function addNovoAd() { if(!DATA.config.ads) DATA.config.ads = []; DATA.config.ads.push({ id: Date.now(), imagem: '', link: '', ativo: true }); renderApp(); }
        function updateAd(i, campo, valor) { DATA.config.ads[i][campo] = valor; }
        function removerAd(i) { DATA.config.ads.splice(i, 1); renderApp(); }
        function toggleMeioAMeio() { document.getElementById('box-sabores').classList.toggle('hidden', !document.getElementById('p-is-meio').checked); }
        function addSabor(n='', p=0) { document.getElementById('lista-sabores').appendChild(criarLinha(n, p, 'sab')); }
        function addAdicional(g, n='', p=0) { document.getElementById(`lista-g${g}`).appendChild(criarLinha(n, p, `g${g}`)); }
        function criarLinha(n, p, pre) {
            const div = document.createElement('div');
            div.className = "flex gap-2 items-center bg-white p-2 rounded-lg border";
            div.innerHTML = `<input type="text" value="${n}" class="${pre}-n flex-1 text-sm outline-none" placeholder="Nome">
                             <input type="number" step="0.01" value="${p}" class="${pre}-p w-20 text-sm outline-none" placeholder="Preço">
                             <button onclick="this.parentElement.remove()" class="text-red-400"><i class="fa-solid fa-trash"></i></button>`;
            return div;
        }

        function abrirModal() {
            document.getElementById('p-id').value = ''; document.getElementById('p-nome').value = '';
            document.getElementById('p-preco').value = ''; document.getElementById('p-img').value = '';
            document.getElementById('p-desc').value = ''; document.getElementById('p-is-meio').checked = false;
            document.getElementById('lista-sabores').innerHTML = ''; document.getElementById('lista-g1').innerHTML = '';
            document.getElementById('lista-g2').innerHTML = ''; toggleMeioAMeio();
            document.getElementById('modal-item').classList.remove('hidden');
        }

        function editarProduto(id) {
            const p = DATA.items.find(x => x.id === id);
            document.getElementById('p-id').value = p.id; document.getElementById('p-nome').value = p.nome;
            document.getElementById('p-preco').value = p.preco; document.getElementById('p-cat').value = p.categoria;
            document.getElementById('p-img').value = p.imagem; document.getElementById('p-desc').value = p.descricao;
            document.getElementById('p-is-meio').checked = !!p.meio_a_meio;
            toggleMeioAMeio();
            if(p.sabores) p.sabores.forEach(s => addSabor(s.nome, s.preco));
            if(p.grupos && p.grupos[0]) p.grupos[0].itens.forEach(i => addAdicional(1, i.nome, i.preco));
            if(p.grupos && p.grupos[1]) p.grupos[1].itens.forEach(i => addAdicional(2, i.nome, i.preco));
            document.getElementById('modal-item').classList.remove('hidden');
        }

        function extrair(pre) {
            const n = document.querySelectorAll(`.${pre}-n`), p = document.querySelectorAll(`.${pre}-p`);
            return Array.from(n).map((el, i) => ({ nome: el.value, preco: parseFloat(p[i].value) || 0 })).filter(x => x.nome);
        }

        function salvarProduto() {
            const id = document.getElementById('p-id').value ? parseInt(document.getElementById('p-id').value) : Date.now();
            const p = {
                id, nome: document.getElementById('p-nome').value, preco: parseFloat(document.getElementById('p-preco').value)||0,
                categoria: document.getElementById('p-cat').value, imagem: document.getElementById('p-img').value,
                descricao: document.getElementById('p-desc').value, ativo: true,
                meio_a_meio: document.getElementById('p-is-meio').checked,
                sabores: document.getElementById('p-is-meio').checked ? extrair('sab') : [],
                grupos: [
                    { nome: document.getElementById('g1-nome').value, limite: parseInt(document.getElementById('g1-limite').value)||1, itens: extrair('g1') },
                    { nome: document.getElementById('g2-nome').value, limite: parseInt(document.getElementById('g2-limite').value)||1, itens: extrair('g2') }
                ]
            };
            const idx = DATA.items.findIndex(x => x.id === id);
            if(idx > -1) DATA.items[idx] = p; else DATA.items.push(p);
            fecharModal(); renderApp();
        }

        function fecharModal() { document.getElementById('modal-item').classList.add('hidden'); }

        function salvarConfig() {
            DATA.config.nomeLoja = document.getElementById('cfg-nome').value;
            DATA.config.whatsapp = document.getElementById('cfg-wpp').value;
            DATA.config.taxaEntrega = parseFloat(document.getElementById('cfg-taxa').value)||0;
            DATA.config.corPrincipal = document.getElementById('cfg-cor').value;
            DATA.config.rodapeTexto = document.getElementById('cfg-rodape').value;
            dias.forEach((_, i) => {
                DATA.config.horarios[i] = { aberto: document.getElementById(`h-ab-${i}`).checked, inicio: document.getElementById(`h-in-${i}`).value, fim: document.getElementById(`h-fi-${i}`).value };
            });
            alert("Configurações locais salvas! Publique para aplicar no site.");
        }

        function salvarCredenciais() {
            localStorage.setItem('gh_token', document.getElementById('gh-token').value);
            localStorage.setItem('gh_repo', document.getElementById('gh-repo').value);
            alert("Credenciais salvas no navegador!");
        }

        async function salvarNoGitHub(e) {
            const btn = e.currentTarget; const token = localStorage.getItem('gh_token'), repo = localStorage.getItem('gh_repo');
            if(!token || !repo) return alert("Configure o Servidor.");
            btn.innerHTML = "... Salvando ...";
            try {
                const url = `https://api.github.com/repos/${repo}/contents/produtos.json`;
                const gRes = await fetch(url, { headers: { 'Authorization': `token ${token}` }, cache: 'no-store' });
                const gJ = await gRes.json();
                const pRes = await fetch(url, { method: 'PUT', headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({ message: "Update", content: btoa(unescape(encodeURIComponent(JSON.stringify(DATA, null, 2)))), sha: gJ.sha || null })
                });
                if(pRes.ok) alert("🚀 SITE PUBLICADO COM SUCESSO!");
            } catch(e) { alert("Erro de conexão."); }
            btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> PUBLICAR SITE';
        }
    </script>
</body>
</html>
