<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Delivery Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <i class="fas fa-motorcycle text-orange-500 text-2xl"></i>
                    <h1 class="text-2xl font-bold text-gray-800">Delivery <span class="text-orange-500">Express</span></h1>
                </div>
                <nav class="flex items-center gap-6">
                    <a href="admin.html" class="text-orange-500 font-medium">Painel Admin</a>
                    <a href="index.html" class="text-gray-600 hover:text-orange-500 transition-colors">Ver Site</a>
                </nav>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">
            <i class="fas fa-cog mr-2 text-orange-500"></i>Painel Administrativo
        </h1>
        
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-md p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Total de Itens</p>
                        <p id="totalItems" class="text-3xl font-bold text-gray-800">0</p>
                    </div>
                    <div class="bg-orange-100 p-4 rounded-full">
                        <i class="fas fa-utensils text-orange-500 text-2xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Pizzas</p>
                        <p id="totalPizzas" class="text-3xl font-bold text-gray-800">0</p>
                    </div>
                    <div class="bg-red-100 p-4 rounded-full">
                        <i class="fas fa-pizza-slice text-red-500 text-2xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Hambúrgueres</p>
                        <p id="totalBurgers" class="text-3xl font-bold text-gray-800">0</p>
                    </div>
                    <div class="bg-yellow-100 p-4 rounded-full">
                        <i class="fas fa-hamburger text-yellow-500 text-2xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Bebidas</p>
                        <p id="totalDrinks" class="text-3xl font-bold text-gray-800">0</p>
                    </div>
                    <div class="bg-blue-100 p-4 rounded-full">
                        <i class="fas fa-glass-cheers text-blue-500 text-2xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Product Form -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-8">
            <h2 class="text-xl font-bold text-gray-800 mb-6">
                <i class="fas fa-plus-circle mr-2 text-green-500"></i>Adicionar Novo Item ao Cardápio
            </h2>
            <form id="productForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Nome do Item</label>
                        <input type="text" id="productName" required placeholder="Ex: Pizza de Calabresa" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Preço (R$)</label>
                        <input type="number" step="0.01" id="productPrice" required placeholder="0.00" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Categoria</label>
                        <select id="productCategory" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                            <option value="">Selecione uma categoria</option>
                            <option value="Pizzas">🍕 Pizzas</option>
                            <option value="Hambúrgueres">🍔 Hambúrgueres</option>
                            <option value="Bebidas">🥤 Bebidas</option>
                            <option value="Acompanhamentos">🍟 Acompanhamentos</option>
                            <option value="Sobremesas">🍨 Sobremesas</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">URL da Imagem</label>
                        <input type="url" id="productImage" required placeholder="https://..." class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Descrição</label>
                        <textarea id="productDescription" rows="2" required placeholder="Descreva o item..." class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent"></textarea>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="productDestaque" class="w-5 h-5 text-orange-500 rounded focus:ring-orange-500">
                        <span class="text-sm text-gray-700">Marcar como destaque</span>
                    </label>
                </div>
                <button type="submit" class="bg-orange-500 text-white px-8 py-3 rounded-lg font-semibold hover:bg-orange-600 transition-colors">
                    <i class="fas fa-save mr-2"></i>Adicionar Item
                </button>
            </form>
        </div>

        <!-- Products List -->
        <div class="bg-white rounded-xl shadow-md p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-6">
                <i class="fas fa-list mr-2 text-blue-500"></i>Itens do Cardápio
            </h2>
            <div class="overflow-x-auto">
                <table class="min-w-full">
                    <thead>
                        <tr class="bg-gray-50">
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Item</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Categoria</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Preço</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Destaque</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody" class="divide-y divide-gray-200">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-full opacity-0 transition-all duration-300 z-50">
        <i class="fas fa-check-circle mr-2"></i>
        <span id="toastMessage">Sucesso!</span>
    </div>

    <script>
        let produtos = [];

        async function loadProducts() {
            try {
                const response = await fetch('produtos.json');
                produtos = await response.json();
                renderProducts();
                updateStats();
            } catch (error) {
                console.error('Erro ao carregar produtos:', error);
                showToast('Erro ao carregar produtos', 'error');
            }
        }

        function renderProducts() {
            const tbody = document.getElementById('productTableBody');
            tbody.innerHTML = '';
            
            produtos.forEach((produto, index) => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50';
                tr.innerHTML = `
                    <td class="px-6 py-4">
                        <div class="flex items-center">
                            <img class="h-12 w-12 rounded-lg object-cover" src="${produto.imagem}" alt="${produto.nome}">
                            <div class="ml-4">
                                <div class="text-sm font-medium text-gray-900">${produto.nome}</div>
                                <div class="text-xs text-gray-500">${produto.descricao.substring(0, 30)}...</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 text-xs font-medium rounded-full ${getCategoryColor(produto.categoria)}">
                            ${getCategoryIcon(produto.categoria)} ${produto.categoria}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-sm font-semibold text-gray-900">R$ ${produto.preco.toFixed(2)}</td>
                    <td class="px-6 py-4">
                        ${produto.destaque ? '<span class="text-green-500"><i class="fas fa-star"></i> Sim</span>' : '<span class="text-gray-400">Não</span>'}
                    </td>
                    <td class="px-6 py-4">
                        <button onclick="deleteProduct(${index})" class="text-red-500 hover:text-red-700 transition-colors" title="Excluir">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function getCategoryColor(categoria) {
            const colors = {
                'Pizzas': 'bg-red-100 text-red-800',
                'Hambúrgueres': 'bg-yellow-100 text-yellow-800',
                'Bebidas': 'bg-blue-100 text-blue-800',
                'Acompanhamentos': 'bg-green-100 text-green-800',
                'Sobremesas': 'bg-pink-100 text-pink-800'
            };
            return colors[categoria] || 'bg-gray-100 text-gray-800';
        }

        function getCategoryIcon(categoria) {
            const icons = {
                'Pizzas': '🍕',
                'Hambúrgueres': '🍔',
                'Bebidas': '🥤',
                'Acompanhamentos': '🍟',
                'Sobremesas': '🍨'
            };
            return icons[categoria] || '🍽️';
        }

        function updateStats() {
            document.getElementById('totalItems').textContent = produtos.length;
            document.getElementById('totalPizzas').textContent = produtos.filter(p => p.categoria === 'Pizzas').length;
            document.getElementById('totalBurgers').textContent = produtos.filter(p => p.categoria === 'Hambúrgueres').length;
            document.getElementById('totalDrinks').textContent = produtos.filter(p => p.categoria === 'Bebidas').length;
        }

        function deleteProduct(index) {
            if (confirm('Tem certeza que deseja excluir este item?')) {
                produtos.splice(index, 1);
                renderProducts();
                updateStats();
                updateJSON();
                showToast('Item excluído com sucesso!');
            }
        }

        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newProduct = {
                id: Date.now(),
                nome: document.getElementById('productName').value,
                preco: parseFloat(document.getElementById('productPrice').value),
                categoria: document.getElementById('productCategory').value,
                imagem: document.getElementById('productImage').value,
                descricao: document.getElementById('productDescription').value,
                destaque: document.getElementById('productDestaque').checked
            };

            produtos.push(newProduct);
            renderProducts();
            updateStats();
            updateJSON();
            this.reset();
            showToast('Item adicionado com sucesso!');
        });

        function updateJSON() {
            console.log('JSON atualizado:', JSON.stringify(produtos, null, 2));
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg transform transition-all duration-300 z-50 ${type === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white`;
            
            toast.classList.remove('translate-y-full', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-full', 'opacity-0');
            }, 3000);
        }

        loadProducts();
    </script>
</body>
</html>
