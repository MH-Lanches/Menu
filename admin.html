<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div class="max-w-6xl mx-auto bg-white rounded-3xl shadow-2xl p-8">
        <h1 class="text-4xl font-bold text-center text-red-600 mb-8">📊 Painel de Controle</h1>
        
        <!-- BOTÕES PRINCIPAIS -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <button onclick="abrirSecao('produtos')" class="bg-blue-50 p-6 rounded-2xl text-center hover:scale-105 transition">
                <i class="fas fa-utensils text-5xl text-blue-600 mb-4"></i>
                <h3 class="text-xl font-bold">Gerenciar Produtos</h3>
                <p class="text-gray-500">Adicionar, editar ou ordenar itens</p>
            </button>

            <button onclick="abrirSecao('categorias')" class="bg-purple-50 p-6 rounded-2xl text-center hover:scale-105 transition">
                <i class="fas fa-list text-5xl text-purple-600 mb-4"></i>
                <h3 class="text-xl font-bold">Ordenar Categorias</h3>
                <p class="text-gray-500">Definir posição na tela</p>
            </button>

            <button onclick="abrirSecao('config')" class="bg-green-50 p-6 rounded-2xl text-center hover:scale-105 transition">
                <i class="fas fa-cog text-5xl text-green-600 mb-4"></i>
                <h3 class="text-xl font-bold">Configurações</h3>
                <p class="text-gray-500">Horário, Frete, Minimo</p>
            </button>
        </div>

        <!-- ============== SEÇÃO PRODUTOS ============== -->
        <div id="secao-produtos" class="hidden">
            <h2 class="text-2xl font-bold mb-4">📦 Produtos</h2>
            
            <!-- FORM NOVO PRODUTO -->
            <div class="bg-gray-50 p-6 rounded-xl mb-6 border">
                <h3 class="font-bold text-lg mb-3">➕ Adicionar Novo Produto</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="prod-nome" placeholder="Nome do Produto" class="border p-3 rounded">
                    <input type="number" step="0.01" id="prod-preco" placeholder="Preço Base" class="border p-3 rounded">
                    <input type="text" id="prod-cat" placeholder="Categoria" class="border p-3 rounded">
                    <input type="text" id="prod-img" placeholder="URL da Imagem" class="border p-3 rounded">
                    <textarea id="prod-desc" placeholder="Descrição" class="border p-3 rounded col-span-2"></textarea>

                    <!-- NOVO: TIPO PRODUTO -->
                    <div class="col-span-2 flex gap-4">
                        <label class="flex items-center gap-2">
                            <input type="checkbox" id="prod-ispizza"> É Pizza (Meia a Meia)
                        </label>
                    </div>

                    <!-- ADICIONAIS -->
                    <div class="col-span-2 border-t pt-4 mt-2">
                        <h4 class="font-bold mb-2">🥗 Configurar Adicionais</h4>
                        <div id="lista-adicionais-admin" class="space-y-2 mb-3">
                            <!-- Itens adicionados via JS -->
                        </div>
                        <button onclick="addCampoAdicional()" class="bg-blue-500 text-white px-3 py-1 rounded text-sm">
                            <i class="fas fa-plus"></i> Adicionar Opção
                        </button>
                        <input type="number" id="prod-limite" placeholder="Limite de escolhas (ex: 5)" class="border p-2 rounded ml-2 w-32">
                    </div>
                </div>
                <button onclick="salvarProduto()" class="mt-4 bg-blue-600 text-white px-6 py-3 rounded font-bold">
                    <i class="fas fa-save"></i> SALVAR PRODUTO
                </button>
            </div>

            <!-- LISTA PRODUTOS -->
            <h3 class="font-bold text-lg mb-3">📋 Ordenar Produtos <small>(Use as setas)</small></h3>
            <div id="lista-produtos-admin" class="space-y-3">
                <!-- Itens aqui -->
            </div>
        </div>

        <!-- ============== SEÇÃO CATEGORIAS ============== -->
        <div id="secao-categorias" class="hidden">
            <h2 class="text-2xl font-bold mb-4">📑 Ordenar Categorias</h2>
            <div id="lista-categorias" class="space-y-3">
                <!-- Ordenação aqui -->
            </div>
            <p class="text-sm text-green-600 mt-4">✅ Ordem salva automaticamente ao clicar nas setas.</p>
        </div>

        <!-- ============== SEÇÃO CONFIG ============== -->
        <div id="secao-config" class="hidden">
            <h2 class="text-2xl font-bold mb-4">⚙️ Configurações Gerais</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <!-- DADOS GERAIS -->
                <div class="bg-gray-50 p-5 rounded-xl border">
                    <h4 class="font-bold mb-3">🏪 Dados da Loja</h4>
                    <input id="config-nome" placeholder="Nome da Loja" class="w-full border p-3 rounded mb-3">
                    <input id="config-whatsapp" placeholder="WhatsApp" class="w-full border p-3 rounded">
                </div>

                <!-- VALORES -->
                <div class="bg-blue-50 p-5 rounded-xl border">
                    <h4 class="font-bold mb-3">💰 Valores e Taxas</h4>
                    <input type="number" step="0.01" id="config-frete" placeholder="Taxa de Entrega" class="w-full border p-3 rounded mb-3">
                    <input type="number" step="0.01" id="config-minimo" placeholder="Pedido Mínimo" class="w-full border p-3 rounded">
                </div>

                <!-- HORARIO -->
                <div class="bg-yellow-50 p-5 rounded-xl border col-span-2">
                    <h4 class="font-bold mb-3">⏰ Horário de Funcionamento</h4>
                    
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                        <label class="flex items-center gap-2 bg-white p-2 rounded border">Seg <input type="checkbox" id="dia-seg"></label>
                        <label class="flex items-center gap-2 bg-white p-2 rounded border">Ter <input type="checkbox" id="dia-ter"></label>
                        <label class="flex items-center gap-2 bg-white p-2 rounded border">Qua <input type="checkbox" id="dia-qua"></label>
                        <label class="flex items-center gap-2 bg-white p-2 rounded border">Qui <input type="checkbox" id="dia-qui"></label>
                        <label class="flex items-center gap-2 bg-white p-2 rounded border">Sex <input type="checkbox" id="dia-sex"></label>
                        <label class="flex items-center gap-2 bg-white p-2 rounded border">Sab <input type="checkbox" id="dia-sab"></label>
                        <label class="flex items-center gap-2 bg-white p-2 rounded border">Dom <input type="checkbox" id="dia-dom"></label>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label>Hora Início</label>
                            <input type="time" id="hora-ini" class="w-full border p-3 rounded">
                        </div>
                        <div>
                            <label>Hora Fim</label>
                            <input type="time" id="hora-fim" class="w-full border p-3 rounded">
                        </div>
                    </div>

                    <div class="mt-4">
                        <label class="flex items-center gap-2 text-red-600 font-bold bg-red-50 p-3 rounded border border-red-200 cursor-pointer">
                            <input type="checkbox" id="config-fechado"> Forçar Loja Fechada
                        </label>
                    </div>
                </div>

            </div>

            <button onclick="salvarConfig()" class="mt-6 bg-green-600 text-white px-8 py-3 rounded font-bold text-lg">
                <i class="fas fa-check-circle"></i> SALVAR TUDO
            </button>
        </div>

        <div class="text-center mt-10">
            <button onclick="sair()" class="bg-gray-800 text-white px-6 py-3 rounded-xl hover:bg-gray-900">
                <i class="fas fa-sign-out-alt mr-2"></i> Sair
            </button>
        </div>
    </div>

<script>
// 🔐 SEGURANÇA
if(localStorage.getItem('logado') != 'sim'){
    window.location.href = 'login.html';
}

// ESTRUTURA COMPLETA
const dadosPadrao = {
    config: { 
        nome: "MH Lanches", 
        whatsapp: "5581999999999",
        frete: 0.00,
        minimo: 0.00,
        diasFunc: [0,1,2,3,4],
        horaIni: "18:00",
        horaFim: "23:00",
        lojaFechada: false
    },
    categorias: ["Lanches", "Pizzas", "Bebidas", "Porções"],
    produtos: [
        {
            "id": 1, 
            "nome": "Hambúrguer Artesanal", 
            "desc": "Pão brioche, carne 150g, queijo, bacon e molho especial", 
            "preco": 25.90, 
            "cat": "Lanches", 
            "img": "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500",
            "isPizza": false,
            "adicionais": [
                {"nome": "Bacon Extra", "preco": 3.00},
                {"nome": "Ovo", "preco": 1.50}
            ],
            "limiteAdicionais": 2
        },
        {
            "id": 2, 
            "nome": "Pizza Calabresa / Mussarela", 
            "desc": "Pizza grande meia a meia", 
            "preco": 35.00, 
            "cat": "Pizzas", 
            "img": "https://images.unsplash.com/photo-1574071318508-1cdbab80d002?w=500",
            "isPizza": true,
            "adicionais": [],
            "limiteAdicionais": 0
        }
    ]
};

let dadosSite = {};
let contadorAdicionais = 0;

// CARREGA
function carregarDados(){
    const salvos = localStorage.getItem('dados_site');
    if(salvos){
        dadosSite = JSON.parse(salvos);
    } else {
        dadosSite = {...dadosPadrao};
        salvar();
    }
    renderizarProdutosAdmin();
    renderizarCategoriasAdmin();
    carregarConfig();
}

// NAVEGAÇÃO
function abrirSecao(secao){
    document.querySelectorAll('[id^="secao-"]').forEach(el => el.classList.add('hidden'));
    document.getElementById('secao-' + secao).classList.remove('hidden');
}

// ======= ADICIONAIS NO FORM =======
function addCampoAdicional(){
    const div = document.createElement('div');
    div.className = 'flex gap-2 items-center';
    div.innerHTML = `
        <input type="text" id="add-nome-${contadorAdicionais}" placeholder="Nome do Adicional" class="border p-2 rounded flex-1">
        <input type="number" step="0.01" id="add-preco-${contadorAdicionais}" placeholder="Preço +R$" class="border p-2 rounded w-32">
        <button onclick="this.parentElement.remove()" class="text-red-500"><i class="fas fa-times"></i></button>
    `;
    document.getElementById('lista-adicionais-admin').appendChild(div);
    contadorAdicionais++;
}

function pegarAdicionaisDoForm(){
    let lista = [];
    for(let i=0; i<contadorAdicionais; i++){
        const nome = document.getElementById(`add-nome-${i}`)?.value;
        const preco = parseFloat(document.getElementById(`add-preco-${i}`)?.value);
        if(nome && preco){
            lista.push({nome, preco});
        }
    }
    return lista;
}

// ======= PRODUTOS =======
function renderizarProdutosAdmin(){
    const container = document.getElementById('lista-produtos-admin');
    container.innerHTML = '';
    dadosSite.produtos.forEach((p, i) => {
        container.innerHTML += `
        <div class="border p-4 rounded flex justify-between items-center bg-white">
            <img src="${p.img}" class="w-16 h-16 rounded object-cover">
            <div class="flex-1 ml-4">
                <h4 class="font-bold">${p.nome} ${p.isPizza ? '🍕' : ''}</h4>
                <p class="text-sm text-gray-500">${p.cat} | R$ ${p.preco.toFixed(2)}</p>
            </div>
            <div class="flex gap-2">
                <button onclick="moverOrdem(${i}, -1)" class="text-gray-600"><i class="fas fa-arrow-up"></i></button>
                <button onclick="moverOrdem(${i}, 1)" class="text-gray-600"><i class="fas fa-arrow-down"></i></button>
                <button onclick="excluirProduto(${i})" class="text-red-500"><i class="fas fa-trash"></i></button>
            </div>
        </div>`;
    });
}

function moverOrdem(index, dir){
    const lista = dadosSite.produtos;
    const alvo = index + dir;
    if(alvo >=0 && alvo < lista.length){
        [lista[index], lista[alvo]] = [lista[alvo], lista[index]];
        salvar();
    }
}

function salvarProduto(){
    const nome = document.getElementById('prod-nome').value;
    const preco = parseFloat(document.getElementById('prod-preco').value);
    const cat = document.getElementById('prod-cat').value;
    const img = document.getElementById('prod-img').value;
    const desc = document.getElementById('prod-desc').value;
    const isPizza = document.getElementById('prod-ispizza').checked;
    const limite = parseInt(document.getElementById('prod-limite').value) || 0;

    if(!nome || !preco) { alert("Preencha nome e preço!"); return; }

    const novoProduto = {
        id: Date.now(),
        nome, preco, cat, img, desc,
        isPizza: isPizza,
        adicionais: pegarAdicionaisDoForm(),
        limiteAdicionais: limite
    };

    dadosSite.produtos.push(novoProduto);
    salvar();
    
    // Limpa
    document.querySelectorAll('#lista-adicionais-admin div').forEach(d => d.remove());
    contadorAdicionais = 0;
    document.getElementById('prod-nome').value='';
    document.getElementById('prod-preco').value='';
    document.getElementById('prod-cat').value='';
    document.getElementById('prod-img').value='';
    document.getElementById('prod-desc').value='';
    document.getElementById('prod-ispizza').checked=false;
    document.getElementById('prod-limite').value='';
}

function excluirProduto(i){
    if(confirm("Tem certeza?")){
        dadosSite.produtos.splice(i,1);
        salvar();
    }
}

// ======= CATEGORIAS =======
function renderizarCategoriasAdmin(){
    const container = document.getElementById('lista-categorias');
    container.innerHTML = '';
    dadosSite.categorias.forEach((cat, i) => {
        container.innerHTML += `
        <div class="border p-4 rounded flex items-center justify-between bg-gray-50">
            <span class="font-bold">${cat}</span>
            <div class="flex gap-2">
                <button onclick="moverCat(${i}, -1)" class="text-purple-600"><i class="fas fa-chevron-up"></i></button>
                <button onclick="moverCat(${i}, 1)" class="text-purple-600"><i class="fas fa-chevron-down"></i></button>
            </div>
        </div>`;
    });
}

function moverCat(index, dir){
    const lista = dadosSite.categorias;
    const alvo = index + dir;
    if(alvo >=0 && alvo < lista.length){
        [lista[index], lista[alvo]] = [lista[alvo], lista[index]];
        salvar(); // ✅ Agora salva na hora!
    }
}

// ======= CONFIGURAÇÕES =======
function carregarConfig(){
    document.getElementById('config-nome').value = dadosSite.config.nome;
    document.getElementById('config-whatsapp').value = dadosSite.config.whatsapp;
    document.getElementById('config-frete').value = dadosSite.config.frete;
    document.getElementById('config-minimo').value = dadosSite.config.minimo;
    document.getElementById('hora-ini').value = dadosSite.config.horaIni;
    document.getElementById('hora-fim').value = dadosSite.config.horaFim;
    document.getElementById('config-fechado').checked = dadosSite.config.lojaFechada;

    const dias = ['seg','ter','qua','qui','sex','sab','dom'];
    dias.forEach((d, idx) => {
        const el = document.getElementById(`dia-${d}`);
        if(el) el.checked = dadosSite.config.diasFunc.includes(idx);
    });
}

function salvarConfig(){
    dadosSite.config.nome = document.getElementById('config-nome').value;
    dadosSite.config.whatsapp = document.getElementById('config-whatsapp').value;
    dadosSite.config.frete = parseFloat(document.getElementById('config-frete').value) || 0;
    dadosSite.config.minimo = parseFloat(document.getElementById('config-minimo').value) || 0;
    dadosSite.config.horaIni = document.getElementById('hora-ini').value;
    dadosSite.config.horaFim = document.getElementById('hora-fim').value;
    dadosSite.config.lojaFechada = document.getElementById('config-fechado').checked;

    dadosSite.config.diasFunc = [];
    const map = [0,1,2,3,4,5,6];
    const dias = ['seg','ter','qua','qui','sex','sab','dom'];
    dias.forEach((d, i) => {
        if(document.getElementById(`dia-${d}`).checked) dadosSite.config.diasFunc.push(map[i]);
    });

    salvar();
    alert("✅ Configurações salvas!");
}

// ======= GERAL =======
function salvar(){
    localStorage.setItem('dados_site', JSON.stringify(dadosSite));
    renderizarProdutosAdmin();
    renderizarCategoriasAdmin();
}

function sair(){
    localStorage.removeItem('logado');
    window.location.href = 'login.html';
}

// INICIA
carregarDados();
</script>
</body>
</html>
