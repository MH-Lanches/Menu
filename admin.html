<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <div class="max-w-6xl mx-auto bg-white rounded-3xl shadow-2xl p-8">
        <h1 class="text-4xl font-bold text-center text-red-600 mb-8">📊 Painel de Controle</h1>
        
        <!-- BOTÕES PRINCIPAIS -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <button onclick="abrirSecao('produtos')" class="bg-blue-50 p-6 rounded-2xl text-center hover:scale-105 transition">
                <i class="fas fa-utensils text-5xl text-blue-600 mb-4"></i>
                <h3 class="text-xl font-bold">Gerenciar Produtos</h3>
                <p class="text-gray-500">Adicionar, editar ou remover itens</p>
            </button>

            <button onclick="abrirSecao('config')" class="bg-green-50 p-6 rounded-2xl text-center hover:scale-105 transition">
                <i class="fas fa-cog text-5xl text-green-600 mb-4"></i>
                <h3 class="text-xl font-bold">Configurações</h3>
                <p class="text-gray-500">Horário, WhatsApp e Cor do site</p>
            </button>
        </div>

        <!-- ============== SEÇÃO PRODUTOS ============== -->
        <div id="secao-produtos" class="hidden">
            <h2 class="text-2xl font-bold mb-4">📦 Cadastro de Produtos</h2>
            
            <!-- FORMULÁRIO DE NOVO PRODUTO -->
            <div class="bg-gray-50 p-6 rounded-xl mb-6 border">
                <h3 class="font-bold text-lg mb-3">➕ Adicionar Novo Produto</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="prod-nome" placeholder="Nome do Produto" class="border p-3 rounded">
                    <input type="number" id="prod-preco" placeholder="Preço (ex: 25.90)" class="border p-3 rounded">
                    <input type="text" id="prod-cat" placeholder="Categoria (ex: Lanches)" class="border p-3 rounded">
                    <input type="text" id="prod-img" placeholder="URL da Imagem" class="border p-3 rounded">
                    <textarea id="prod-desc" placeholder="Descrição" class="border p-3 rounded col-span-2"></textarea>
                </div>
                <button onclick="salvarProduto()" class="mt-4 bg-blue-600 text-white px-6 py-3 rounded font-bold">
                    <i class="fas fa-save"></i> SALVAR PRODUTO
                </button>
            </div>

            <!-- LISTA DE PRODUTOS CADASTRADOS -->
            <h3 class="font-bold text-lg mb-3">📋 Produtos Cadastrados</h3>
            <div id="lista-produtos-admin" class="space-y-3">
                <!-- Os produtos aparecem aqui -->
            </div>
        </div>

        <!-- ============== SEÇÃO CONFIGURAÇÕES ============== -->
        <div id="secao-config" class="hidden">
            <h2 class="text-2xl font-bold mb-4">⚙️ Configurações da Loja</h2>
            
            <div class="bg-green-50 p-6 rounded-xl border">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block font-bold mb-1">Nome da Loja</label>
                        <input id="config-nome" class="w-full border p-3 rounded">
                    </div>
                    <div>
                        <label class="block font-bold mb-1">WhatsApp (com DDD)</label>
                        <input id="config-whatsapp" class="w-full border p-3 rounded" placeholder="5581999999999">
                    </div>
                </div>
                <button onclick="salvarConfig()" class="mt-4 bg-green-600 text-white px-6 py-3 rounded font-bold">
                    <i class="fas fa-check"></i> SALVAR ALTERAÇÕES
                </button>
            </div>
        </div>

        <div class="text-center mt-10">
            <button onclick="sair()" class="bg-gray-800 text-white px-6 py-3 rounded-xl hover:bg-gray-900">
                <i class="fas fa-sign-out-alt mr-2"></i> Sair
            </button>
        </div>
    </div>

<script>
// 🔐 SEGURANÇA
if(localStorage.getItem('logado') != 'sim'){
    window.location.href = 'login.html';
}

// DADOS PADRÃO (SE NÃO TIVER NENHUM)
const dadosPadrao = {
    config: { 
        nome: "MH Lanches", 
        whatsapp: "5581999999999" 
    },
    produtos: [
        {"id": 1, "nome": "Hambúrguer Artesanal", "desc": "Pão brioche, carne 150g, queijo, bacon e molho especial", "preco": 25.90, "cat": "Lanches", "img": "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500"},
        {"id": 2, "nome": "Coca-Cola 2L", "desc": "Refrigerante de cola original", "preco": 10.00, "cat": "Bebidas", "img": "https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=500"}
    ]
};

let dadosSite = {};

// CARREGA DADOS
function carregarDados(){
    const salvos = localStorage.getItem('dados_site');
    if(salvos){
        dadosSite = JSON.parse(salvos);
    } else {
        dadosSite = {...dadosPadrao};
        salvar();
    }
    renderizarProdutosAdmin();
    carregarConfig();
}

// MOSTRA SEÇÃO
function abrirSecao(secao){
    document.querySelectorAll('[id^="secao-"]').forEach(el => el.classList.add('hidden'));
    document.getElementById('secao-' + secao).classList.remove('hidden');
}

// ======= PRODUTOS =======
function renderizarProdutosAdmin(){
    const container = document.getElementById('lista-produtos-admin');
    container.innerHTML = '';
    dadosSite.produtos.forEach((p, i) => {
        container.innerHTML += `
        <div class="border p-4 rounded flex justify-between items-center bg-white">
            <img src="${p.img}" class="w-16 h-16 rounded object-cover">
            <div class="flex-1 ml-4">
                <h4 class="font-bold">${p.nome}</h4>
                <p class="text-sm text-gray-500">${p.cat} | R$ ${p.preco.toFixed(2)}</p>
            </div>
            <div class="flex gap-2">
                <button onclick="editarProduto(${i})" class="text-blue-500 text-xl"><i class="fas fa-edit"></i></button>
                <button onclick="excluirProduto(${i})" class="text-red-500 text-xl"><i class="fas fa-trash"></i></button>
            </div>
        </div>`;
    });
}

function salvarProduto(){
    const nome = document.getElementById('prod-nome').value;
    const preco = parseFloat(document.getElementById('prod-preco').value);
    const cat = document.getElementById('prod-cat').value;
    const img = document.getElementById('prod-img').value;
    const desc = document.getElementById('prod-desc').value;

    if(!nome || !preco) return alert("Preencha nome e preço!");

    const novo = { id: Date.now(), nome, desc, preco, cat, img };
    dadosSite.produtos.push(novo);
    salvar();
    
    // Limpa campos
    document.getElementById('prod-nome').value = '';
    document.getElementById('prod-preco').value = '';
    document.getElementById('prod-cat').value = '';
    document.getElementById('prod-img').value = '';
    document.getElementById('prod-desc').value = '';
}

function excluirProduto(i){
    if(confirm("Excluir este produto?")){
        dadosSite.produtos.splice(i,1);
        salvar();
    }
}

// ======= CONFIGURAÇÕES =======
function carregarConfig(){
    document.getElementById('config-nome').value = dadosSite.config.nome;
    document.getElementById('config-whatsapp').value = dadosSite.config.whatsapp;
}

function salvarConfig(){
    dadosSite.config.nome = document.getElementById('config-nome').value;
    dadosSite.config.whatsapp = document.getElementById('config-whatsapp').value;
    salvar();
    alert("✅ Configurações salvas! Atualize a página do site.");
}

// ======= GERAL =======
function salvar(){
    localStorage.setItem('dados_site', JSON.stringify(dadosSite));
    carregarDados();
}

function sair(){
    localStorage.removeItem('logado');
    window.location.href = 'login.html';
}

// INICIA
carregarDados();
</script>
</body>
</html>
