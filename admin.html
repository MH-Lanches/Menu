<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #FF4A5F; border-radius: 10px; }
        .aba.active { background-color: #1F2937 !important; color: white !important; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">

<div class="max-w-7xl mx-auto p-4">
    
    <header class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-4xl font-extrabold">⚙️ PAINEL ADMIN</h1>
            <p class="text-gray-400">Gerencie tudo de forma fácil</p>
        </div>
        <a href="index.html" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-full font-bold transition">
            <i class="fas fa-external-link-alt mr-2"></i> Ver Loja
        </a>
    </header>

    <!-- MODO MANUTENÇÃO -->
    <div class="bg-gray-800 rounded-2xl p-6 mb-8 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <i class="fas fa-circle-exclamation text-4xl text-red-500"></i>
            <div>
                <h3 class="text-xl font-bold">Modo Manutenção</h3>
                <p class="text-gray-400">Esconde a loja dos clientes</p>
            </div>
        </div>
        <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="panico">
            <span class="w-20 h-10 bg-gray-600 rounded-full transition-all peer-checked:bg-green-600"></span>
            <span class="absolute left-1 top-1 bg-white w-8 h-8 rounded-full transition-all peer-checked:left-11"></span>
        </label>
    </div>

    <!-- ABAS DE NAVEGAÇÃO -->
    <div class="flex flex-wrap gap-2 mb-6 border-b border-gray-700 pb-2">
        <button class="aba active px-6 py-3 rounded-t-xl font-bold" dataaba="config">
            <i class="fas fa-sliders-h mr-2"></i>Configurações
        </button>
        <button class="aba px-6 py-3 rounded-t-xl font-bold text-gray-400" dataaba="produtos">
            <i class="fas fa-hamburger mr-2"></i>Produtos
        </button>
        <button class="aba px-6 py-3 rounded-t-xl font-bold text-gray-400" dataaba="horario">
            <i class="fas fa-clock mr-2"></i>Horário
        </button>
    </div>

    <!-- CONTEÚDO DAS ABAS -->
    
    <!-- ABA CONFIGURAÇÕES -->
    <div id="aba-config">
        <div class="grid md:grid-cols-2 gap-6">
            <div class="bg-gray-800 p-6 rounded-xl">
                <label class="block text-gray-400 mb-2">Nome da Loja</label>
                <input id="confNome" class="w-full bg-gray-700 p-4 rounded-lg text-white outline-none">
            </div>
            <div class="bg-gray-800 p-6 rounded-xl">
                <label class="block text-gray-400 mb-2">WhatsApp (com DDD)</label>
                <input id="confWhats" class="w-full bg-gray-700 p-4 rounded-lg text-white outline-none">
            </div>
        </div>
        <button onclick="salvar()" class="mt-6 bg-green-600 hover:bg-green-700 px-8 py-4 rounded-full font-bold text-lg transition">
            💾 SALVAR ALTERAÇÕES
        </button>
    </div>

    <!-- ABA PRODUTOS -->
    <div id="aba-produtos" class="hidden">
        <!-- BOTÃO ADICIONAR PRODUTO -->
        <button onclick="novoProduto()" class="mb-6 bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-full font-bold transition">
            <i class="fas fa-plus mr-2"></i> Adicionar Produto
        </button>
        
        <div id="listaProdutos" class="grid md:grid-cols-2 gap-4">
            <!-- Produtos aparecem aqui -->
        </div>
    </div>

    <!-- ABA HORÁRIO -->
    <div id="aba-horario" class="hidden">
        <div class="bg-gray-800 rounded-xl p-6 space-y-4" id="boxHorario">
            <!-- Horários aparecem aqui -->
        </div>
    </div>

</div>

<!-- MODAL DE EDIÇÃO / CRIAÇÃO -->
<div id="modalEdit" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4">
    <div class="bg-gray-800 rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6">
        <h2 id="editTitulo" class="text-2xl font-bold mb-6">Novo Produto</h2>
        
        <div class="grid md:grid-cols-2 gap-4">
            <input id="e_nome" placeholder="Nome do produto" class="p-4 bg-gray-700 rounded-lg text-white">
            <input id="e_cat" placeholder="Categoria (ex: Bebidas, Lanches)" class="p-4 bg-gray-700 rounded-lg text-white">
            <input id="e_preco" type="number" step="0.01" placeholder="Preço" class="p-4 bg-gray-700 rounded-lg text-white">
            <input id="e_img" placeholder="URL da Imagem" class="p-4 bg-gray-700 rounded-lg text-white">
            <textarea id="e_desc" placeholder="Descrição" class="p-4 bg-gray-700 rounded-lg md:col-span-2 text-white"></textarea>
        </div>

        <div class="mt-6">
            <h3 class="font-bold mb-2">Adicionais / Opcionais</h3>
            <div id="e_adicionais" class="space-y-2"></div>
            <button onclick="addCampo()" class="mt-3 text-blue-400 hover:text-blue-300">
                <i class="fas fa-plus-circle"></i> Adicionar opção
            </button>
            <br>
            <label class="block mt-4 text-gray-400">Limite de escolhas (0 = ilimitado):</label>
            <input type="number" id="e_limite" value="0" class="mt-2 p-2 bg-gray-700 rounded w-20 text-center text-white">
        </div>

        <div class="mt-8 flex gap-4">
            <button onclick="salvarProduto()" class="flex-1 bg-green-600 hover:bg-green-700 py-4 rounded-lg font-bold">SALVAR</button>
            <button onclick="fecharEdit()" class="flex-1 bg-gray-600 hover:bg-gray-500 py-4 rounded-lg font-bold">CANCELAR</button>
        </div>
    </div>
</div>

<script>
let dados = { config:{}, produtos:[] };
let idEdicao = -1;

// Verificar login
if(localStorage.getItem('logado') !== 'sim'){
    window.location = 'login.html';
}

// Carregar dados
function carregarDadosSalvos(){
    const local = localStorage.getItem('dados_backup');
    if(local){
        dados = JSON.parse(local);
        inicializarInterface();
    } else {
        fetch('products.json')
        .then(res => res.json())
        .then(base => {
            dados = base;
            localStorage.setItem('dados_backup', JSON.stringify(dados));
            inicializarInterface();
        });
    }
}

function inicializarInterface(){
    document.getElementById('confNome').value = dados.config.nome;
    document.getElementById('confWhats').value = dados.config.whatsapp;
    document.getElementById('panico').checked = dados.config.panico;
    
    renderProdutos();
    renderHorarios();
}

// Controle das Abas
document.querySelectorAll('.aba').forEach(b=>{
    b.onclick = () => {
        document.querySelectorAll('.aba').forEach(x=>{
            x.classList.remove('active','text-white');
            x.classList.add('text-gray-400');
        });
        b.classList.add('active','text-white');
        document.querySelectorAll('[id^="aba-"]').forEach(c=>c.classList.add('hidden'));
        document.getElementById('aba-'+b.datasetaba).classList.remove('hidden');
    }
});

// Renderizar Produtos
function renderProdutos(){
    document.getElementById('listaProdutos').innerHTML = '';
    dados.produtos.forEach((p,i)=>{
        document.getElementById('listaProdutos').innerHTML += `
        <div class="bg-gray-800 rounded-xl p-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <img src="${p.img}" class="w-16 h-16 rounded-lg object-cover">
                <div>
                    <h4 class="font-bold text-lg">${p.nome}</h4>
                    <p class="text-gray-400 text-sm">${p.cat}</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="pausar(${i})" class="px-3 py-1 rounded text-sm ${p.pausado?'bg-green-600':'bg-yellow-600'}">
                    ${p.pausado?'▶️ Ativar':'⏸️ Pausar'}
                </button>
                <button onclick="editar(${i})" class="bg-blue-600 px-3 py-1 rounded text-sm">✏️ Editar</button>
            </div>
        </div>`;
    });
}

function pausar(i){ 
    dados.produtos[i].pausado = !dados.produtos[i].pausado; 
    salvar(); 
}

// Funções do Modal
function novoProduto(){
    idEdicao = -1;
    document.getElementById('editTitulo').innerText = "Novo Produto";
    document.getElementById('e_nome').value = "";
    document.getElementById('e_cat').value = "";
    document.getElementById('e_preco').value = "";
    document.getElementById('e_img').value = "";
    document.getElementById('e_desc').value = "";
    document.getElementById('e_limite').value = "0";
    document.getElementById('e_adicionais').innerHTML = "";
    document.getElementById('modalEdit').classList.remove('hidden');
    document.getElementById('modalEdit').classList.add('flex');
}

function editar(i){
    idEdicao = i;
    let p = dados.produtos[i];
    document.getElementById('editTitulo').innerText = "Editar Produto";
    document.getElementById('e_nome').value = p.nome;
    document.getElementById('e_cat').value = p.cat;
    document.getElementById('e_preco').value = p.preco;
    document.getElementById('e_img').value = p.img;
    document.getElementById('e_desc').value = p.desc;
    document.getElementById('e_limite').value = p.limite || 0;
    document.getElementById('e_adicionais').innerHTML = "";
    if(p.adicionais) p.adicionais.forEach(a=>{ addCampo(a.nome, a.preco); });
    document.getElementById('modalEdit').classList.remove('hidden');
    document.getElementById('modalEdit').classList.add('flex');
}

function addCampo(nome='', preco=''){
    let div = document.createElement('div');
    div.className = 'flex gap-2';
    div.innerHTML = `
    <input type="text" placeholder="Nome" value="${nome}" class="flex-1 p-3 bg-gray-700 rounded text-white">
    <input type="number" placeholder="Preço" value="${preco}" class="w-32 p-3 bg-gray-700 rounded text-white">
    <button onclick="this.parentElement.remove()" class="text-red-400 px-2">✕</button>`;
    document.getElementById('e_adicionais').appendChild(div);
}

function salvarProduto(){
    let adic = [];
    document.querySelectorAll('#e_adicionais > div').forEach(d=>{
        let inp = d.querySelectorAll('input');
        if(inp[0].value) adic.push({nome: inp[0].value, preco: parseFloat(inp[1].value)});
    });

    let prod = {
        nome: document.getElementById('e_nome').value,
        cat: document.getElementById('e_cat').value,
        preco: parseFloat(document.getElementById('e_preco').value),
        img: document.getElementById('e_img').value,
        desc: document.getElementById('e_desc').value,
        limite: parseInt(document.getElementById('e_limite').value),
        adicionais: adic,
        pausado: false
    };

    if(idEdicao >= 0) {
        dados.produtos[idEdicao] = prod;
    } else {
        dados.produtos.push(prod);
    }

    salvar();
    fecharEdit();
}

function fecharEdit(){ 
    document.getElementById('modalEdit').classList.add('hidden');
    document.getElementById('modalEdit').classList.remove('flex');
}

// Horários
function renderHorarios(){
    let box = document.getElementById('boxHorario');
    box.innerHTML = '';
    dados.config.horario.forEach(dia=>{
        box.innerHTML += `
        <div class="flex items-center gap-4 flex-wrap">
            <span class="w-24 font-bold">${dia.nome}</span>
            <label class="flex items-center gap-2">
                <input type="checkbox" ${dia.aberto?'checked':''} onchange="atualizaDia(${dia.dia}, 'aberto', this.checked)">
                Aberto
            </label>
            <span>das</span>
            <input type="time" value="${dia.ini}" onchange="atualizaDia(${dia.dia}, 'ini', this.value)" class="bg-gray-700 p-2 rounded text-white">
            <span>às</span>
            <input type="time" value="${dia.fim}" onchange="atualizaDia(${dia.dia}, 'fim', this.value)" class="bg-gray-700 p-2 rounded text-white">
        </div>`;
    });
}

function atualizaDia(d, campo, val){
    let obj = dados.config.horario.find(x=>x.dia==d);
    if(campo == 'aberto') obj.aberto = val;
    if(campo == 'ini') obj.ini = val;
    if(campo == 'fim') obj.fim = val;
}

// Salvar tudo
function salvar(){
    dados.config.nome = document.getElementById('confNome').value;
    dados.config.whatsapp = document.getElementById('confWhats').value;
    dados.config.panico = document.getElementById('panico').checked;

    localStorage.setItem('dados_backup', JSON.stringify(dados));
    renderProdutos();
    alert('✅ Salvo com sucesso!');
}

// Iniciar
carregarDadosSalvos();
</script>
</body>
</html>
