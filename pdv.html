<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MH Lanches - PDV (Ponto de Venda)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
--neon-cyan: #00f0ff; --neon-pink: #ff2d75; --neon-purple: #b026ff;
--neon-orange: #ff6a00; --neon-green: #00ff88; --neon-yellow: #fbbf24;
--dark-bg: #0a0a1a; --dark-card: rgba(20,20,45,0.9);
--glass: rgba(255,255,255,0.04); --glass-border: rgba(255,255,255,0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: var(--dark-bg); color: #e0e0e0; min-height: 100vh; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 20%, rgba(0,240,255,0.06) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(255,45,117,0.04) 0%, transparent 50%); pointer-events: none; z-index: 0; }
::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 3px; }
.neon-text { color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); }
.glass { background: var(--dark-card); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 14px; }

/* LAYOUT */
.pdv-layout { display: grid; grid-template-columns: 1fr 380px; height: 100vh; position: relative; z-index: 1; }
@media (max-width: 900px) { .pdv-layout { grid-template-columns: 1fr; } .pdv-sidebar { display: none; } }

/* LEFT: PRODUCTS */
.pdv-main { padding: 1rem; overflow-y: auto; }
.pdv-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
.pdv-logo { font-family: 'Orbitron', monospace; font-size: 1.2rem; font-weight: 900; background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.pdv-time { font-family: 'Orbitron', monospace; font-size: 0.9rem; color: #888; }
.pdv-stats { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
.pdv-stat { padding: 0.6rem 1rem; border-radius: 10px; font-size: 0.8rem; }
.pdv-stat .val { font-size: 1.2rem; font-weight: 800; color: #fff; }
.pdv-stat .lbl { font-size: 0.65rem; color: #888; }

/* CATEGORY TABS */
.pdv-cats { display: flex; gap: 0.4rem; overflow-x: auto; padding-bottom: 0.5rem; margin-bottom: 1rem; }
.pdv-cat { flex-shrink: 0; padding: 0.4rem 0.8rem; border-radius: 8px; background: var(--glass); border: 1px solid var(--glass-border); color: #888; cursor: pointer; font-size: 0.75rem; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; gap: 0.3rem; }
.pdv-cat:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }
.pdv-cat.active { background: rgba(0,240,255,0.15); border-color: var(--neon-cyan); color: var(--neon-cyan); }

/* PRODUCT GRID */
.pdv-products { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.6rem; }
.pdv-product {
padding: 0.75rem; border-radius: 12px;
background: var(--dark-card); border: 1px solid var(--glass-border);
cursor: pointer; transition: all 0.2s; text-align: center;
}
.pdv-product:hover { border-color: var(--neon-cyan); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
.pdv-product:active { transform: scale(0.97); }
.pdv-product-img { width: 100%; height: 80px; border-radius: 8px; overflow: hidden; margin-bottom: 0.5rem; background: rgba(0,240,255,0.05); }
.pdv-product-img img { width: 100%; height: 100%; object-fit: cover; }
.pdv-product-name { font-size: 0.75rem; font-weight: 600; color: #fff; margin-bottom: 0.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pdv-product-price { font-size: 0.85rem; font-weight: 800; color: var(--neon-green); }

/* ORDER TYPE SELECTOR */
.order-type-selector { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
.order-type-btn { flex: 1; padding: 0.6rem; border-radius: 10px; background: var(--glass); border: 1px solid var(--glass-border); color: #888; cursor: pointer; text-align: center; font-size: 0.8rem; transition: all 0.2s; }
.order-type-btn:hover { border-color: var(--neon-cyan); }
.order-type-btn.active { background: rgba(0,240,255,0.1); border-color: var(--neon-cyan); color: var(--neon-cyan); }
.order-type-btn i { display: block; font-size: 1.2rem; margin-bottom: 0.25rem; }

/* TABLE/COMANDA NUMBER */
.comanda-input { display: none; margin-bottom: 1rem; }
.comanda-input.active { display: block; }
.comanda-input .form-input { width: 100%; padding: 0.6rem 1rem; border-radius: 8px; background: var(--dark-card); border: 1px solid var(--glass-border); color: #fff; font-size: 0.9rem; outline: none; font-family: 'Inter', sans-serif; }
.comanda-input .form-input:focus { border-color: var(--neon-cyan); }

/* RIGHT: ORDER */
.pdv-sidebar { background: rgba(10,10,26,0.98); border-left: 1px solid var(--glass-border); display: flex; flex-direction: column; }
.sidebar-header { padding: 1rem; border-bottom: 1px solid var(--glass-border); }
.sidebar-header h3 { font-size: 0.9rem; font-weight: 700; display: flex; align-items: center; justify-content: space-between; }
.sidebar-header .order-id { font-family: 'Orbitron', monospace; font-size: 0.75rem; color: var(--neon-cyan); }
.order-items { flex: 1; overflow-y: auto; padding: 0.5rem 1rem; }
.order-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
.order-item-name { flex: 1; font-size: 0.8rem; font-weight: 500; }
.order-item-qty { display: flex; align-items: center; gap: 0.3rem; }
.oqty-btn { width: 22px; height: 22px; border-radius: 5px; background: var(--glass); border: 1px solid var(--glass-border); color: #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.7rem; }
.oqty-btn:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }
.oqty-val { font-weight: 600; font-size: 0.8rem; min-width: 18px; text-align: center; }
.order-item-price { font-size: 0.8rem; font-weight: 700; color: var(--neon-green); white-space: nowrap; }
.order-item-remove { background: none; border: none; color: #555; cursor: pointer; font-size: 0.7rem; margin-left: 0.25rem; }
.order-item-remove:hover { color: var(--neon-pink); }
.order-empty { text-align: center; padding: 2rem 1rem; color: #555; }
.order-empty i { font-size: 2rem; opacity: 0.3; display: block; margin-bottom: 0.5rem; }

.sidebar-footer { padding: 1rem; border-top: 1px solid var(--glass-border); background: rgba(5,5,15,0.95); }
.order-summary { margin-bottom: 0.75rem; }
.order-row { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 0.25rem; }
.order-row.total { font-size: 1.1rem; font-weight: 800; color: #fff; padding-top: 0.5rem; border-top: 1px solid var(--glass-border); }
.order-row.total span:last-child { color: var(--neon-green); }

.payment-methods { display: flex; gap: 0.3rem; margin-bottom: 0.75rem; }
.pay-btn { flex: 1; padding: 0.4rem; border-radius: 6px; background: var(--glass); border: 1px solid var(--glass-border); color: #888; cursor: pointer; font-size: 0.7rem; text-align: center; transition: all 0.2s; }
.pay-btn:hover { border-color: var(--neon-cyan); }
.pay-btn.active { background: rgba(0,240,255,0.1); border-color: var(--neon-cyan); color: var(--neon-cyan); }
.pay-btn i { display: block; font-size: 1rem; margin-bottom: 0.15rem; }

.pdv-actions { display: flex; gap: 0.5rem; }
.pdv-btn { flex: 1; padding: 0.75rem; border-radius: 10px; border: none; font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
.pdv-btn-primary { background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple)); color: #000; }
.pdv-btn-primary:hover { box-shadow: 0 4px 15px rgba(0,240,255,0.3); }
.pdv-btn-secondary { background: var(--glass); border: 1px solid var(--glass-border); color: #888; }
.pdv-btn-danger { background: rgba(255,45,117,0.15); border: 1px solid rgba(255,45,117,0.3); color: var(--neon-pink); }

/* TABS */
.pdv-tabs { display: flex; gap: 0.25rem; margin-bottom: 1rem; }
.pdv-tab { flex: 1; padding: 0.5rem; border-radius: 8px; background: var(--glass); border: 1px solid var(--glass-border); color: #888; cursor: pointer; text-align: center; font-size: 0.75rem; font-weight: 500; transition: all 0.2s; }
.pdv-tab.active { background: rgba(0,240,255,0.1); border-color: var(--neon-cyan); color: var(--neon-cyan); }

/* ORDERS LIST */
.orders-list { display: none; }
.orders-list.active { display: block; }
.order-card { padding: 0.75rem; border-radius: 10px; background: var(--dark-card); border: 1px solid var(--glass-border); margin-bottom: 0.5rem; cursor: pointer; transition: all 0.2s; }
.order-card:hover { border-color: var(--neon-cyan); }
.order-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem; }
.order-card-id { font-family: 'Orbitron', monospace; font-size: 0.7rem; color: var(--neon-cyan); }
.order-card-status { font-size: 0.65rem; padding: 0.15rem 0.4rem; border-radius: 4px; font-weight: 600; }
.status-novo { background: rgba(0,240,255,0.15); color: var(--neon-cyan); }
.status-preparando { background: rgba(255,106,0,0.15); color: var(--neon-orange); }
.status-pronto { background: rgba(0,255,136,0.15); color: var(--neon-green); }
.status-entregue { background: rgba(0,255,136,0.1); color: var(--neon-green); }
.status-pago { background: rgba(251,191,36,0.15); color: var(--neon-yellow); }
.status-finalizado { background: rgba(136,136,136,0.15); color: #888; }
.status-cancelado { background: rgba(255,45,117,0.15); color: var(--neon-pink); }
.order-card-client { font-size: 0.8rem; font-weight: 600; color: #fff; }
.order-card-items { font-size: 0.7rem; color: #888; }
.order-card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 0.3rem; }
.order-card-total { font-weight: 800; color: var(--neon-green); font-size: 0.85rem; }
.order-card-actions { display: flex; gap: 0.25rem; }
.oc-action { width: 24px; height: 24px; border-radius: 5px; background: var(--glass); border: 1px solid var(--glass-border); color: #888; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.6rem; }
.oc-action:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }
.oc-action.next { border-color: rgba(0,255,136,0.3); color: var(--neon-green); }
.oc-action.next:hover { background: rgba(0,255,136,0.15); }

/* TOAST */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
.toast { padding: 0.6rem 1rem; border-radius: 8px; background: rgba(15,15,35,0.95); border: 1px solid var(--glass-border); color: #fff; font-size: 0.8rem; display: flex; align-items: center; gap: 0.4rem; animation: toastIn 0.4s ease; }
.toast.success { border-color: var(--neon-green); } .toast.success i { color: var(--neon-green); }
.toast.info { border-color: var(--neon-cyan); } .toast.info i { color: var(--neon-cyan); }
.toast.warning { border-color: var(--neon-orange); } .toast.warning i { color: var(--neon-orange); }
@keyframes toastIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }

/* ALERT SOUND VISUAL */
.pdv-alert { position: fixed; inset: 0; background: rgba(0,240,255,0.05); z-index: 5000; display: none; pointer-events: none; animation: alertPulse 0.5s ease 3; }
@keyframes alertPulse { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

/* PRINT STYLES */
@media print {
body * { visibility: hidden; }
.print-receipt, .print-receipt * { visibility: visible; }
.print-receipt { position: absolute; left: 0; top: 0; width: 58mm; padding: 5mm; font-family: monospace; font-size: 10px; color: #000; background: #fff; }
}

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 3000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.3s; padding: 1rem; }
.modal-overlay.active { opacity: 1; visibility: visible; }
.modal-box { background: rgba(15,15,35,0.98); border: 1px solid var(--glass-border); border-radius: 16px; width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto; transform: scale(0.9); transition: transform 0.3s; }
.modal-overlay.active .modal-box { transform: scale(1); }
.modal-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: space-between; }
.modal-header h3 { font-size: 0.95rem; }
.modal-close { width: 30px; height: 30px; border-radius: 8px; background: var(--glass); border: 1px solid var(--glass-border); color: #aaa; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.8rem; }
.modal-close:hover { border-color: var(--neon-pink); color: var(--neon-pink); }
.modal-body { padding: 1.25rem; }
.form-input { width: 100%; padding: 0.6rem 0.8rem; border-radius: 8px; background: rgba(30,30,60,0.8); border: 1px solid var(--glass-border); color: #fff; font-size: 0.85rem; outline: none; font-family: 'Inter', sans-serif; }
.form-input:focus { border-color: var(--neon-cyan); }
.form-label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 0.3rem; }
.form-group { margin-bottom: 0.75rem; }
.btn { padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--glass); color: #ccc; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
.btn-primary { background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple)); border: none; color: #000; }
.btn-primary:hover { box-shadow: 0 4px 15px rgba(0,240,255,0.3); }

/* AUTO REFRESH INDICATOR */
.refresh-bar { height: 2px; background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent); position: fixed; top: 0; left: 0; right: 0; z-index: 100; opacity: 0; transition: opacity 0.3s; }
.refresh-bar.active { opacity: 1; }
</style>
</head>
<body>

<div class="refresh-bar" id="refreshBar"></div>
<div class="toast-container" id="toastContainer"></div>
<div class="pdv-alert" id="pdvAlert"></div>

<div class="pdv-layout">
<!-- LEFT: Products & Orders -->
<div class="pdv-main">
<div class="pdv-header">
<div class="pdv-logo">MH LANCHES <span style="font-size:0.6rem; opacity:0.5;">PDV</span></div>
<div style="display:flex;align-items:center;gap:0.75rem;">
<div class="pdv-time" id="pdvTime">00:00:00</div>
<button class="btn" id="toggleOrdersBtn" style="font-size:0.75rem;"><i class="fas fa-list mr-1"></i> Pedidos</button>
<button class="btn" id="adminLink" onclick="window.open('admin.html','_blank')" style="font-size:0.75rem;"><i class="fas fa-cog mr-1"></i> Admin</button>
</div>
</div>

<!-- Stats -->
<div class="pdv-stats">
<div class="pdv-stat glass"><div class="val" id="statOrders">0</div><div class="lbl">Pedidos Hoje</div></div>
<div class="pdv-stat glass"><div class="val" id="statRevenue">R$ 0</div><div class="lbl">Faturamento</div></div>
<div class="pdv-stat glass"><div class="val" id="statOpen">0</div><div class="lbl">Abertos</div></div>
<div class="pdv-stat glass"><div class="val" id="statAvg">R$ 0</div><div class="lbl">Ticket Médio</div></div>
</div>

<!-- Order Type -->
<div class="order-type-selector">
<div class="order-type-btn active" data-type="delivery" onclick="setOrderType('delivery')"><i class="fas fa-motorcycle"></i>Delivery</div>
<div class="order-type-btn" data-type="mesa" onclick="setOrderType('mesa')"><i class="fas fa-chair"></i>Mesa</div>
<div class="order-type-btn" data-type="balcao" onclick="setOrderType('balcao')"><i class="fas fa-store"></i>Balcão</div>
</div>

<!-- Comanda Input -->
<div class="comanda-input" id="comandaInput">
<input type="number" class="form-input" id="comandaNumber" placeholder="Número da mesa/comanda...">
</div>

<!-- Product Search -->
<div style="margin-bottom:1rem;">
<input type="text" class="form-input" id="pdvSearch" placeholder="🔍 Buscar produto..." style="width:100%;">
</div>

<!-- Categories -->
<div class="pdv-cats" id="pdvCats"></div>

<!-- Products -->
<div class="pdv-products" id="pdvProducts"></div>

<!-- Orders List (toggle) -->
<div class="orders-list" id="ordersList">
<div class="pdv-tabs">
<div class="pdv-tab active" data-filter="all" onclick="filterOrders('all')">Todos</div>
<div class="pdv-tab" data-filter="novo" onclick="filterOrders('novo')">Novos</div>
<div class="pdv-tab" data-filter="preparando" onclick="filterOrders('preparando')">Preparando</div>
<div class="pdv-tab" data-filter="pronto" onclick="filterOrders('pronto')">Prontos</div>
</div>
<div id="ordersCards"></div>
</div>
</div>

<!-- RIGHT: Current Order -->
<div class="pdv-sidebar">
<div class="sidebar-header">
<h3>
<span><i class="fas fa-receipt mr-1"></i> Pedido Atual</span>
<span class="order-id" id="currentOrderId">#---</span>
</h3>
</div>
<div class="order-items" id="orderItems">
<div class="order-empty">
<i class="fas fa-plus-circle"></i>
<p style="font-size:0.8rem;">Clique nos produtos para adicionar</p>
</div>
</div>
<div class="sidebar-footer">
<div class="order-summary">
<div class="order-row"><span>Subtotal</span><span id="orderSubtotal">R$ 0,00</span></div>
<div class="order-row"><span>Taxa entrega</span><span id="orderDelivery">R$ 5,00</span></div>
<div class="order-row total"><span>Total</span><span id="orderTotal">R$ 0,00</span></div>
</div>
<div class="payment-methods">
<div class="pay-btn active" data-pay="pix" onclick="setPayment('pix')"><i class="fas fa-qrcode"></i>Pix</div>
<div class="pay-btn" data-pay="dinheiro" onclick="setPayment('dinheiro')"><i class="fas fa-money-bill-wave"></i>$</div>
<div class="pay-btn" data-pay="cartao" onclick="setPayment('cartao')"><i class="fas fa-credit-card"></i>Cartão</div>
</div>
<div class="pdv-actions">
<button class="pdv-btn pdv-btn-secondary" onclick="clearOrder()"><i class="fas fa-trash"></i></button>
<button class="pdv-btn pdv-btn-secondary" onclick="holdOrder()"><i class="fas fa-pause"></i></button>
<button class="pdv-btn pdv-btn-danger" onclick="printReceipt()"><i class="fas fa-print"></i></button>
<button class="pdv-btn pdv-btn-primary" onclick="finalizeOrder()">FINALIZAR</button>
</div>
</div>
</div>
</div>

<!-- ORDER DETAIL MODAL -->
<div class="modal-overlay" id="orderModal">
<div class="modal-box">
<div class="modal-header"><h3>Detalhes do Pedido</h3><button class="modal-close" onclick="closeModal('orderModal')"><i class="fas fa-times"></i></button></div>
<div class="modal-body" id="orderModalBody"></div>
</div>
</div>

<!-- RECEIPT (hidden, for printing) -->
<div class="print-receipt" id="printReceipt" style="display:none;"></div>

<script>

const CATS = [
{ id: 'all', name: 'Todos', icon: 'fa-th-large' },
{ id: 'hamburgers', name: 'Hambúrgueres', icon: 'fa-hamburger' },
{ id: 'pizzas', name: 'Pizzas', icon: 'fa-pizza-slice' },
{ id: 'pastels', name: 'Pastéis', icon: 'fa-drumstick-bite' },
{ id: 'porcoes', name: 'Porções', icon: 'fa-utensils' },
{ id: 'drinks', name: 'Bebidas', icon: 'fa-glass-cheers' },
{ id: 'desserts', name: 'Sobremesas', icon: 'fa-ice-cream' }
];

const FLOW = ['novo', 'preparando', 'pronto', 'entregue', 'pago', 'finalizado'];
const FLOW_LABELS = { novo: 'Novo', preparando: 'Preparando', pronto: 'Pronto', entregue: 'Entregue', pago: 'Pago', finalizado: 'Finalizado', cancelado: 'Cancelado' };

// ==================== STATE ====================
let state = {
products: getData('products', DEFAULT_PRODUCTS),
currentOrder: [],
orderType: 'delivery',
payment: 'pix',
comandaNum: '',
currentCat: 'all',
search: '',
orderFilter: 'all',
lastOrderCount: 0,
orderId: null
};

// ==================== INIT ====================
document.addEventListener('DOMContentLoaded', () => {
renderCategories();
renderProducts();
renderOrdersList();
updateStats();
updateClock();
setInterval(updateClock, 1000);
setInterval(autoRefresh, 10000); // Refresh every 10 seconds

// Search
$('#pdvSearch').addEventListener('input', e => {
state.search = e.target.value.toLowerCase();
renderProducts();
});
});

function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }
function formatPrice(v) { return 'R$ ' + v.toFixed(2).replace('.', ','); }

// ==================== CLOCK ====================
function updateClock() {
const now = new Date();
$('#pdvTime').textContent = now.toLocaleTimeString('pt-BR');
}

// ==================== CATEGORIES ====================
function renderCategories() {
$('#pdvCats').innerHTML = CATS.map(c =>
`<div class="pdv-cat ${state.currentCat === c.id ? 'active' : ''}" data-cat="${c.id}">
<i class="fas ${c.icon}"></i> ${c.name}
</div>`
).join('');

$('#pdvCats').addEventListener('click', e => {
const chip = e.target.closest('.pdv-cat');
if (!chip) return;
state.currentCat = chip.dataset.cat;
$$('.pdv-cat').forEach(c => c.classList.remove('active'));
chip.classList.add('active');
renderProducts();
});
}

// ==================== PRODUCTS ====================
function renderProducts() {
let filtered = state.currentCat === 'all' ? [...state.products] : state.products.filter(p => p.category === state.currentCat);
if (state.search) filtered = filtered.filter(p => p.name.toLowerCase().includes(state.search));

$('#pdvProducts').innerHTML = filtered.map(p => {
const today = new Date().getDay();
const avail = p.available.includes(today);
return `
<div class="pdv-product" ${!avail ? 'style="opacity:0.4;pointer-events:none;"' : ''} data-id="${p.id}">
<div class="pdv-product-img"><img src="${p.img}" alt="${p.name}" loading="lazy"></div>
<div class="pdv-product-name">${p.name}</div>
<div class="pdv-product-price">${formatPrice(p.price)}</div>
</div>`;
}).join('');

$$('.pdv-product').forEach(el => {
el.addEventListener('click', () => addToOrder(parseInt(el.dataset.id)));
});
}

// ==================== ORDER ====================
function addToOrder(productId) {
const p = state.products.find(x => x.id === productId);
if (!p) return;

const existing = state.currentOrder.find(i => i.productId === productId);
if (existing) existing.qty++;
else state.currentOrder.push({ productId, name: p.name, price: p.price, qty: 1 });

updateOrderUI();
showToast(`${p.name} adicionado`, 'success');
}

function updateOrderUI() {
const items = $('#orderItems');
if (state.currentOrder.length === 0) {
items.innerHTML = '<div class="order-empty"><i class="fas fa-plus-circle"></i><p style="font-size:0.8rem;">Clique nos produtos para adicionar</p></div>';
$('#currentOrderId').textContent = '#---';
} else {
if (!state.orderId) state.orderId = Date.now().toString();
$('#currentOrderId').textContent = '#' + state.orderId.slice(-6);

items.innerHTML = state.currentOrder.map((item, idx) => `
<div class="order-item">
<div class="order-item-name">${item.name}</div>
<div class="order-item-qty">
<button class="oqty-btn" onclick="changeOrderQty(${idx}, -1)">−</button>
<span class="oqty-val">${item.qty}</span>
<button class="oqty-btn" onclick="changeOrderQty(${idx}, 1)">+</button>
</div>
<div class="order-item-price">${formatPrice(item.price * item.qty)}</div>
<button class="order-item-remove" onclick="removeOrderItem(${idx})"><i class="fas fa-times"></i></button>
</div>`).join('');
}

const subtotal = state.currentOrder.reduce((s, i) => s + i.price * i.qty, 0);
const delivery = state.orderType === 'delivery' ? 5 : 0;
const total = subtotal + delivery;

$('#orderSubtotal').textContent = formatPrice(subtotal);
$('#orderDelivery').textContent = formatPrice(delivery);
$('#orderTotal').textContent = formatPrice(total);
}

function changeOrderQty(idx, delta) {
state.currentOrder[idx].qty += delta;
if (state.currentOrder[idx].qty <= 0) state.currentOrder.splice(idx, 1);
updateOrderUI();
}

function removeOrderItem(idx) {
state.currentOrder.splice(idx, 1);
updateOrderUI();
}

function clearOrder() {
state.currentOrder = [];
state.orderId = null;
state.comandaNum = '';
updateOrderUI();
showToast('Pedido limpo', 'info');
}

// ==================== ORDER TYPE ====================
function setOrderType(type) {
state.orderType = type;
$$('.order-type-btn').forEach(b => b.classList.remove('active'));
$(`.order-type-btn[data-type="${type}"]`).classList.add('active');

const comandaInput = $('#comandaInput');
if (type === 'mesa' || type === 'balcao') {
comandaInput.classList.add('active');
} else {
comandaInput.classList.remove('active');
}
updateOrderUI();
}

// ==================== PAYMENT ====================
function setPayment(method) {
state.payment = method;
$$('.pay-btn').forEach(b => b.classList.remove('active'));
$(`.pay-btn[data-pay="${method}"]`).classList.add('active');
}

// ==================== FINALIZE ====================
function finalizeOrder() {
if (state.currentOrder.length === 0) { showToast('Adicione itens ao pedido!', 'warning'); return; }

const comandaNum = state.orderType !== 'delivery' ? ($('#comandaNumber')?.value || '') : '';
const subtotal = state.currentOrder.reduce((s, i) => s + i.price * i.qty, 0);
const delivery = state.orderType === 'delivery' ? 5 : 0;
const total = subtotal + delivery;

const order = {
id: state.orderId || Date.now().toString(),
type: state.orderType,
comanda: comandaNum,
client: { name: comandaNum ? `${state.orderType === 'mesa' ? 'Mesa' : 'Balcão'} ${comandaNum}` : 'Cliente PDV', phone: '' },
items: [...state.currentOrder],
subtotal, deliveryFee: delivery, total,
payment: state.payment,
status: 'pago',
date: new Date().toISOString()
};

// Save
const orders = getData('orders', []);
orders.push(order);
setData('orders', orders);

// Generate receipt
generateReceipt(order);

clearOrder();
updateStats();
showToast(`Pedido finalizado! Total: ${formatPrice(total)}`, 'success');
}

function holdOrder() {
if (state.currentOrder.length === 0) { showToast('Adicione itens!', 'warning'); return; }

const subtotal = state.currentOrder.reduce((s, i) => s + i.price * i.qty, 0);
const order = {
id: Date.now().toString(),
type: state.orderType,
comanda: $('#comandaNumber')?.value || '',
client: { name: 'Pedido em espera', phone: '' },
items: [...state.currentOrder],
subtotal, deliveryFee: state.orderType === 'delivery' ? 5 : 0,
total: subtotal + (state.orderType === 'delivery' ? 5 : 0),
payment: state.payment,
status: 'novo',
date: new Date().toISOString()
};

const orders = getData('orders', []);
orders.push(order);
setData('orders', orders);

clearOrder();
updateStats();
renderOrdersList();
showToast('Pedido salvo na lista!', 'info');
}

// ==================== PRINT RECEIPT ====================
function generateReceipt(order) {
const settings = getData('settings', { name: 'MH Lanches', phone: '(11) 99999-8888', address: 'Rua Exemplo, 123' });
const el = $('#printReceipt');
el.innerHTML = `
<div style="text-align:center;margin-bottom:10px;">
<strong style="font-size:14px;">${settings.name || 'MH Lanches'}</strong><br>
<span style="font-size:9px;">${settings.phone || ''}</span><br>
<span style="font-size:9px;">${settings.address || ''}</span><br>
<span style="font-size:9px;">================================</span><br>
<strong style="font-size:11px;">CUPOM NÃO FISCAL</strong><br>
<span style="font-size:9px;">================================</span>
</div>
<div style="font-size:9px;margin-bottom:8px;">
Pedido: #${order.id.slice(-6)}<br>
Data: ${new Date(order.date).toLocaleString('pt-BR')}<br>
Tipo: ${order.type === 'delivery' ? 'Delivery' : order.type === 'mesa' ? 'Mesa ' + order.comanda : 'Balcão ' + order.comanda}<br>
Pgto: ${order.payment === 'pix' ? 'Pix' : order.payment === 'dinheiro' ? 'Dinheiro' : 'Cartão'}<br>
<span style="font-size:9px;">--------------------------------</span>
</div>
${order.items.map(i => `<div style="font-size:9px;">${i.qty}x ${i.name}<br>&nbsp;&nbsp;&nbsp;&nbsp;${(i.price * i.qty).toFixed(2).replace('.', ',')}</div>`).join('')}
<div style="font-size:9px;margin-top:8px;">
<span style="font-size:9px;">--------------------------------</span><br>
Subtotal: ${order.subtotal.toFixed(2).replace('.', ',')}<br>
${order.deliveryFee > 0 ? 'Entrega: ' + order.deliveryFee.toFixed(2).replace('.', ',') + '<br>' : ''}
<strong style="font-size:12px;">TOTAL: ${order.total.toFixed(2).replace('.', ',')}</strong>
</div>
<div style="text-align:center;margin-top:15px;font-size:9px;">
<span style="font-size:9px;">================================</span><br>
Obrigado pela preferência!<br>
Volte sempre! ❤️
</div>`;
}

function printReceipt() {
if (state.currentOrder.length === 0) { showToast('Adicione itens primeiro!', 'warning'); return; }

const subtotal = state.currentOrder.reduce((s, i) => s + i.price * i.qty, 0);
const delivery = state.orderType === 'delivery' ? 5 : 0;

generateReceipt({
id: state.orderId || Date.now().toString(),
type: state.orderType,
comanda: $('#comandaNumber')?.value || '',
client: { name: 'Cliente PDV', phone: '' },
items: [...state.currentOrder],
subtotal, deliveryFee: delivery,
total: subtotal + delivery,
payment: state.payment,
date: new Date().toISOString()
});

const printContent = $('#printReceipt').innerHTML;
const win = window.open('', '_blank', 'width=300,height=600');
win.document.write(`
<html><head><title>Comanda</title>
<style>body{font-family:monospace;font-size:10px;width:58mm;margin:0;padding:5mm;color:#000;}
@media print{body{margin:0;padding:5mm;}}</style></head>
<body>${printContent}</body></html>`);
win.document.close();
setTimeout(() => { win.print(); }, 500);
}

// ==================== ORDERS LIST ====================
function renderOrdersList() {
const orders = getData('orders', []);
let filtered = state.orderFilter === 'all' ? orders : orders.filter(o => o.status === state.orderFilter);
filtered = filtered.filter(o => !['finalizado', 'cancelado'].includes(o.status)).sort((a, b) => new Date(b.date) - new Date(a.date));

const cards = $('#ordersCards');
if (filtered.length === 0) {
cards.innerHTML = '<div style="text-align:center;padding:2rem;color:#555;"><i class="fas fa-inbox" style="font-size:2rem;opacity:0.3;display:block;margin-bottom:0.5rem;"></i>Nenhum pedido aberto</div>';
return;
}

cards.innerHTML = filtered.map(o => {
const statusClass = 'status-' + (o.status || 'novo');
const nextStatus = getNextStatus(o.status);
return `
<div class="order-card">
<div class="order-card-header">
<span class="order-card-id">#${o.id.slice(-6)}</span>
<span class="order-card-status ${statusClass}">${FLOW_LABELS[o.status] || o.status}</span>
</div>
<div class="order-card-client">${o.client?.name || 'N/A'} ${o.type === 'delivery' ? '🚗' : o.type === 'mesa' ? '🪑' + (o.comanda || '') : '🏪' + (o.comanda || '')}</div>
<div class="order-card-items">${o.items.map(i => `${i.qty}x ${i.name || i.productId}`).join(', ')}</div>
<div class="order-card-footer">
<span class="order-card-total">${formatPrice(o.total)}</span>
<div class="order-card-actions">
<button class="oc-action" onclick="viewOrderDetail('${o.id}')" title="Ver"><i class="fas fa-eye"></i></button>
${nextStatus ? `<button class="oc-action next" onclick="advanceOrder('${o.id}')" title="${FLOW_LABELS[nextStatus]}"><i class="fas fa-arrow-right"></i></button>` : ''}
<button class="oc-action" onclick="printExistingReceipt('${o.id}')" title="Imprimir"><i class="fas fa-print"></i></button>
</div>
</div>
</div>`;
}).join('');
}

function filterOrders(filter) {
state.orderFilter = filter;
$$('.pdv-tab').forEach(t => t.classList.remove('active'));
$(`.pdv-tab[data-filter="${filter}"]`).classList.add('active');
renderOrdersList();
}

function getNextStatus(status) {
const idx = FLOW.indexOf(status);
if (idx === -1 || idx >= FLOW.length - 1) return null;
return FLOW[idx + 1];
}

function advanceOrder(id) {
const orders = getData('orders', []);
const idx = orders.findIndex(o => o.id === id);
if (idx === -1) return;
const next = getNextStatus(orders[idx].status);
if (next) {
orders[idx].status = next;
setData('orders', orders);
renderOrdersList();
updateStats();
showToast(`Pedido #${id.slice(-6)} → ${FLOW_LABELS[next]}`, 'success');
}
}

function viewOrderDetail(id) {
const orders = getData('orders', []);
const o = orders.find(x => x.id === id);
if (!o) return;

const statusClass = 'status-' + (o.status || 'novo');
$('#orderModalBody').innerHTML = `
<div style="margin-bottom:1rem;"><span style="font-family:Orbitron;color:var(--neon-cyan);">#${o.id.slice(-6)}</span> <span class="order-card-status ${statusClass}" style="font-size:0.75rem;">${FLOW_LABELS[o.status] || o.status}</span></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:1rem;font-size:0.85rem;">
<div><strong>Cliente:</strong> ${o.client?.name || 'N/A'}</div>
<div><strong>Tipo:</strong> ${o.type === 'delivery' ? '🚗 Delivery' : o.type === 'mesa' ? '🪑 Mesa ' + (o.comanda || '') : '🏪 Balcão ' + (o.comanda || '')}</div>
<div><strong>Pagamento:</strong> ${o.payment}</div>
<div><strong>Data:</strong> ${new Date(o.date).toLocaleString('pt-BR')}</div>
</div>
<h4 style="color:var(--neon-cyan);margin-bottom:0.5rem;font-size:0.9rem;">Itens</h4>
${o.items.map(i => `<div style="display:flex;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid var(--glass-border);font-size:0.8rem;"><span>${i.qty}x ${i.name || i.productId}</span><span style="color:var(--neon-green);">${formatPrice((i.price || 0) * i.qty)}</span></div>`).join('')}
<div style="display:flex;justify-content:space-between;padding:0.5rem 0;font-size:1rem;font-weight:800;color:#fff;"><span>Total</span><span style="color:var(--neon-green);">${formatPrice(o.total)}</span></div>
<div style="margin-top:1rem;">
<h4 style="color:var(--neon-cyan);margin-bottom:0.5rem;font-size:0.9rem;">Avançar Status</h4>
<div style="display:flex;gap:0.3rem;flex-wrap:wrap;">
${FLOW.map(s => `<button class="btn btn-sm ${o.status === s ? 'btn-primary' : ''}" onclick="advanceOrder('${o.id}');closeModal('orderModal');">${FLOW_LABELS[s]}</button>`).join('')}
${o.status !== 'cancelado' ? `<button class="btn btn-sm" style="border-color:rgba(255,45,117,0.3);color:var(--neon-pink);" onclick="cancelOrder('${o.id}');closeModal('orderModal');">Cancelar</button>` : ''}
</div>
</div>`;
$('#orderModal').classList.add('active');
}

function cancelOrder(id) {
if (!confirm('Cancelar este pedido?')) return;
const orders = getData('orders', []);
const idx = orders.findIndex(o => o.id === id);
if (idx !== -1) {
orders[idx].status = 'cancelado';
setData('orders', orders);
renderOrdersList();
updateStats();
showToast('Pedido cancelado', 'warning');
}
}

function printExistingReceipt(id) {
const orders = getData('orders', []);
const o = orders.find(x => x.id === id);
if (!o) return;
generateReceipt(o);
const printContent = $('#printReceipt').innerHTML;
const win = window.open('', '_blank', 'width=300,height=600');
win.document.write(`<html><head><title>Comanda</title><style>body{font-family:monospace;font-size:10px;width:58mm;margin:0;padding:5mm;color:#000;}</style></head><body>${printContent}</body></html>`);
win.document.close();
setTimeout(() => { win.print(); }, 500);
}

// ==================== STATS ====================
function updateStats() {
const orders = getData('orders', []);
const today = new Date().toDateString();
const todayOrders = orders.filter(o => new Date(o.date).toDateString() === today);
const todayRevenue = todayOrders.filter(o => o.status !== 'cancelado').reduce((s, o) => s + o.total, 0);
const openOrders = orders.filter(o => !['finalizado', 'cancelado', 'pago', 'entregue'].includes(o.status)).length;
const avgTicket = todayOrders.filter(o => o.status !== 'cancelado').length > 0 ? todayRevenue / todayOrders.filter(o => o.status !== 'cancelado').length : 0;

$('#statOrders').textContent = todayOrders.length;
$('#statRevenue').textContent = formatPrice(todayRevenue);
$('#statOpen').textContent = openOrders;
$('#statAvg').textContent = formatPrice(avgTicket);
}

// ==================== AUTO REFRESH ====================
function autoRefresh() {
const orders = getData('orders', []);
const currentCount = orders.length;

if (currentCount > state.lastOrderCount && state.lastOrderCount > 0) {
// New order detected!
$('#pdvAlert').style.display = 'block';
setTimeout(() => $('#pdvAlert').style.display = 'none', 2000);

// Play alert sound
try {
const ctx = new (window.AudioContext || window.webkitAudioContext)();
const osc = ctx.createOscillator();
const gain = ctx.createGain();
osc.connect(gain);
gain.connect(ctx.destination);
osc.frequency.value = 800;
gain.gain.value = 0.3;
osc.start();
setTimeout(() => { osc.frequency.value = 1000; }, 200);
setTimeout(() => { osc.frequency.value = 1200; }, 400);
setTimeout(() => { osc.stop(); ctx.close(); }, 600);
} catch(e) {}

showToast('🔔 Novo pedido recebido!', 'warning');
}

state.lastOrderCount = currentCount;
renderOrdersList();
updateStats();

// Show refresh bar
$('#refreshBar').classList.add('active');
setTimeout(() => $('#refreshBar').classList.remove('active'), 1000);
}

// ==================== TOGGLE ORDERS VIEW ====================
$('#toggleOrdersBtn').onclick = () => {
const productsEl = $('#pdvProducts');
const catsEl = $('#pdvCats');
const listEl = $('#ordersList');
const btn = $('#toggleOrdersBtn');

if (listEl.classList.contains('active')) {
listEl.classList.remove('active');
productsEl.style.display = 'grid';
catsEl.style.display = 'flex';
btn.innerHTML = '<i class="fas fa-list mr-1"></i> Pedidos';
} else {
listEl.classList.add('active');
productsEl.style.display = 'none';
catsEl.style.display = 'none';
btn.innerHTML = '<i class="fas fa-utensils mr-1"></i> Produtos';
renderOrdersList();
}
};

// ==================== UTILS ====================
function closeModal(id) { $(`#${id}`).classList.remove('active'); }

function showToast(msg, type = 'success') {
const container = $('#toastContainer');
const toast = document.createElement('div');
toast.className = `toast ${type}`;
const icons = { success: 'fa-check-circle', info: 'fa-info-circle', warning: 'fa-exclamation-triangle' };
toast.innerHTML = `<i class="fas ${icons[type]}"></i> ${msg}`;
container.appendChild(toast);
setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
if (e.key === 'Escape') closeModal('orderModal');
if (e.ctrlKey && e.key === 'k') { e.preventDefault(); $('#pdvSearch').focus(); }
});
</script>
</body>
</html>
