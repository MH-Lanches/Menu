<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MH Lanches — Mais que uma lanchonete!</title>
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="shortcut icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <!-- Google Fonts pré-carregadas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Montserrat:wght@400;700;800&family=Pacifico&family=Poppins:wght@400;700;800&family=Roboto:wght@400;700&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#7c3aed" />
    <meta name="description" content="MH Lanches — Peça pelo cardápio digital. Lanches, Pizzas, Bebidas e mais!" />
    <link rel="manifest" href="./manifest.json" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
    <script>
      // Atualizar favicon dinamicamente ao carregar a config
      window.addEventListener('DOMContentLoaded', () => {
        try {
          const raw = localStorage.getItem('mh-config');
          if (raw) {
            const config = JSON.parse(raw);
            if (config && config.logoUrl) {
              const url = config.logoUrl;
              const rels = ['icon', 'shortcut icon', 'apple-touch-icon'];
              rels.forEach(rel => {
                const link = document.createElement('link');
                link.rel = rel;
                link.href = url;
                if (rel === 'shortcut icon') link.sizes = 'any';
                document.head.appendChild(link);
              });
            }
          }
        } catch(e) {}
      });
    </script>
