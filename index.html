<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delicia Express • Delivery Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    .bottom-sheet { animation: slideUp 0.4s ease-out forwards; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .status-dot { animation: pulse 2s infinite; }
    .tail-container { max-width: 480px; margin: 0 auto; }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  <div class="tail-container min-h-screen pb-24">

    <!-- HEADER -->
    <header class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50">
      <div class="px-4 py-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div id="logo" class="w-10 h-10 bg-rose-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">D</div>
            <div>
              <h1 id="store-name" class="text-2xl font-bold">Delicia Express</h1>
              <p id="slogan" class="text-xs text-zinc-400 -mt-1">O melhor da cidade</p>
            </div>
          </div>
        </div>

      <!-- STATUS -->
      <div id="store-status" class="px-4 py-2 bg-emerald-500/10 border-y border-emerald-500/20 flex items-center gap-2 text-emerald-400 text-sm">
        <div class="w-2 h-2 bg-emerald-400 rounded-full status-dot"></div>
        <span id="status-text">Loja Aberta • Fecha às 23:00</span>
      </div>

      <!-- SEARCH -->
      <div class="px-4 py-3">
        <div class="relative">
          <input id="search-input" 
                 type="text" 
                 placeholder="Buscar lanches, pizzas..." 
                 class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-5 py-3 text-sm focus:outline-none focus:border-rose-500 pl-12">
          <i class="fa-solid fa-magnifying-glass absolute left-5 top-3.5 text-zinc-500"></i>
        </div>
      </div>

      <!-- CATEGORIES -->
      <div id="categories-bar" class="px-4 flex gap-2 overflow-x-auto pb-3 hide-scrollbar"></div>
    </header>

    <!-- HERO -->
    <div class="h-52 bg-gradient-to-br from-rose-600 to-pink-600 relative overflow-hidden">
      <div class="absolute inset-0 bg-[url('https://picsum.photos/id/1015/1200/600')] bg-cover opacity-20"></div>
      <div class="absolute bottom-6 left-6">
        <h2 class="text-3xl font-bold">O que você vai pedir hoje?</h2>
        <p class="text-rose-100 mt-1">Mais de 50 itens com entrega rápida</p>
      </div>
    </div>

    <!-- PRODUCTS -->
    <div class="px-4 pt-6">
      <h3 id="section-title" class="font-semibold text-lg mb-4 flex items-center gap-2">
        <i class="fa-solid fa-fire text-orange-500"></i> 
        Mais Pedidos
      </h3>
      <div id="products-grid" class="grid grid-cols-2 gap-4"></div>
    </div>
  </div>

  <!-- FLOATING CART -->
  <div onclick="toggleCart()" 
       id="floating-cart"
       class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-zinc-900 border border-rose-500 rounded-3xl px-6 py-4 flex items-center gap-3 shadow-2xl shadow-rose-500/30 z-50 cursor-pointer">
    <div class="flex items-center gap-3">
      <div class="relative">
        <i class="fa-solid fa-shopping-bag text-2xl"></i>
        <div id="cart-count" 
             class="absolute -top-1 -right-1 bg-rose-500 text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">0</div>
      </div>
      <div>
        <p class="text-xs text-zinc-400">Seu pedido</p>
        <p id="cart-total" class="font-semibold text-lg">R$ 0,00</p>
      </div>
    </div>
    <div class="ml-auto bg-rose-600 text-white px-6 py-2 rounded-2xl text-sm font-medium">Ver Carrinho</div>
  </div>

  <!-- CART MODAL -->
  <div id="cart-modal" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-end">
    <div class="bottom-sheet bg-zinc-900 w-full max-w-[480px] mx-auto rounded-t-3xl max-h-[85vh] overflow-hidden">
      <div class="p-4 border-b border-zinc-800 flex justify-between items-center">
        <h3 class="font-semibold text-xl">Seu Carrinho</h3>
        <button onclick="toggleCart()" class="text-2xl">✕</button>
      </div>
      
      <div id="cart-items" class="p-4 overflow-auto" style="max-height: 420px;"></div>

      <div class="p-4 border-t border-zinc-800 space-y-4">
        <div class="flex justify-between text-sm">
          <span class="text-zinc-400">Subtotal</span>
          <span id="subtotal">R$ 0,00</span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-zinc-400">Taxa de entrega</span>
          <span id="delivery-fee">R$ 8,00</span>
        </div>
        <div class="h-px bg-zinc-800"></div>
        <div class="flex justify-between font-semibold text-lg">
          <span>Total</span>
          <span id="final-total" class="text-rose-400">R$ 0,00</span>
        </div>
      </div>

      <div class="p-4">
        <button onclick="finalizeOrder()" 
                class="w-full bg-gradient-to-r from-rose-500 to-pink-600 py-4 rounded-3xl font-semibold text-lg shadow-lg shadow-rose-500/50">
          ENVIAR PEDIDO VIA WHATSAPP
        </button>
      </div>
    </div>
  </div>

  <script>
    let produtos = [];
    let categorias = [];
    let config = {};
    let cart = [];
    let currentCategory = 'all';
    let favorites = [];

    async function loadData() {
      const prodRes = await fetch('produtos.json');
      const data = await prodRes.json();
      produtos = data.produtos;
      categorias = data.categorias;

      const configRes = await fetch('config.json');
      config = await configRes.json();

      // Load from localStorage
      const savedCart = localStorage.getItem('cart');
      if (savedCart) cart = JSON.parse(savedCart);

      const savedFavorites = localStorage.getItem('favorites');
      if (savedFavorites) favorites = JSON.parse(savedFavorites);

      renderAll();
      checkStoreStatus();
    }

    function renderAll() {
      document.getElementById('store-name').textContent = config.nome;
      document.getElementById('slogan').textContent = config.slogan;
      document.getElementById('logo').style.backgroundColor = config.corPrimaria;
      
      renderCategories();
      renderProducts();
      renderFloatingCart();
    }

    function renderCategories() {
      const container = document.getElementById('categories-bar');
      container.innerHTML = `
        <div onclick="filterCategory('all')" 
             class="category-pill px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-3xl text-sm whitespace-nowrap cursor-pointer transition ${currentCategory === 'all' ? 'bg-rose-600 text-white' : ''}">
          Todos
        </div>
      `;

      categorias.sort((a,b) => a.ordem - b.ordem).forEach(cat => {
        const isActive = currentCategory === cat.id;
        container.innerHTML += `
          <div onclick="filterCategory('${cat.id}')" 
               class="category-pill px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-3xl text-sm whitespace-nowrap cursor-pointer transition ${isActive ? 'bg-rose-600 text-white' : ''}">
            ${cat.nome}
          </div>`;
      });
    }

    function filterCategory(catId) {
      currentCategory = catId;
      renderCategories();
      renderProducts();
    }

    function renderProducts(filteredProdutos = null) {
      const container = document.getElementById('products-grid');
      const toRender = filteredProdutos || produtos.filter(p => p.ativo);

      if (currentCategory !== 'all') {
        const filtered = toRender.filter(p => p.categoria === currentCategory);
        renderProductCards(filtered, container);
      } else {
        renderProductCards(toRender, container);
      }
    }

    function renderProductCards(items, container) {
      container.innerHTML = '';
      items.forEach(product => {
        const isFavorite = favorites.includes(product.id);
        const card = document.createElement('div');
        card.className = `product-card bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800 cursor-pointer`;
        card.innerHTML = `
          <div class="relative">
            <img src="${product.imagem}" class="w-full h-40 object-cover">
            ${isFavorite ? `<div class="absolute top-3 right-3 bg-white text-red-500 w-7 h-7 rounded-2xl flex items-center justify-center text-lg">❤️</div>` : ''}
            ${!product.ativo ? `<div class="absolute top-3 left-3 bg-red-500 text-white text-[10px] px-2 py-0.5 rounded">PAUSADO</div>` : ''}
          </div>
          <div class="p-3">
            <div class="flex justify-between">
              <h4 class="font-semibold">${product.nome}</h4>
              <span class="font-bold text-emerald-400">R$ ${product.preco.toFixed(2)}</span>
            </div>
            <p class="text-xs text-zinc-400 line-clamp-2 mt-1">${product.descricao}</p>
            
            <div class="flex gap-2 mt-3">
              <button onclick="event.stopImmediatePropagation(); toggleFavorite('${product.id}');" 
                      class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-2 rounded-2xl text-xs flex items-center justify-center gap-1">
                <i class="fa-solid ${isFavorite ? 'fa-heart' : 'fa-heart'}"></i>
              </button>
              <button onclick="event.stopImmediatePropagation(); addToCart('${product.id}');" 
                      class="flex-1 bg-rose-600 hover:bg-rose-700 py-2 rounded-2xl text-xs font-medium">
                ADICIONAR
              </button>
            </div>
          </div>
        `;
        card.onclick = () => showProductModal(product);
        container.appendChild(card);
      });
    }

    function toggleFavorite(id) {
      if (favorites.includes(id)) {
        favorites = favorites.filter(f => f !== id);
      } else {
        favorites.push(id);
      }
      localStorage.setItem('favorites', JSON.stringify(favorites));
      renderProducts();
    }

    let currentProduct = null;
    let selectedAdicionais = { group1: [], group2: [] };

    function showProductModal(product) {
      currentProduct = product;
      selectedAdicionais = { group1: [], group2: [] };

      let adicionaisHTML = '';

      if (product.adicionais1) {
        adicionaisHTML += `
          <div class="mt-6">
            <div class="flex justify-between items-center mb-3">
              <h4 class="font-semibold">${product.adicionais1.nome} <span class="text-xs text-zinc-500">(máx. ${product.adicionais1.max})</span></h4>
            </div>
            <div class="grid grid-cols-2 gap-2">`;
        
        product.adicionais1.opcoes.forEach((item, i) => {
          adicionaisHTML += `
            <div onclick="toggleAdicional(1, ${i})" id="adicional-1-${i}"
                 class="adicional-option border border-zinc-700 hover:border-rose-500 rounded-2xl p-3 cursor-pointer transition-all">
              <div class="flex justify-between">
                <span class="text-sm">${item.nome}</span>
                <span class="text-emerald-400 text-xs">+R$ ${item.preco.toFixed(2)}</span>
              </div>
            </div>`;
        });
        adicionaisHTML += `</div></div>`;
      }

      if (product.adicionais2) {
        adicionaisHTML += `
          <div class="mt-6">
            <div class="flex justify-between items-center mb-3">
              <h4 class="font-semibold">${product.adicionais2.nome} <span class="text-xs text-zinc-500">(máx. ${product.adicionais2.max})</span></h4>
            </div>
            <div class="grid grid-cols-2 gap-2">`;
        
        product.adicionais2.opcoes.forEach((item, i) => {
          adicionaisHTML += `
            <div onclick="toggleAdicional(2, ${i})" id="adicional-2-${i}"
                 class="adicional-option border border-zinc-700 hover:border-rose-500 rounded-2xl p-3 cursor-pointer transition-all">
              <div class="flex justify-between">
                <span class="text-sm">${item.nome}</span>
                <span class="text-emerald-400 text-xs">+R$ ${item.preco.toFixed(2)}</span>
              </div>
            </div>`;
        });
        adicionaisHTML += `</div></div>`;
      }

      const modalHTML = `
        <div class="fixed inset-0 bg-black/80 z-[200] flex items-end">
          <div class="bg-zinc-900 w-full rounded-t-3xl max-h-[92vh] overflow-auto">
            <div class="relative">
              <img src="${product.imagem}" class="w-full h-64 object-cover">
              <button onclick="closeModal()" 
                      class="absolute top-4 right-4 bg-black/60 text-white w-9 h-9 rounded-2xl flex items-center justify-center text-2xl">✕</button>
            </div>
            
            <div class="p-5">
              <div class="flex justify-between">
                <div>
                  <h2 class="text-3xl font-bold tracking-tight">${product.nome}</h2>
                  <p class="text-2xl font-semibold text-emerald-400 mt-1">R$ ${product.preco.toFixed(2)}</p>
                </div>
              </div>
              <p class="text-zinc-400 mt-4 leading-relaxed">${product.descricao}</p>

              ${adicionaisHTML}

              <div class="mt-8">
                <button onclick="addCurrentProductToCart()" 
                        class="w-full py-5 bg-gradient-to-r from-rose-500 to-pink-600 rounded-3xl font-bold text-lg shadow-xl shadow-rose-500/30 active:scale-95 transition-all">
                  ADICIONAR AO CARRINHO • R$ <span id="modal-total">0.00</span>
                </button>
              </div>
            </div>
          </div>
        </div>`;

      const modalContainer = document.createElement('div');
      modalContainer.id = 'product-modal';
      modalContainer.innerHTML = modalHTML;
      document.body.appendChild(modalContainer);

      updateModalTotal();
    }

    function toggleAdicional(group, index) {
      const key = group === 1 ? 'group1' : 'group2';
      const product = currentProduct;
      const groupData = group === 1 ? product.adicionais1 : product.adicionais2;
      
      if (!groupData) return;

      const max = groupData.max;
      const currentSelected = selectedAdicionais[key];

      const item = groupData.opcoes[index];

      if (currentSelected.includes(index)) {
        selectedAdicionais[key] = currentSelected.filter(i => i !== index);
      } else {
        if (currentSelected.length >= max) {
          alert(`Você pode escolher no máximo ${max} itens deste grupo.`);
          return;
        }
        selectedAdicionais[key].push(index);
      }

      const el = document.getElementById(`adicional-${group}-${index}`);
      if (el) {
        if (selectedAdicionais[key].includes(index)) {
          el.classList.add('!border-rose-500', 'bg-rose-500/10');
        } else {
          el.classList.remove('!border-rose-500', 'bg-rose-500/10');
        }
      }

      updateModalTotal();
    }

    function updateModalTotal() {
      if (!currentProduct) return;
      let total = currentProduct.preco;

      if (currentProduct.adicionais1 && selectedAdicionais.group1.length > 0) {
        selectedAdicionais.group1.forEach(i => {
          total += currentProduct.adicionais1.opcoes[i].preco;
        });
      }
      if (currentProduct.adicionais2 && selectedAdicionais.group2.length > 0) {
        selectedAdicionais.group2.forEach(i => {
          total += currentProduct.adicionais2.opcoes[i].preco;
        });
      }

      const totalEl = document.getElementById('modal-total');
      if (totalEl) totalEl.textContent = total.toFixed(2);
    }

    function addCurrentProductToCart() {
      if (!currentProduct) return;

      const item = {
        ...currentProduct,
        quantidade: 1,
        observacao: '',
        adicionaisSelecionados: {
          group1: selectedAdicionais.group1.map(i => currentProduct.adicionais1.opcoes[i]),
          group2: selectedAdicionais.group2.map(i => currentProduct.adicionais2 ? currentProduct.adicionais2.opcoes[i] : null).filter(Boolean)
        }
      };

      cart.push(item);
      localStorage.setItem('cart', JSON.stringify(cart));
      renderFloatingCart();
      
      const toast = document.createElement('div');
      toast.className = "fixed bottom-24 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-8 py-4 rounded-3xl shadow-2xl z-[300]";
      toast.textContent = `${currentProduct.nome} adicionado ao carrinho!`;
      document.body.appendChild(toast);
      
      setTimeout(() => toast.remove(), 2200);
      closeModal();
    }

    function closeModal() {
      const modal = document.getElementById('product-modal');
      if (modal) modal.remove();
    }

    function addToCart(productId) {
      const product = produtos.find(p => p.id === productId);
      if (!product) return;

      cart.push({
        ...product,
        quantidade: 1,
        observacao: ''
      });

      localStorage.setItem('cart', JSON.stringify(cart));
      renderFloatingCart();
      
      const toast = document.createElement('div');
      toast.className = "fixed bottom-20 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-6 py-3 rounded-3xl shadow-xl";
      toast.textContent = `${product.nome} adicionado!`;
      document.body.appendChild(toast);
      
      setTimeout(() => toast.remove(), 2000);
    }

    function renderFloatingCart() {
      const total = cart.reduce((sum, item) => sum + (item.preco * item.quantidade), 0);
      document.getElementById('cart-count').textContent = cart.length;
      document.getElementById('cart-total').textContent = `R$ ${total.toFixed(2)}`;
    }

    function toggleCart() {
      const modal = document.getElementById('cart-modal');
      if (modal.classList.contains('hidden')) {
        modal.classList.remove('hidden');
        renderCartItems();
      } else {
        modal.classList.add('hidden');
      }
    }

    function renderCartItems() {
      const container = document.getElementById('cart-items');
      container.innerHTML = '';

      if (cart.length === 0) {
        container.innerHTML = `<p class="text-center py-12 text-zinc-400">Seu carrinho está vazio</p>`;
        return;
      }

      cart.forEach((item, index) => {
        let extrasHTML = '';
        
        if (item.adicionaisSelecionados) {
          if (item.adicionaisSelecionados.group1 && item.adicionaisSelecionados.group1.length > 0) {
            extrasHTML += `<div class="text-[10px] text-zinc-400 mt-1">• ${item.adicionaisSelecionados.group1.map(a => a.nome).join(', ')}</div>`;
          }
          if (item.adicionaisSelecionados.group2 && item.adicionaisSelecionados.group2.length > 0) {
            extrasHTML += `<div class="text-[10px] text-zinc-400">• ${item.adicionaisSelecionados.group2.map(a => a.nome).join(', ')}</div>`;
          }
        }

        const div = document.createElement('div');
        div.className = "flex gap-4 bg-zinc-800 p-4 rounded-3xl mb-3";
        div.innerHTML = `
          <img src="${item.imagem}" class="w-20 h-20 object-cover rounded-2xl">
          <div class="flex-1">
            <div class="flex justify-between items-start">
              <div>
                <h4 class="font-medium">${item.nome}</h4>
                ${extrasHTML}
              </div>
              <span class="font-medium text-emerald-400">R$ ${(item.preco * item.quantidade).toFixed(2)}</span>
            </div>
            <div class="flex items-center gap-3 mt-4">
              <button onclick="changeQuantity(${index}, -1)" class="w-9 h-9 bg-zinc-700 hover:bg-zinc-600 rounded-2xl text-lg font-light flex items-center justify-center">-</button>
              <span class="font-mono w-8 text-center text-lg">${item.quantidade}</span>
              <button onclick="changeQuantity(${index}, 1)" class="w-9 h-9 bg-zinc-700 hover:bg-zinc-600 rounded-2xl text-lg font-light flex items-center justify-center">+</button>
            </div>
          </div>
        `;
        container.appendChild(div);
      });

      const subtotal = cart.reduce((sum, item) => sum + (item.preco * item.quantidade), 0);
      const taxa = config.taxaEntrega || 8;
      const total = subtotal + taxa;

      document.getElementById('subtotal').textContent = `R$ ${subtotal.toFixed(2)}`;
      document.getElementById('delivery-fee').textContent = `R$ ${taxa.toFixed(2)}`;
      document.getElementById('final-total').textContent = `R$ ${total.toFixed(2)}`;
    }

    function changeQuantity(index, change) {
      cart[index].quantidade += change;
      if (cart[index].quantidade < 1) cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCartItems();
      renderFloatingCart();
    }

    function finalizeOrder() {
      if (cart.length === 0) return;
      
      const nome = prompt("Qual seu nome?");
      if (!nome) return;
      
      const endereco = prompt("Qual o endereço de entrega?");
      if (!endereco) return;

      let message = `*🛍️ Novo Pedido - ${config.nome}*\n\n`;
      message += `*👤 Cliente:* ${nome}\n`;
      message += `*📍 Endereço:* ${endereco}\n\n`;
      message += `*📋 Itens:*\n`;

      cart.forEach(item => {
        message += `• ${item.quantidade}x ${item.nome} - R$ ${(item.preco * item.quantidade).toFixed(2)}\n`;
      });

      const subtotal = cart.reduce((sum, item) => sum + (item.preco * item.quantidade), 0);
      const total = subtotal + config.taxaEntrega;

      message += `\n*Subtotal:* R$ ${subtotal.toFixed(2)}`;
      message += `\n*Taxa de entrega:* R$ ${config.taxaEntrega.toFixed(2)}`;
      message += `\n*Total:* R$ ${total.toFixed(2)}\n\n`;
      message += `⏰ Pedido feito às ${new Date().toLocaleTimeString('pt-BR')}`;

      const whatsappUrl = `https://wa.me/${config.whatsapp}?text=${encodeURIComponent(message)}`;
      window.open(whatsappUrl, '_blank');

      cart = [];
      localStorage.setItem('cart', JSON.stringify(cart));
      toggleCart();
      renderFloatingCart();
    }

    function checkStoreStatus() {
      const now = new Date();
      const dayName = ['domingo','segunda','terca','quarta','quinta','sexta','sabado'][now.getDay()];
      const dayConfig = config.horarios[dayName];

      const statusEl = document.getElementById('store-status');
      const statusText = document.getElementById('status-text');

      if (!dayConfig || dayConfig.fechado) {
        statusEl.className = "px-4 py-2 bg-red-500/10 border-y border-red-500/30 flex items-center gap-2 text-red-400 text-sm";
        statusText.innerHTML = `Fechado • Abre amanhã`;
      } else {
        statusEl.className = "px-4 py-2 bg-emerald-500/10 border-y border-emerald-500/20 flex items-center gap-2 text-emerald-400 text-sm";
        statusText.textContent = `Aberto agora • Fecha às ${dayConfig.fechamento}`;
      }
    }

    // Initialize
    window.onload = loadData;

    // Tailwind script
    function initTailwind() {
      tailwind.config = {
        content: [],
        theme: {
          extend: {}
        }
      }
    }
    initTailwind();
  </script>
</body>
</html>
