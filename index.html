<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cardápio - Delivery</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{ --prim:#b24b39; --accent:#ff6b4a; }
  .btn-prim{background:var(--prim);color:white}
  .btn-accent{background:var(--accent);color:white}
  .card-img{height:140px;object-fit:cover}
  /* small perf tweaks */
  img[loading="lazy"]{opacity:0;transition:opacity .25s}
  img[loading="lazy"].loaded{opacity:1}
</style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900">
  <header class="bg-[var(--prim)] text-white p-4 sticky top-0 z-30">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <div>
        <h1 id="storeName" class="text-lg font-bold">Lanchonete do Bairro</h1>
        <p id="storeStatus" class="text-sm opacity-90">Carregando...</p>
      </div>
      <div class="flex items-center gap-2">
        <input id="search" placeholder="Buscar por nome ou preço" class="px-3 py-2 rounded w-44" />
        <button onclick="toggleFavorites()" class="px-3 py-2 border rounded">Favoritos</button>
        <button onclick="openCart()" class="px-3 py-2 border rounded">Carrinho (<span id="cartCount">0</span>)</button>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto p-4">
    <div class="flex gap-4">
      <aside class="w-56 hidden lg:block">
        <div class="bg-white rounded p-3 shadow sticky top-20">
          <h3 class="font-semibold mb-2">Categorias</h3>
          <div id="categoryList" class="space-y-2 text-sm"></div>
          <div class="mt-4">
            <label class="text-sm">Mostrar</label>
            <select id="filterMode" class="w-full border rounded px-2 py-1 mt-1">
              <option value="active">Ativos</option>
              <option value="all">Todos</option>
              <option value="paused">Pausados</option>
            </select>
          </div>
        </div>
      </aside>

      <section class="flex-1">
        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
      </section>
    </div>
  </main>

  <!-- Cart Modal -->
  <div id="cartModal" class="fixed inset-0 hidden items-center justify-center bg-black/50 z-40">
    <div class="bg-white rounded-lg w-11/12 max-w-2xl p-4 max-h-[90vh] overflow-auto">
      <div class="flex justify-between items-center">
        <h3 class="text-xl font-bold">Seu Pedido</h3>
        <button onclick="closeCart()" class="text-gray-500">✕</button>
      </div>

      <div id="cartItems" class="mt-4 space-y-3"></div>

      <div class="mt-4 border-t pt-3">
        <div class="flex justify-between items-center">
          <span class="font-semibold">Subtotal</span>
          <span id="cartSubtotal" class="font-bold">R$ 0,00</span>
        </div>

        <div class="mt-3">
          <label class="block text-sm">Endereço</label>
          <input id="inputAddress" class="w-full border rounded px-2 py-1" placeholder="Rua, número, complemento" />
        </div>

        <div class="mt-3">
          <label class="block text-sm">Forma de pagamento</label>
          <select id="paymentMethod" class="w-full border rounded px-2 py-1">
            <option value="Dinheiro">Dinheiro</option>
            <option value="Cartão">Cartão na entrega</option>
            <option value="PIX">PIX</option>
          </select>
        </div>

        <div class="mt-3">
          <label class="block text-sm">Observações</label>
          <input id="inputObs" class="w-full border rounded px-2 py-1" placeholder="Talheres, troco, alergias..." />
        </div>

        <div id="scheduleRow" class="mt-3 hidden">
          <label class="block text-sm">Agendar para</label>
          <input id="scheduleDatetime" type="datetime-local" class="w-full border rounded px-2 py-1" />
        </div>

        <div class="mt-4 flex gap-2">
          <button id="btnSend" onclick="handleSend()" class="btn-accent px-4 py-2 rounded w-full">Enviar Pedido (WhatsApp)</button>
          <button onclick="closeCart()" class="border px-4 py-2 rounded w-full">Continuar</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="fixed bottom-0 left-0 right-0 bg-white border-t p-3">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
      <div id="footerText" class="text-sm text-gray-600">© Lanchonete do Bairro</div>
      <div class="text-sm">Entrega: <span id="deliveryFee">R$ 0,00</span></div>
    </div>
  </footer>

<script>
/* index.js — cliente (otimizado e comentado) */

/* Config */
const DEFAULT_WHATS = '5582999999999';
const LS_KEY = 'delivery_brain';
const FAV_KEY = 'fav_items';

/* Estado */
let brain = null;
let cart = []; // {id,name,priceBase,extras:[],qty,subtotal,isPizzaHalfGroupId?}
let favorites = JSON.parse(localStorage.getItem(FAV_KEY)||'[]') || [];
let currentCategory = null;
let showFavOnly = false;

/* Util */
const $ = id => document.getElementById(id);
const money = v => 'R$ '+Number(v).toFixed(2);

/* Load brain: prefer localStorage (admin), else fetch products.json */
async function loadBrain(){
  const local = localStorage.getItem(LS_KEY);
  if(local){ brain = JSON.parse(local); return; }
  try{
    const res = await fetch('products.json', {cache:'no-store'});
    brain = await res.json();
    localStorage.setItem(LS_KEY, JSON.stringify(brain));
  }catch(e){
    brain = { meta:{storeName:'Minha Loja',whatsapp:DEFAULT_WHATS,footerText:'© Minha Loja',deliveryFee:6.00}, settings:{}, openHours:{}, categories:[] };
  }
}

/* Apply meta (colors, texts) */
function applyMeta(){
  $('storeName').innerText = brain.meta.storeName || 'Minha Loja';
  $('footerText').innerText = brain.meta.footerText || '';
  $('deliveryFee').innerText = money(brain.meta.deliveryFee || 0);
  if(brain.meta.primaryColor) document.documentElement.style.setProperty('--prim', brain.meta.primaryColor);
  if(brain.meta.accentColor) document.documentElement.style.setProperty('--accent', brain.meta.accentColor);
}

/* Check open now (uses browser local time) */
function isOpenNow(){
  const days = {0:'sunday',1:'monday',2:'tuesday',3:'wednesday',4:'thursday',5:'friday',6:'saturday'};
  const now = new Date(); const dayKey = days[now.getDay()];
  const cfg = brain.openHours && brain.openHours[dayKey];
  if(!cfg) return true;
  if(!cfg.active) return false;
  const [oh,om] = cfg.open.split(':').map(Number); const [ch,cm] = cfg.close.split(':').map(Number);
  const open = new Date(now); open.setHours(oh,om,0,0);
  const close = new Date(now); close.setHours(ch,cm,0,0);
  return now >= open && now <= close;
}

/* Render status */
function renderStatus(){
  const el = $('storeStatus');
  if(isOpenNow()){ el.innerText = 'Aberto agora • Faça seu pedido'; $('btnSend').innerText = 'Enviar Pedido (WhatsApp)'; $('scheduleRow').classList.add('hidden'); }
  else { el.innerText = 'Fechado no momento • Você pode agendar um pedido'; $('btnSend').innerText = 'Agendar Pedido'; $('scheduleRow').classList.remove('hidden'); }
}

/* Render categories sidebar */
function renderCategories(){
  const list = $('categoryList'); list.innerHTML='';
  brain.categories.sort((a,b)=> (a.order||0)-(b.order||0));
  brain.categories.forEach(cat=>{
    const btn = document.createElement('button'); btn.className='w-full text-left px-2 py-1 rounded hover:bg-gray-100';
    btn.innerText = cat.name;
    btn.addEventListener('click', ()=>{ currentCategory = cat.id; showFavOnly=false; renderProducts(); });
    list.appendChild(btn);
  });
}

/* Render products grid */
function renderProducts(){
  const grid = $('productsGrid'); grid.innerHTML='';
  const q = ($('search').value||'').toLowerCase();
  const filterMode = $('filterMode').value;
  const items = [];
  brain.categories.forEach(cat => (cat.products||[]).forEach(p => items.push({...p, categoryId:cat.id, categoryName:cat.name})));
  let visible = items.filter(p=>{
    if(showFavOnly && !favorites.includes(p.id)) return false;
    if(currentCategory && p.categoryId !== currentCategory) return false;
    if(filterMode==='active' && p.active===false) return false;
    if(filterMode==='paused' && p.active!==false) return false;
    if(q){
      if(p.name.toLowerCase().includes(q)) return true;
      if(p.description && p.description.toLowerCase().includes(q)) return true;
      if(String(p.price).includes(q)) return true;
      return false;
    }
    return true;
  });

  if(visible.length===0){ grid.innerHTML = '<div class="col-span-full text-center text-gray-500">Nenhum item encontrado</div>'; return; }

  visible.forEach(p=>{
    const card = document.createElement('div'); card.className='bg-white rounded shadow p-3';
    card.innerHTML = `<img loading="lazy" src="${p.image||''}" alt="${p.name}" class="w-full rounded card-img" />
      <div class="mt-2 flex justify-between items-start">
        <div>
          <h4 class="font-semibold">${p.name}</h4>
          <p class="text-sm text-gray-600">${p.description||''}</p>
          <div class="text-sm text-gray-500 mt-1">${p.categoryName}</div>
        </div>
        <div class="text-right">
          <div class="font-bold text-[var(--prim)]">${money(p.price)}</div>
          <div class="mt-2 flex flex-col gap-2">
            <button class="px-3 py-1 rounded border" data-act="view">Ver</button>
            <button class="px-3 py-1 rounded btn-prim text-white" data-act="add">Adicionar</button>
            <button class="px-3 py-1 rounded border" data-act="fav">${favorites.includes(p.id)?'★ Favorito':'☆ Favoritar'}</button>
          </div>
        </div>
      </div>`;
    grid.appendChild(card);

    // lazy image loaded class
    const img = card.querySelector('img'); img.addEventListener('load', ()=> img.classList.add('loaded'));

    card.querySelector('[data-act="view"]').addEventListener('click', ()=> openProductModal(p));
    card.querySelector('[data-act="add"]').addEventListener('click', ()=> quickAdd(p));
    card.querySelector('[data-act="fav"]').addEventListener('click', (e)=>{ toggleFav(p.id); e.target.innerText = favorites.includes(p.id)?'★ Favorito':'☆ Favoritar'; });
  });
}

/* Quick add (1 qty, no extras) */
function quickAdd(p){
  if(!p.active){ alert('Produto indisponível'); return; }
  const item = { id:p.id, name:p.name, priceBase:p.price, extras:[], qty:1, subtotal:p.price, isPizza:p.isPizza||false };
  cart.push(item); updateCartUI(); toast('Adicionado ao carrinho');
}

/* Toggle favorites */
function toggleFav(id){
  if(favorites.includes(id)) favorites = favorites.filter(x=>x!==id); else favorites.push(id);
  localStorage.setItem(FAV_KEY, JSON.stringify(favorites));
}

/* Open product modal (prompt-based extras selection for mobile simplicity) */
function openProductModal(p){
  if(!p.active){ alert('Produto indisponível'); return; }
  const qty = Math.max(1, parseInt(prompt(`Quantidade para ${p.name}`, '1')) || 1);
  const selected = [];
  (p.extrasPools||[]).forEach(pool=>{
    if(!pool.options || pool.options.length===0) return;
    const opts = pool.options.map((o,i)=>`${i+1}) ${o}`).join('\n');
    const sel = prompt(`Escolha até ${pool.limit} de "${pool.title}" (números separados por vírgula)\n${opts}`, '');
    if(sel){
      const idxs = sel.split(',').map(s=>parseInt(s.trim())-1).filter(i=>i>=0 && i<pool.options.length);
      idxs.slice(0,pool.limit).forEach(i=> selected.push(pool.options[i]));
    }
  });
  let extrasValue = 0; selected.forEach(ex=>{ const m = ex.match(/\+R\$?\s*([\d.,]+)/); if(m) extrasValue += parseFloat(m[1].replace(',','.')); });
  const subtotal = (p.price + extrasValue) * qty;
  cart.push({ id:p.id, name:p.name, priceBase:p.price, extras:selected, qty, subtotal, isPizza:p.isPizza||false });
  updateCartUI(); toast('Item adicionado');
}

/* Cart UI & operations */
function updateCartUI(){
  $('cartCount').innerText = cart.reduce((s,i)=>s+i.qty,0);
  const subtotal = cart.reduce((s,i)=>s+i.subtotal,0);
  $('cartSubtotal').innerText = money(subtotal + (brain.meta.deliveryFee||0));
}

/* Cart modal render */
function openCart(){ renderCartItems(); $('cartModal').classList.remove('hidden'); $('cartModal').classList.add('flex'); }
function closeCart(){ $('cartModal').classList.add('hidden'); $('cartModal').classList.remove('flex'); }

function renderCartItems(){
  const cont = $('cartItems'); cont.innerHTML='';
  if(cart.length===0){ cont.innerHTML = '<p class="text-gray-600">Carrinho vazio</p>'; updateCartUI(); return; }
  cart.forEach((it, idx)=>{
    const el = document.createElement('div'); el.className='flex justify-between items-start border rounded p-2';
    el.innerHTML = `<div><div class="font-semibold">${it.name} <span class="text-sm text-gray-500">x${it.qty}</span></div>
      <div class="text-sm text-gray-600">${it.extras.length? 'Extras: '+it.extras.join(', '): ''}</div></div>
      <div class="text-right"><div class="font-bold">${money(it.subtotal)}</div>
      <div class="mt-2 flex gap-2"><button class="text-sm border px-2 py-1" onclick="changeQty(${idx}, -1)">-</button>
      <button class="text-sm border px-2 py-1" onclick="changeQty(${idx}, 1)">+</button>
      <button class="text-sm text-red-600" onclick="removeItem(${idx})">Remover</button></div></div>`;
    cont.appendChild(el);
  });
  updateCartUI();
}

function changeQty(idx, delta){
  cart[idx].qty = Math.max(1, cart[idx].qty + delta);
  let extrasValue = 0; cart[idx].extras.forEach(ex=>{ const m = ex.match(/\+R\$?\s*([\d.,]+)/); if(m) extrasValue += parseFloat(m[1].replace(',','.')); });
  cart[idx].subtotal = (cart[idx].priceBase + extrasValue) * cart[idx].qty;
  renderCartItems();
}

function removeItem(idx){ cart.splice(idx,1); renderCartItems(); updateCartUI(); }

/* Handle send / schedule */
function handleSend(){
  if(cart.length===0){ alert('Carrinho vazio'); return; }
  if(isOpenNow()){
    sendWhatsApp(false);
  } else {
    // schedule flow: if user picked datetime, include it; otherwise confirm immediate scheduling
    const dt = $('scheduleDatetime').value;
    if(dt){ sendWhatsApp(true, dt); }
    else {
      if(confirm('A loja está fechada. Deseja agendar o pedido para o próximo horário de abertura?')) sendWhatsApp(true, null);
    }
  }
}

/* Build message and open WhatsApp */
function sendWhatsApp(isScheduled=false, scheduledAt=null){
  const meta = brain.meta || {};
  const whatsapp = meta.whatsapp || DEFAULT_WHATS;
  let text = `*Pedido - ${meta.storeName || 'Loja'}*%0A%0A`;
  cart.forEach((it,i)=>{
    text += `${i+1}. ${it.name} x${it.qty} - R$ ${it.subtotal.toFixed(2)}%0A`;
    if(it.extras && it.extras.length) text += `   Extras: ${it.extras.join(', ')}%0A`;
  });
  const subtotal = cart.reduce((s,i)=>s+i.subtotal,0);
  const delivery = meta.deliveryFee || 0;
  const total = subtotal + delivery;
  text += `%0A*Subtotal:* R$ ${subtotal.toFixed(2)}%0A`;
  text += `*Entrega:* R$ ${delivery.toFixed(2)}%0A`;
  text += `*Total:* R$ ${total.toFixed(2)}%0A%0A`;
  const address = encodeURIComponent($('inputAddress').value || '');
  if(address) text += `*Endereço:* ${address}%0A`;
  const payment = encodeURIComponent($('paymentMethod').value || '');
  text += `*Pagamento:* ${payment}%0A`;
  const obs = encodeURIComponent($('inputObs').value || '');
  if(obs) text += `*Observações:* ${obs}%0A`;
  if(isScheduled){
    if(scheduledAt) text += `*Agendado para:* ${encodeURIComponent(scheduledAt)}%0A`;
    else text += `*Agendado:* Sim (abrir quando a loja estiver aberta)%0A`;
  }
  text += `%0AObrigado!`;
  const url = `https://wa.me/${whatsapp}?text=${text}`;
  window.open(url, '_blank');
}

/* Favorites toggle */
function toggleFavorites(){ showFavOnly = !showFavOnly; currentCategory = null; renderProducts(); }

/* Toast (simples) */
function toast(msg){ const t = document.createElement('div'); t.className='fixed bottom-24 left-1/2 -translate-x-1/2 bg-black text-white px-4 py-2 rounded'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),1500); }

/* Init */
(async function init(){
  await loadBrain();
  applyMeta();
  renderStatus();
  renderCategories();
  renderProducts();
  updateCartUI();

  $('search').addEventListener('input', renderProducts);
  $('filterMode').addEventListener('change', renderProducts);
  setInterval(renderStatus, 60*1000);
})();
</script>
</body>
</html>
