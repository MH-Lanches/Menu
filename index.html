<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { prim: '#FF4A5F', sec: '#25D366', dark: '#121212' } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #FF4A5F; border-radius: 10px; }
        .card { transition: all 0.3s ease; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-50">

<!-- AVISO DE FECHADO -->
<div id="avisoAgendamento" class="bg-yellow-500 text-white text-center py-3 font-bold hidden">
    <i class="fas fa-clock mr-2"></i> LOJA FECHADA - PEDIDO SERÁ AGENDADO
</div>

<!-- HEADER -->
<header class="bg-white shadow-md sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <h1 id="nomeLoja" class="text-3xl font-extrabold text-dark tracking-tighter">
            <span class="text-prim">CARREGANDO...</span>
        </h1>
        <button onclick="abrirCarrinho()" class="relative bg-gray-100 p-3 rounded-full hover:bg-gray-200 transition">
            <i class="fas fa-shopping-bag text-xl text-dark"></i>
            <span id="badgeCarrinho" class="absolute -top-2 -right-2 bg-prim text-white rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold">0</span>
        </button>
    </div>
</header>

<!-- CATEGORIAS -->
<nav id="menuCategorias" class="max-w-7xl mx-auto px-4 py-6 overflow-x-auto whitespace-nowrap flex gap-3">
    <!-- Carregado via JS -->
</nav>

<!-- PRODUTOS -->
<main class="max-w-7xl mx-auto px-4 pb-24 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="listaProdutos">
    <!-- Carregado via JS -->
</main>

<!-- MODAL PRODUTO -->
<div id="modalProduto" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl max-w-md w-full overflow-hidden">
        <div class="relative">
            <img id="modalImg" class="w-full h-64 object-cover">
            <span onclick="fecharModal()" class="absolute top-4 right-4 bg-white/90 text-dark w-10 h-10 rounded-full flex items-center justify-center cursor-pointer text-xl font-bold">&times;</span>
        </div>
        <div class="p-6">
            <h2 id="modalNome" class="text-2xl font-bold text-dark"></h2>
            <p id="modalDesc" class="text-gray-500 mt-2"></p>
            <p class="text-prim text-3xl font-bold mt-4">R$ <span id="modalPreco"></span></p>
            
            <div id="modalAdicionais" class="mt-4 space-y-2"></div>

            <button onclick="adicionarCarrinho()" class="w-full mt-6 bg-sec text-white py-4 rounded-full font-bold text-lg shadow-lg hover:opacity-90">
                ADICIONAR AO PEDIDO
            </button>
        </div>
    </div>
</div>

<!-- CARRINHO LATERAL -->
<div id="carrinho" class="fixed top-0 right-0 h-full w-full md:w-96 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-50">
    <div class="h-full flex flex-col">
        <div class="p-6 bg-dark text-white">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-bold"><i class="fas fa-shopping-basket mr-2"></i>Seu Pedido</h3>
                <button onclick="fecharCarrinho()" class="text-2xl">&times;</button>
            </div>
        </div>
        <div id="itensCarrinho" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-6 border-t">
            <div class="flex justify-between text-xl font-bold mb-4">
                <span>Total:</span>
                <span class="text-prim">R$ <span id="totalCarrinho">0,00</span></span>
            </div>
            <button onclick="finalizarPedido()" class="w-full bg-sec text-white py-4 rounded-full font-bold text-lg shadow-lg hover:opacity-90">
                <i class="fab fa-whatsapp mr-2"></i> FINALIZAR PEDIDO
            </button>
        </div>
    </div>
</div>

<script>
// DADOS PADRÃO
const dadosPadrao = {
    config: { 
        nome: "MH Lanches", 
        whatsapp: "5581999999999" 
    },
    produtos: [
        {"id": 1, "nome": "Hambúrguer Artesanal", "desc": "Pão brioche, carne 150g, queijo, bacon e molho especial", "preco": 25.90, "cat": "Lanches", "img": "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500"},
        {"id": 2, "nome": "Coca-Cola 2L", "desc": "Refrigerante de cola original", "preco": 10.00, "cat": "Bebidas", "img": "https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=500"}
    ]
};

let dadosSite = {};
let carrinho = [];
let produtoAtual = null;

// INICIALIZAÇÃO
function iniciar() {
    carregarDados();
    montarSite();
}

function carregarDados(){
    const salvos = localStorage.getItem('dados_site');
    if(salvos){
        dadosSite = JSON.parse(salvos);
    } else {
        dadosSite = {...dadosPadrao};
        salvarDados();
    }
}

function salvarDados(){
    localStorage.setItem('dados_site', JSON.stringify(dadosSite));
}

function montarSite(){
    // 🏷️ Coloca o nome da loja vindo do painel
    document.getElementById('nomeLoja').innerHTML = `<span class="text-prim">${dadosSite.config.nome.split(' ')[0]}</span> ${dadosSite.config.nome.split(' ').slice(1).join(' ')}`;

    renderizarCategorias();
    renderizarProdutos();
}

// ======= CATEGORIAS E PRODUTOS =======
function renderizarCategorias() {
    const cats = [...new Set(dadosSite.produtos.map(p => p.cat))];
    let html = `<button onclick="filtrar('')" class="bg-prim text-white px-6 py-3 rounded-full font-bold whitespace-nowrap">Todos</button>`;
    cats.forEach(cat => {
        html += `<button onclick="filtrar('${cat}')" class="bg-white border border-gray-200 px-6 py-3 rounded-full font-bold whitespace-nowrap hover:bg-gray-100">${cat}</button>`;
    });
    document.getElementById('menuCategorias').innerHTML = html;
}

function filtrar(cat){
    renderizarProdutos(cat);
}

function renderizarProdutos(filtro=null) {
    const container = document.getElementById('listaProdutos');
    container.innerHTML = '';
    dadosSite.produtos.filter(p => !filtro || p.cat === filtro).forEach((p, i) => {
        container.innerHTML += `
        <div class="bg-white rounded-3xl shadow overflow-hidden card cursor-pointer" onclick="abrirModal(${i})">
            <img src="${p.img}" class="w-full h-48 object-cover">
            <div class="p-5">
                <h3 class="font-bold text-xl text-dark">${p.nome}</h3>
                <p class="text-gray-500 text-sm mt-1 line-clamp-2">${p.desc}</p>
                <div class="mt-4 flex justify-between items-center">
                    <span class="text-prim font-bold text-xl">R$ ${p.preco.toFixed(2)}</span>
                    <i class="fas fa-plus-circle text-prim text-xl"></i>
                </div>
            </div>
        </div>`;
    });
}

// ======= MODAL =======
function abrirModal(i){
    produtoAtual = dadosSite.produtos[i];
    document.getElementById('modalNome').innerText = produtoAtual.nome;
    document.getElementById('modalDesc').innerText = produtoAtual.desc;
    document.getElementById('modalPreco').innerText = produtoAtual.preco.toFixed(2);
    document.getElementById('modalImg').src = produtoAtual.img;
    
    document.getElementById('modalProduto').classList.remove('hidden');
    document.getElementById('modalProduto').classList.add('flex');
}

function fecharModal(){
    document.getElementById('modalProduto').classList.add('hidden');
    document.getElementById('modalProduto').classList.remove('flex');
}

function adicionarCarrinho(){
    carrinho.push({...produtoAtual});
    atualizarCarrinho();
    fecharModal();
    abrirCarrinho();
}

// ======= CARRINHO =======
function abrirCarrinho(){
    document.getElementById('carrinho').classList.remove('translate-x-full');
}

function fecharCarrinho(){
    document.getElementById('carrinho').classList.add('translate-x-full');
}

function atualizarCarrinho(){
    const container = document.getElementById('itensCarrinho');
    container.innerHTML = '';
    let total = 0;

    carrinho.forEach((item, idx) => {
        total += item.preco;
        container.innerHTML += `
        <div class="flex gap-4 border-b pb-3">
            <img src="${item.img}" class="w-16 h-16 rounded object-cover">
            <div class="flex-1">
                <h4 class="font-bold">${item.nome}</h4>
                <p class="text-prim font-bold">R$ ${item.preco.toFixed(2)}</p>
            </div>
            <button onclick="removerDoCarrinho(${idx})" class="text-red-500"><i class="fas fa-trash"></i></button>
        </div>`;
    });

    document.getElementById('badgeCarrinho').innerText = carrinho.length;
    document.getElementById('totalCarrinho').innerText = total.toFixed(2).replace('.', ',');
}

function removerDoCarrinho(idx){
    carrinho.splice(idx, 1);
    atualizarCarrinho();
}

// ======= FINALIZAR =======
function finalizarPedido(){
    if(carrinho.length === 0) return alert("Adicione algo primeiro!");

    let texto = "Olá! Gostaria de fazer o pedido:\n\n";
    let total = 0;
    carrinho.forEach(item => {
        texto += `• ${item.nome} - R$ ${item.preco.toFixed(2)}\n`;
        total += item.preco;
    });
    texto += `\nTotal: R$ ${total.toFixed(2)}`;

    const link = `https://wa.me/${dadosSite.config.whatsapp}?text=${encodeURIComponent(texto)}`;
    window.open(link);
}

iniciar();
</script>
</body>
</html>
