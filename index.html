<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delivery Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --cor-brand: #ea1d2c; }
        .text-brand { color: var(--cor-brand); }
        .bg-brand { background-color: var(--cor-brand); }
        body { padding-bottom: 80px; -webkit-tap-highlight-color: transparent; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .anim-up { animation: up 0.3s ease-out; }
        @keyframes up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="p-4 flex justify-between items-center">
            <div>
                <h1 id="loja-nome" class="text-xl font-black">Carregando...</h1>
                <div id="loja-status" class="text-[10px] font-black uppercase mt-1"></div>
            </div>
            <button onclick="abrirCarrinho()" class="relative p-2"><i class="fa-solid fa-bag-shopping text-2xl"></i><span id="badge" class="absolute top-0 right-0 bg-brand text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold hidden">0</span></button>
        </div>
        <div class="flex overflow-x-auto hide-scroll px-4 py-2 gap-2 border-t" id="nav-categorias"></div>
    </header>

    <section id="sessao-ads" class="px-4 pt-4 hidden">
        <div id="carousel-ads" class="flex overflow-x-auto snap-x snap-mandatory gap-4 hide-scroll rounded-2xl"></div>
    </section>

    <main class="p-4 space-y-6" id="vitrine"></main>

    <div id="modal-produto" class="fixed inset-0 bg-black/60 z-50 hidden flex-col justify-end backdrop-blur-sm">
        <div class="bg-white rounded-t-[2rem] h-[90vh] flex flex-col anim-up overflow-hidden">
            <button onclick="fecharProduto()" class="absolute top-4 right-4 bg-white/80 w-10 h-10 rounded-full z-10 shadow flex items-center justify-center"><i class="fa-solid fa-chevron-down"></i></button>
            <img id="mp-img" class="w-full h-56 object-cover bg-gray-100">
            <div class="p-6 flex-1 overflow-y-auto pb-24">
                <h2 id="mp-nome" class="text-2xl font-black"></h2>
                <p id="mp-desc" class="text-gray-500 text-sm mt-1"></p>
                <div id="area-opcionais" class="mt-6 space-y-6"></div>
                <div class="mt-6"><label class="font-bold text-xs uppercase text-gray-400">Observações</label><textarea id="mp-obs" class="w-full bg-gray-50 border p-3 rounded-xl mt-2 text-sm" placeholder="Ex: Sem cebola..."></textarea></div>
            </div>
            <div class="absolute bottom-0 w-full p-4 border-t bg-white flex gap-4 shadow-lg">
                <div class="flex items-center gap-4 bg-gray-100 rounded-xl px-4"><button onclick="mudarQtd(-1)"><i class="fa-solid fa-minus"></i></button><span id="mp-qtd" class="font-black">1</span><button onclick="mudarQtd(1)" class="text-brand"><i class="fa-solid fa-plus"></i></button></div>
                <button onclick="addCarrinho()" id="btn-add" class="flex-1 bg-brand text-white py-4 rounded-xl font-black flex justify-between px-6"><span>Adicionar</span><span id="mp-total"></span></button>
            </div>
        </div>
    </div>

    <div id="drawer-carrinho" class="fixed inset-0 bg-black/60 z-50 hidden backdrop-blur-sm">
        <div class="bg-white w-full h-full max-w-md ml-auto flex flex-col anim-up">
            <div class="p-6 border-b flex justify-between items-center font-black"><h2>SEU PEDIDO</h2><button onclick="fecharCarrinho()"><i class="fa-solid fa-xmark"></i></button></div>
            <div id="lista-carrinho" class="flex-1 overflow-y-auto p-6 space-y-4 bg-gray-50"></div>
            <div class="p-6 bg-white border-t space-y-3">
                <div class="flex justify-between font-bold text-sm text-gray-400"><span>Subtotal</span><span id="c-sub"></span></div>
                <div class="flex justify-between font-black text-xl border-t pt-3"><span>Total</span><span id="c-total" class="text-brand"></span></div>
                <input type="text" id="c-nome" placeholder="Seu Nome" class="w-full bg-gray-50 border p-3 rounded-xl outline-none">
                <input type="text" id="c-end" placeholder="Endereço" class="w-full bg-gray-50 border p-3 rounded-xl outline-none">
                <select id="c-pgto" class="w-full bg-gray-50 border p-3 rounded-xl"><option value="Pix">Pix</option><option value="Cartão">Cartão</option></select>
                <div id="box-age" class="hidden bg-orange-50 p-3 rounded-xl border border-orange-100 text-xs font-bold text-orange-800"><p class="mb-1">Loja fechada. Agende para:</p><input type="time" id="c-hora" class="w-full p-2 rounded"></div>
                <button onclick="enviar()" id="btn-enviar" class="w-full bg-brand text-white py-4 rounded-xl font-black mt-2">ENVIAR WHATSAPP</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around p-2 pb-6 z-30 text-[9px] font-black uppercase text-gray-400">
        <button onclick="renderVitrine()" class="flex flex-col items-center gap-1 p-2 text-brand"><i class="fa-solid fa-house text-lg"></i>Início</button>
        <button onclick="renderVitrine(true)" class="flex flex-col items-center gap-1 p-2"><i class="fa-solid fa-heart text-lg"></i>Favoritos</button>
    </nav>

    <script>
        let DATA, carrinho = [], pAt, qtd = 1, stSab = [], stG1 = [], stG2 = [], aberta = false, favs = JSON.parse(localStorage.getItem('f')) || [];

        window.onload = async () => {
            try {
                const r = await fetch('produtos.json', {cache:'no-store'}); DATA = await r.json();
                document.documentElement.style.setProperty('--cor-brand', DATA.config.corPrincipal);
                document.getElementById('loja-nome').innerText = DATA.config.nomeLoja;
                verificar(); renderAnuncios(); renderCats(); renderVitrine();
            } catch(e) {}
        };

        function verificar() {
            const d = new Date(), h = DATA.config.horarios[d.getDay()], n = d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0');
            aberta = h.aberto && n >= h.inicio && n <= h.fim;
            document.getElementById('loja-status').innerHTML = aberta ? '<span class="text-emerald-500">● Aberto</span>' : '<span class="text-orange-500">● Fechado</span>';
            if(!aberta) { document.getElementById('box-age').classList.remove('hidden'); document.getElementById('btn-enviar').innerText = "AGENDAR PEDIDO"; }
        }

        function renderAnuncios() {
            const ads = (DATA.config.ads || []).filter(a => a.ativo && a.imagem);
            if(ads.length) {
                document.getElementById('sessao-ads').classList.remove('hidden');
                document.getElementById('carousel-ads').innerHTML = ads.map(a => `<a href="${a.link || '#'}" class="min-w-full snap-center"><img src="${a.imagem}" class="w-full h-40 object-cover rounded-2xl shadow"></a>`).join('');
            }
        }

        function renderCats() { document.getElementById('nav-categorias').innerHTML = DATA.config.categorias.map(c => `<button onclick="scrollToCat('${c}')" class="whitespace-nowrap px-4 py-2 bg-white border rounded-full text-xs font-bold">${c}</button>`).join(''); }
        function scrollToCat(c) { const el = document.getElementById('cat-'+c.replace(/\s/g,'')); if(el) window.scrollTo({top: el.offsetTop - 100, behavior:'smooth'}); }
        function toggleFav(id, e) { e.stopPropagation(); if(favs.includes(id)) favs = favs.filter(x => x!==id); else favs.push(id); localStorage.setItem('f', JSON.stringify(favs)); renderVitrine(); }

        function renderVitrine(fOnly = false) {
            const v = document.getElementById('vitrine'); v.innerHTML = '';
            DATA.config.categorias.forEach(c => {
                const it = DATA.items.filter(i => i.categoria === c && i.ativo && (!fOnly || favs.includes(i.id)));
                if(it.length) {
                    v.innerHTML += `<div id="cat-${c.replace(/\s/g,'')}"><h2 class="font-black text-lg mb-3">${c}</h2><div class="space-y-4">
                        ${it.map(p => `<div onclick="abrirProd(${p.id})" class="bg-white p-3 rounded-2xl border flex gap-4 relative">
                            <button onclick="toggleFav(${p.id}, event)" class="absolute top-2 right-2 text-lg ${favs.includes(p.id)?'text-brand':'text-gray-200'}"><i class="fa-solid fa-heart"></i></button>
                            <img src="${p.imagem}" class="w-24 h-24 rounded-xl object-cover">
                            <div class="flex-1"><h3 class="font-black text-sm">${p.nome}</h3><p class="text-[10px] text-gray-400 line-clamp-2 mt-1">${p.descricao}</p><p class="text-brand font-black mt-2">R$ ${p.preco.toFixed(2)}</p></div>
                        </div>`).join('')}</div></div>`;
                }
            });
        }

        function abrirProd(id) {
            pAt = DATA.items.find(x => x.id === id); qtd = 1; 
            document.getElementById('mp-qtd').innerText = 1; document.getElementById('mp-obs').value = '';
            document.getElementById('mp-img').src = pAt.imagem; document.getElementById('mp-nome').innerText = pAt.nome;
            document.getElementById('mp-desc').innerText = pAt.descricao;
            
            const area = document.getElementById('area-opcionais'); area.innerHTML = '';
            if(pAt.meio_a_meio) {
                stSab = pAt.sabores.map(() => false);
                area.innerHTML = `<div class="bg-orange-50 p-4 rounded-xl border border-orange-100">
                    <p class="font-black text-xs text-orange-800 mb-3 uppercase">Escolha 2 Sabores</p>
                    <div class="space-y-2">${pAt.sabores.map((s,i) => `<div class="flex justify-between bg-white p-2 rounded-lg border text-xs font-bold"><span>${s.nome} (+ R$ ${(s.preco/2).toFixed(2)})</span><input type="checkbox" id="sab-${i}" onchange="checkS(${i})" class="w-5 h-5"></div>`).join('')}</div>
                </div>`;
            } else {
                pAt.grupos.forEach((g,gi) => {
                    if(!g.nome) return;
                    if(gi===0) stG1 = g.itens.map(()=>0); else stG2 = g.itens.map(()=>0);
                    area.innerHTML += `<div class="bg-white p-4 rounded-xl border">
                        <p class="font-black text-xs text-gray-400 mb-3 uppercase">${g.nome} (Até ${g.limite})</p>
                        <div class="space-y-3">${g.itens.map((it,ii) => `<div class="flex justify-between text-xs font-bold"><span>${it.nome} (+ R$ ${it.preco.toFixed(2)})</span>
                            <div class="flex gap-2 bg-gray-50 rounded px-1"><button onclick="calcG(${gi},${ii},-1,${g.limite})">-</button><span id="g${gi}-i${ii}">${0}</span><button onclick="calcG(${gi},${ii},1,${g.limite})" class="text-brand">+</button></div>
                        </div>`).join('')}</div>
                    </div>`;
                });
            }
            upTotal(); document.getElementById('modal-produto').classList.replace('hidden', 'flex');
        }

        function checkS(i) {
            stSab[i] = document.getElementById('sab-'+i).checked;
            if(stSab.filter(Boolean).length > 2) { stSab[i] = false; document.getElementById('sab-'+i).checked = false; alert("Máximo 2 metades!"); }
            upTotal();
        }

        function calcG(gi, ii, d, l) {
            const st = gi===0 ? stG1 : stG2;
            if(d===1 && st.reduce((a,b)=>a+b,0) >= l) return;
            if(st[ii]+d >= 0) { st[ii]+=d; document.getElementById(`g${gi}-i${ii}`).innerText = st[ii]; upTotal(); }
        }

        function upTotal() {
            let t = pAt.preco, b = document.getElementById('btn-add');
            if(pAt.meio_a_meio) {
                if(stSab.filter(Boolean).length === 2) { 
                    pAt.sabores.forEach((s,i) => { if(stSab[i]) t += (s.preco/2); });
                    b.classList.remove('opacity-50');
                } else { b.classList.add('opacity-50'); }
            } else {
                pAt.grupos.forEach((g,gi) => { const st = gi===0 ? stG1 : stG2; g.itens.forEach((it,ii) => t += (it.preco*st[ii])); });
            }
            document.getElementById('mp-total').innerText = "R$ " + (t*qtd).toFixed(2);
        }

        function mudarQtd(d) { if(qtd+d > 0) { qtd+=d; document.getElementById('mp-qtd').innerText = qtd; upTotal(); } }
        function fecharProduto() { document.getElementById('modal-produto').classList.replace('flex', 'hidden'); }

        function addCarrinho() {
            let desc = [], prFinal = pAt.preco;
            if(pAt.meio_a_meio) {
                let sc = []; pAt.sabores.forEach((s,i) => { if(stSab[i]) { sc.push(s.nome); prFinal += (s.preco/2); } });
                desc.push("Sabores: "+sc.join(" / "));
            } else {
                pAt.grupos.forEach((g,gi) => { const st = gi===0 ? stG1 : stG2; g.itens.forEach((it,ii) => { if(st[ii]>0){ desc.push(st[ii]+"x "+it.nome); prFinal+=(it.preco*st[ii]); } }); });
            }
            carrinho.push({ n: pAt.nome, q: qtd, pr: prFinal, d: desc.join(" | "), o: document.getElementById('mp-obs').value });
            fecharProduto(); upBadge();
        }

        function upBadge() { const b = document.getElementById('badge'); b.innerText = carrinho.length; b.classList.toggle('hidden', !carrinho.length); }
        function fecharCarrinho() { document.getElementById('drawer-carrinho').classList.replace('flex', 'hidden'); }

        function abrirCarrinho() {
            document.getElementById('drawer-carrinho').classList.replace('hidden', 'flex');
            const l = document.getElementById('lista-carrinho'); l.innerHTML = '';
            let sub = 0;
            carrinho.forEach((c,i) => {
                const tot = c.q * c.pr; sub += tot;
                l.innerHTML += `<div class="bg-white p-3 rounded-xl border flex justify-between"><div><p class="font-black text-xs">${c.q}x ${c.n}</p><p class="text-[9px] text-gray-400">${c.d}</p></div><span class="font-black text-brand text-xs">R$ ${tot.toFixed(2)}</span></div>`;
            });
            document.getElementById('c-sub').innerText = "R$ " + sub.toFixed(2);
            document.getElementById('c-total').innerText = "R$ " + (sub + DATA.config.taxaEntrega).toFixed(2);
        }

        function enviar() {
            const n = document.getElementById('c-nome').value, e = document.getElementById('c-end').value, p = document.getElementById('c-pgto').value;
            if(!n || !e) return alert("Preencha os dados!");
            let msg = `*PEDIDO* 🚀\nCliente: ${n}\nEnd: ${e}\n\n`;
            let sub = 0;
            carrinho.forEach(c => { sub += (c.q*c.pr); msg += `${c.q}x ${c.n} (R$ ${(c.q*c.pr).toFixed(2)})\n${c.d?' - '+c.d:''}\n`; });
            msg += `\nSubtotal: R$ ${sub.toFixed(2)}\nTaxa: R$ ${DATA.config.taxaEntrega.toFixed(2)}\nTotal: R$ ${(sub + DATA.config.taxaEntrega).toFixed(2)}\nPagto: ${p}`;
            if(!aberta) msg = `*AGENDA: ${document.getElementById('c-hora').value}*\n` + msg;
            window.open(`https://wa.me/${DATA.config.whatsapp}?text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
