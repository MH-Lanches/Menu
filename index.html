<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f9fafb; --brand: #ef4444; }
        .product-card:active { transform: scale(0.97); }
        .modal-slide { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="pb-32">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b p-4">
        <div class="max-w-2xl mx-auto flex items-center gap-3">
            <img id="ui-logo" src="" class="w-12 h-12 rounded-2xl object-cover border hidden">
            <div>
                <h1 id="ui-nome" class="font-black text-lg italic text-slate-800 tracking-tight uppercase">Carregando...</h1>
                <div class="flex items-center gap-2">
                    <div id="dot-status" class="w-2 h-2 rounded-full bg-slate-300"></div>
                    <span id="ui-status-text" class="text-[10px] font-bold uppercase tracking-widest text-slate-400">...</span>
                </div>
            </div>
        </div>
    </header>

    <main id="menu" class="max-w-2xl mx-auto p-4 space-y-10 mt-4"></main>

    <footer class="mt-20 mb-32 text-center px-6">
        <div class="w-12 h-1 bg-slate-200 mx-auto rounded-full mb-4"></div>
        <p id="ui-footer" class="text-slate-400 text-xs italic leading-relaxed max-w-xs mx-auto"></p>
        <p class="text-[9px] text-slate-300 uppercase tracking-[0.4em] mt-8 font-black">Sistema Delivery VIP</p>
    </footer>

    <div id="bar-carrinho" class="fixed bottom-6 left-0 right-0 z-40 hidden px-4">
        <div class="max-w-md mx-auto bg-slate-900 rounded-[2.5rem] p-2 shadow-2xl flex items-center justify-between border border-white/10">
            <div class="pl-6 flex items-center gap-4">
                <div class="relative">
                    <i class="fa-solid fa-bag-shopping text-white"></i>
                    <span id="cart-count" class="absolute -top-3 -right-3 bg-red-500 text-white text-[9px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-slate-900">0</span>
                </div>
                <p id="cart-total" class="text-white font-black text-lg">R$ 0,00</p>
            </div>
            <button onclick="enviarWhatsApp()" class="bg-white text-slate-900 h-14 px-8 rounded-[2rem] font-black uppercase text-[10px] tracking-widest">Finalizar</button>
        </div>
    </div>

    <div id="modal-produto" class="fixed inset-0 bg-black/70 z-[60] hidden flex items-end justify-center backdrop-blur-sm">
        <div class="bg-white w-full max-w-xl rounded-t-[3rem] overflow-hidden modal-slide max-h-[92vh] flex flex-col">
            <div class="relative h-60">
                <img id="modal-img" src="" class="w-full h-full object-cover">
                <button onclick="fecharModal()" class="absolute top-6 right-6 bg-black/20 text-white w-10 h-10 rounded-full backdrop-blur-md"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-8 overflow-y-auto flex-1">
                <div class="flex justify-between items-start mb-4">
                    <h2 id="modal-nome" class="text-2xl font-black text-slate-800 italic uppercase"></h2>
                    <span id="modal-preco-base" class="text-xl font-bold text-emerald-600 italic"></span>
                </div>
                <p id="modal-desc" class="text-slate-400 text-sm mb-8"></p>
                
                <div id="container-ads" class="space-y-3"></div>

                <div class="mt-8">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Alguma observação?</label>
                    <textarea id="modal-obs" placeholder="Ex: Sem cebola, ponto da carne..." class="w-full bg-slate-50 border border-slate-100 rounded-2xl p-4 text-sm outline-none focus:border-emerald-500 h-24 resize-none"></textarea>
                </div>
            </div>
            <div class="p-8 border-t bg-slate-50">
                <button onclick="confirmarAdd()" id="btn-add-modal" class="w-full py-5 rounded-[2rem] font-black text-white shadow-xl flex justify-between px-10 transition active:scale-95" style="background: var(--brand)">
                    <span class="uppercase tracking-widest text-[10px]">Adicionar</span>
                    <span id="val-modal-total" class="text-xl"></span>
                </button>
            </div>
        </div>
    </div>

    <script>
        let DATA = {}; let carrinho = []; let addsEscolhidos = []; let prodAberto = null;

        async function init() {
            const res = await fetch('produtos.json', { cache: 'no-store' });
            DATA = await res.json();
            document.body.style.setProperty('--brand', DATA.config.corPrincipal);
            document.getElementById('ui-nome').innerText = DATA.config.nomeLoja;
            document.getElementById('ui-footer').innerText = DATA.config.footerText || "";
            if(DATA.config.linkLogo) {
                const img = document.getElementById('ui-logo');
                img.src = DATA.config.linkLogo; img.classList.remove('hidden');
            }
            renderStatus(); renderMenu();
        }

        function verificarAberto() {
            if(DATA.config.fechadoManual) return false;
            const agora = new Date(); const minAt = agora.getHours()*60 + agora.getMinutes();
            const [hA, mA] = DATA.config.horaAbre.split(':').map(Number);
            const [hF, mF] = DATA.config.horaFecha.split(':').map(Number);
            let minA = hA*60+mA, minF = hF*60+mF; if(minF < minA) minF += 1440;
            return minAt >= minA && minAt <= minF;
        }

        function renderStatus() {
            const aberto = verificarAberto();
            document.getElementById('dot-status').className = `w-2 h-2 rounded-full ${aberto ? 'bg-emerald-500' : 'bg-amber-500'}`;
            document.getElementById('ui-status-text').innerText = aberto ? 'Aberto' : 'Fechado / Agende';
        }

        function renderMenu() {
            const container = document.getElementById('menu');
            container.innerHTML = (DATA.config.categorias || []).map(cat => {
                const itens = DATA.items.filter(i => i.categoria === cat);
                if(!itens.length) return '';
                return `<section>
                    <h2 class="text-xl font-black italic uppercase tracking-tighter mb-6 flex items-center gap-3">
                        <span class="w-1.5 h-6 rounded-full" style="background:var(--brand)"></span> ${cat}
                    </h2>
                    <div class="grid gap-6">
                        ${itens.map(p => `
                        <div onclick="${p.ativo ? `abrirProduto(${p.id})` : ''}" class="product-card bg-white p-3 rounded-[2.5rem] flex items-center border border-slate-100 shadow-sm ${!p.ativo ? 'opacity-50 grayscale' : 'cursor-pointer'}">
                            <img src="${p.imagem}" class="w-28 h-28 object-cover rounded-[2rem] shadow-md">
                            <div class="ml-5 flex-1 pr-2">
                                <h3 class="font-bold text-slate-800 leading-tight">${p.nome}</h3>
                                <p class="text-[10px] text-slate-400 mt-1 line-clamp-2">${p.descricao || ''}</p>
                                <p class="text-emerald-600 font-black mt-2 italic text-sm">R$ ${p.preco.toFixed(2)}</p>
                            </div>
                        </div>`).join('')}
                    </div>
                </section>`;
            }).join('');
        }

        function abrirProduto(id) {
            prodAberto = DATA.items.find(x => x.id === id); addsEscolhidos = [];
            document.getElementById('modal-img').src = prodAberto.imagem;
            document.getElementById('modal-nome').innerText = prodAberto.nome;
            document.getElementById('modal-desc').innerText = prodAberto.descricao || '';
            document.getElementById('modal-preco-base').innerText = `R$ ${prodAberto.preco.toFixed(2)}`;
            document.getElementById('modal-obs').value = "";
            
            const container = document.getElementById('container-ads');
            const lim = prodAberto.limiteAdicionais || 0;
            container.innerHTML = (prodAberto.adicionais || []).length ? 
                `<div class="flex justify-between items-center mb-4"><span class="text-[10px] font-black text-slate-400 uppercase">Adicionais</span> ${lim > 0 ? `<span class="bg-amber-100 text-amber-700 text-[9px] font-bold px-2 py-0.5 rounded uppercase">Até ${lim} itens</span>` : ''}</div>` : '';

            (prodAberto.adicionais || []).forEach((ad, i) => {
                container.innerHTML += `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-3xl border">
                    <div class="flex-1">
                        <span class="text-sm font-bold text-slate-700 block">${ad.nome}</span>
                        ${ad.desc ? `<span class="text-[10px] text-slate-400 italic block leading-none mt-1">${ad.desc}</span>` : ''}
                        <span class="text-[11px] font-black text-emerald-600 mt-1 block">+ R$ ${ad.preco.toFixed(2)}</span>
                    </div>
                    <div class="flex items-center gap-4 bg-white border rounded-2xl p-1">
                        <button onclick="mudarQtdAd(${i}, -1)" class="w-8 h-8 rounded-xl text-slate-400">-</button>
                        <span id="qtd-ad-${i}" class="text-sm font-black w-4 text-center">0</span>
                        <button onclick="mudarQtdAd(${i}, 1)" class="w-8 h-8 bg-slate-900 text-white rounded-xl">+</button>
                    </div>
                </div>`;
            });
            updateTotalModal(); document.getElementById('modal-produto').classList.remove('hidden');
        }

        function mudarQtdAd(idx, delta) {
            const ad = prodAberto.adicionais[idx];
            const el = document.getElementById(`qtd-ad-${idx}`);
            let qtd = parseInt(el.innerText);
            
            const totalAgora = addsEscolhidos.reduce((a, b) => a + b.qtd, 0);
            const limTotal = prodAberto.limiteAdicionais || 0;

            if (delta > 0) {
                if (limTotal > 0 && totalAgora >= limTotal) { alert("Limite total atingido!"); return; }
                if (qtd >= (ad.maxPorItem || 1)) { alert(`Máximo de ${ad.maxPorItem}x para este item.`); return; }
                qtd++;
            } else { if (qtd > 0) qtd--; }

            el.innerText = qtd;
            const findIdx = addsEscolhidos.findIndex(x => x.nome === ad.nome);
            if (qtd > 0) {
                if (findIdx > -1) addsEscolhidos[findIdx].qtd = qtd;
                else addsEscolhidos.push({ nome: ad.nome, preco: ad.preco, qtd });
            } else if (findIdx > -1) addsEscolhidos.splice(findIdx, 1);
            
            updateTotalModal();
        }

        function updateTotalModal() {
            const total = prodAberto.preco + addsEscolhidos.reduce((a, b) => a + (b.preco * b.qtd), 0);
            document.getElementById('val-modal-total').innerText = `R$ ${total.toFixed(2)}`;
        }

        function confirmarAdd() {
            const total = prodAberto.preco + addsEscolhidos.reduce((a, b) => a + (b.preco * b.qtd), 0);
            const obs = document.getElementById('modal-obs').value.trim();
            let nomeFinal = prodAberto.nome;
            if (addsEscolhidos.length) nomeFinal += ` (+ ${addsEscolhidos.map(x => `${x.qtd}x ${x.nome}`).join(', ')})`;
            carrinho.push({ nome: nomeFinal, preco: total, obs });
            fecharModal(); updateBar();
        }

        function updateBar() {
            const total = carrinho.reduce((a, b) => a + b.preco, 0) + DATA.config.taxaEntrega;
            document.getElementById('cart-total').innerText = "R$ " + total.toFixed(2);
            document.getElementById('cart-count').innerText = carrinho.length;
            document.getElementById('bar-carrinho').classList.remove('hidden');
        }

        function fecharModal() { document.getElementById('modal-produto').classList.add('hidden'); }

        function enviarWhatsApp() {
            let msg = `*NOVO PEDIDO*\n━━━━━━━━━━━━━━━━━━━━\n\n`;
            carrinho.forEach(i => {
                msg += `✅ *1x ${i.nome}*\n`;
                if(i.obs) msg += `   _OBS: ${i.obs}_\n`;
                msg += `   _R$ ${i.preco.toFixed(2)}_\n\n`;
            });
            msg += `━━━━━━━━━━━━━━━━━━━━\n🛵 *Entrega:* R$ ${DATA.config.taxaEntrega.toFixed(2)}\n`;
            msg += `💰 *TOTAL: R$ ${(carrinho.reduce((a,b)=>a+b.preco,0) + DATA.config.taxaEntrega).toFixed(2)}*`;
            window.open(`https://wa.me/${DATA.config.whatsapp}?text=${encodeURIComponent(msg)}`);
        }

        init();
    </script>
</body>
</html>
